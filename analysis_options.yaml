include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  errors:
    invalid_annotation_target: ignore
    
linter:
  rules:
    # 错误规则
    avoid_print: true  # 避免使用print，使用logger代替
    avoid_empty_else: true  # 避免空的else语句
    avoid_relative_lib_imports: true  # 避免相对lib的导入
    avoid_returning_null_for_future: true  # 避免为Future返回null
    avoid_type_to_string: true  # 避免使用.toString()获取类型名称
    empty_catches: true  # 避免空的catch块
    
    # 风格规则
    camel_case_types: true  # 类型名使用驼峰命名法
    library_names: true  # 库名使用小写加下划线
    file_names: true  # 文件名使用小写加下划线
    prefer_relative_imports: true  # 优先使用相对导入
    prefer_const_constructors: true  # 优先使用const构造函数
    prefer_const_declarations: true  # 优先使用const声明
    prefer_final_locals: true  # 本地变量优先使用final
    sort_child_properties_last: true  # 子组件属性放在最后
    unawaited_futures: true  # Future需要处理
    unnecessary_const: true  # 避免不必要的const
    unnecessary_this: true  # 避免不必要的this
    use_key_in_widget_constructors: true  # Widget构造函数使用key参数
    always_use_package_imports: false  # 不强制使用package导入 