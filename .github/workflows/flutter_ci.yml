name: Flutter CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  analyze_and_test:
    name: 分析与测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0'
          channel: 'stable'
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 验证格式
        run: flutter format --set-exit-if-changed .
      
      - name: 静态分析
        run: flutter analyze
      
      - name: 运行单元测试
        run: flutter test
      
      - name: 检查代码覆盖率
        run: flutter test --coverage
      
      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v2
        with:
          file: ./coverage/lcov.info

  build_android:
    name: 构建Android
    needs: analyze_and_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: 设置 Java
        uses: actions/setup-java@v2
        with:
          distribution: 'zulu'
          java-version: '11'
      
      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0'
          channel: 'stable'
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 构建APK
        run: flutter build apk --release
      
      - name: 上传APK
        uses: actions/upload-artifact@v2
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

  build_ios:
    name: 构建iOS
    needs: analyze_and_test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0'
          channel: 'stable'
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 构建iOS
        run: flutter build ios --release --no-codesign 