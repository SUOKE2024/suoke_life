apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: suoke-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/suoke-org/suoke-backend.git'
    path: deploy/kubernetes
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: suoke
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true