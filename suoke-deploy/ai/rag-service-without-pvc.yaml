apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-service-config
  namespace: suoke
data:
  server.js: |
    const http = require('http');
    const fs = require('fs');
    const path = require('path');

    // 创建内存数据结构
    const vectorDB = {
      collections: {},
      
      // 初始化示例集合
      init() {
        this.collections = {
          'medical_knowledge': {
            name: 'medical_knowledge',
            vectors: []
          },
          'tcm_herbs': {
            name: 'tcm_herbs',
            vectors: []
          }
        };
        console.log('向量数据库初始化完成');
      },
      
      // 模拟向量搜索
      search(collection, query, limit = 5) {
        if (!this.collections[collection]) {
          return { error: '集合不存在' };
        }
        
        // 模拟返回结果
        return {
          results: [
            { id: '1', text: '中医养生基础知识', score: 0.95 },
            { id: '2', text: '五行与人体健康的关系', score: 0.89 },
            { id: '3', text: '艾灸的功效与应用', score: 0.82 }
          ]
        };
      }
    };

    // 初始化数据
    vectorDB.init();

    // 创建服务器
    const server = http.createServer((req, res) => {
      res.setHeader('Content-Type', 'application/json');
      
      // 解析URL和方法
      const url = new URL(req.url, `http://${req.headers.host}`);
      const method = req.method;
      
      // 健康检查端点
      if (url.pathname === '/health') {
        res.writeHead(200);
        res.end(JSON.stringify({ status: 'UP', service: 'rag-service' }));
        return;
      }
      
      // 搜索API
      if (url.pathname === '/api/search' && method === 'GET') {
        const collection = url.searchParams.get('collection') || 'medical_knowledge';
        const query = url.searchParams.get('query') || '';
        const limit = parseInt(url.searchParams.get('limit') || '5');
        
        const results = vectorDB.search(collection, query, limit);
        res.writeHead(200);
        res.end(JSON.stringify(results));
        return;
      }
      
      // 列出可用集合
      if (url.pathname === '/api/collections' && method === 'GET') {
        res.writeHead(200);
        res.end(JSON.stringify({
          collections: Object.keys(vectorDB.collections)
        }));
        return;
      }
      
      // 其他路径返回404
      res.writeHead(404);
      res.end(JSON.stringify({ error: '未找到请求的资源' }));
    });

    const PORT = 8082;
    server.listen(PORT, () => {
      console.log(`RAG服务运行在端口 ${PORT}`);
    });
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service-simple
  namespace: suoke
  labels:
    app: rag-service-simple
    app.kubernetes.io/part-of: suoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-service-simple
  template:
    metadata:
      labels:
        app: rag-service-simple
        app.kubernetes.io/part-of: suoke
    spec:
      nodeSelector:
        node-type: ai-service
      containers:
      - name: rag-service
        image: node:18-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 20
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 10
        command: ["/bin/sh"]
        args:
        - "-c"
        - |
          mkdir -p /app
          cd /app
          cp /app/config/server.js /app/
          node server.js
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
      volumes:
      - name: config-volume
        configMap:
          name: rag-service-config
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service-simple
  namespace: suoke
spec:
  selector:
    app: rag-service-simple
  ports:
  - port: 8082
    targetPort: 8082 