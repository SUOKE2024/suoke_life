apiVersion: apps/v1
kind: Deployment
metadata:
  name: xiaoai-service
  namespace: suoke
  labels:
    app: xiaoai-service
    app.kubernetes.io/part-of: suoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xiaoai-service
  template:
    metadata:
      labels:
        app: xiaoai-service
        app.kubernetes.io/part-of: suoke
    spec:
      nodeSelector:
        node-type: ai-service
      imagePullSecrets:
      - name: aliyun-registry-secret
      containers:
      - name: xiaoai-service
        image: suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/xiaoai-service:v1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 384Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 12
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 8
          periodSeconds: 8
---
apiVersion: v1
kind: Service
metadata:
  name: xiaoai-service
  namespace: suoke
spec:
  selector:
    app: xiaoai-service
  ports:
  - port: 8081
    targetPort: 8081 