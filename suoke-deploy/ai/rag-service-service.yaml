apiVersion: v1
kind: Service
metadata:
  name: rag-service
  namespace: suoke
  labels:
    app: rag-service
    app.kubernetes.io/part-of: suoke
spec:
  selector:
    app: rag-service
  ports:
  - name: http
    port: 4001
    targetPort: 4001
  - name: metrics
    port: 9464
    targetPort: 9464
  type: ClusterIP