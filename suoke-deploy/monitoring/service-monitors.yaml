apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-gateway-monitor
  namespace: monitoring
  labels:
    app: prometheus
spec:
  selector:
    matchLabels:
      app: api-gateway-nginx
  namespaceSelector:
    matchNames:
      - suoke
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
---
