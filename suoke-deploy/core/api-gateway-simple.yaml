apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-simple
  namespace: suoke
  labels:
    app: api-gateway-simple
    app.kubernetes.io/part-of: suoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway-simple
  template:
    metadata:
      labels:
        app: api-gateway-simple
        app.kubernetes.io/part-of: suoke
    spec:
      nodeSelector:
        node-type: core-service
      containers:
      - name: nginx
        image: nginx:1.23.1-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: default-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: default-conf
        configMap:
          name: api-gateway-simple-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-simple-config
  namespace: suoke
data:
  default.conf: |
    server {
      listen 80;
      server_name localhost;
      
      location /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"UP","timestamp":"test"}';
      }
      
      location / {
        add_header Content-Type text/plain;
        return 200 'Welcome to Suoke API Gateway';
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-simple
  namespace: suoke
spec:
  selector:
    app: api-gateway-simple
  ports:
  - port: 80
    targetPort: 80 