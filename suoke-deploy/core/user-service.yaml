apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: suoke
  labels:
    app: user-service
    app.kubernetes.io/part-of: suoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        app.kubernetes.io/part-of: suoke
    spec:
      nodeSelector:
        node-type: core-service
      imagePullSecrets:
      - name: aliyun-registry-secret
      containers:
      - name: user-service
        image: suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/user-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: suoke
spec:
  selector:
    app: user-service
  ports:
  - port: 8082
    targetPort: 8082 