apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: suoke
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: suoke
spec:
  selector:
    app: api-gateway
  ports:
  - name: http
    port: 80
    targetPort: 80
  - name: metrics
    port: 9464
    targetPort: 9464
  type: ClusterIP