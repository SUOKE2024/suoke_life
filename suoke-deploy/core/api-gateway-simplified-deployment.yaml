apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-simple
  namespace: suoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway-simple
  template:
    metadata:
      labels:
        app: api-gateway-simple
        app.kubernetes.io/part-of: suoke
    spec:
      nodeSelector:
        node-type: core-service
      containers:
      - name: nginx
        image: registry.cn-hangzhou.aliyuncs.com/acs/nginx:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: nginx-config
        configMap:
          name: simplified-nginx-config