apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-nginx-config
  namespace: suoke
data:
  default.conf: |
    server {
      listen 80;
      server_name localhost;
      
      # 健康检查端点
      location /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"UP","timestamp":"test"}';
      }
      
      # 根路径响应
      location = / {
        add_header Content-Type text/plain;
        return 200 'Welcome to Suoke API Gateway';
      }
      
      # 认证服务路由
      location /api/auth/ {
        proxy_pass http://auth-service-simple-node:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
      
      # 智能体协调器路由
      location /api/agents/ {
        proxy_pass http://agent-coordinator-simple:8080/api/agents/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
      
      # RAG知识检索服务路由
      location /api/rag/ {
        proxy_pass http://rag-service-simple:8082/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-nginx
  namespace: suoke
  labels:
    app: api-gateway-nginx
    app.kubernetes.io/part-of: suoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway-nginx
  template:
    metadata:
      labels:
        app: api-gateway-nginx
        app.kubernetes.io/part-of: suoke
    spec:
      nodeSelector:
        node-type: core-service
      containers:
      - name: nginx
        image: nginx:1.23.1-alpine
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: default-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: default-conf
        configMap:
          name: api-gateway-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-nginx
  namespace: suoke
spec:
  selector:
    app: api-gateway-nginx
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-nginx-ingress
  namespace: suoke
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway-nginx
            port:
              number: 80 