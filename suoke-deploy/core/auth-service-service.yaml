apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: suoke
  labels:
    app: auth-service
    app.kubernetes.io/part-of: suoke
spec:
  selector:
    app: auth-service
  ports:
  - name: http
    port: 3001
    targetPort: 3001
  - name: metrics
    port: 9464
    targetPort: 9464
  type: ClusterIP