apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-fixed
  namespace: suoke
  labels:
    app: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: suoke-registry-vpc.cn-hangzhou.cr.aliyuncs.com/suoke/user-service:fixed-v1
        imagePullPolicy: Always
        ports:
        - containerPort: 3002
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
        env:
        - name: PORT
          value: "3002"
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 5
          periodSeconds: 10
      imagePullSecrets:
      - name: suoke-registry-vpc-secret 