version: '3.8'

services:
  # 用户服务
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: suoke/user-service:dev
    container_name: suoke-user-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=suoke
      - DB_PASSWORD=suoke_dev_password
      - DB_NAME=suoke_users
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=dev_jwt_secret
      - JWT_EXPIRES_IN=1d
      - KNOWLEDGE_BASE_URL=http://knowledge-base-service:3000
      - KNOWLEDGE_GRAPH_URL=http://knowledge-graph-service:3000
      - USER_PROFILE_SERVICE=http://user-profile-service:3000
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      - mysql
      - redis
    networks:
      - suoke-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: suoke-user-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=suoke_users
      - MYSQL_USER=suoke
      - MYSQL_PASSWORD=suoke_dev_password
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - suoke-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7.0-alpine
    container_name: suoke-user-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - suoke-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 用户画像模拟服务
  user-profile-mock:
    build:
      context: ./mocks
      dockerfile: Dockerfile-mock
    image: suoke/user-profile-mock:local
    container_name: user-profile-mock
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
    volumes:
      - ./mocks:/app
      - /app/node_modules
    networks:
      - suoke-network
    command: ["node", "user-profile-mock.js"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 知识偏好模拟服务
  knowledge-pref-mock:
    build:
      context: ./mocks
      dockerfile: Dockerfile-mock
    image: suoke/knowledge-pref-mock:local
    container_name: knowledge-pref-mock
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
    volumes:
      - ./mocks:/app
      - /app/node_modules
    networks:
      - suoke-network
    command: ["node", "knowledge-pref-mock.js"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mock-service:
    image: node:18-alpine
    container_name: suoke-mock-user-service
    working_dir: /app
    volumes:
      - ./mocks:/app
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=development
      - PORT=3005
    command: >
      sh -c "apk add --no-cache curl && npm init -y && npm install express cors body-parser && node user-profile-mock.js"

  adminer:
    image: adminer:latest
    container_name: suoke-user-adminer
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=mysql
    depends_on:
      - mysql
    networks:
      - suoke-network
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:

networks:
  suoke-network:
    name: suoke-network
    driver: bridge 