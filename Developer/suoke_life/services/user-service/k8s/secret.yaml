# 注意：这是一个模板文件，实际值需要根据环境进行替换
# 在应用到Kubernetes集群之前，请根据实际情况填写敏感信息并使用kubectl create secret命令创建
apiVersion: v1
kind: Secret
metadata:
  name: user-service-secrets
  namespace: suoke
  labels:
    app: user-service
    service: user
type: Opaque
stringData:
  # 注意：实际生产环境中，这些值应该由适当的密钥管理系统生成
  # 这些是示例值，请在生产环境中替换为真实值
  db.password: "CHANGE_ME_IN_PRODUCTION" 
  redis.password: "CHANGE_ME_IN_PRODUCTION"
  jwt.secret: "CHANGE_ME_IN_PRODUCTION"
  
  # 其他敏感配置
  email_api_key: ""  # 替换为实际邮件服务API密钥
  sms_api_key: ""  # 替换为实际短信服务API密钥

