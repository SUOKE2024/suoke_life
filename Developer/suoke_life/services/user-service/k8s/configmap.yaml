apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: suoke
  labels:
    app: user-service
    service: user
data:
  db.host: "mysql.database.svc.cluster.local"
  db.port: "3306"
  db.user: "suoke_prod"
  db.name: "suoke_users_prod"
  redis.host: "redis.cache.svc.cluster.local"
  redis.port: "6379"
  knowledge.base.url: "http://knowledge-base-service.suoke.svc.cluster.local/api"
  knowledge.graph.url: "http://knowledge-graph-service.suoke.svc.cluster.local/api"
  user.profile.url: "http://user-profile-service.suoke.svc.cluster.local/api"
  share.base.url: "https://share.suoke.life"
  log.level: "info"
  jwt.expires: "12h"
  vector_similarity_threshold: "0.7"
  cors_allowed_origins: "https://suoke.life,https://app.suoke.life,https://admin.suoke.life"
  max_upload_size: "5242880" # 5MB in bytes 