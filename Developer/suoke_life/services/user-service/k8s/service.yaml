apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: suoke
  labels:
    app: user-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "3002"
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3002
    protocol: TCP
    name: http
  selector:
    app: user-service 