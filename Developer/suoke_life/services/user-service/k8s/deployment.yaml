apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: suoke
  labels:
    app: user-service
  annotations:
    app.kubernetes.io/part-of: suoke-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: user-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3002"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - user-service
              topologyKey: kubernetes.io/hostname
      containers:
      - name: user-service
        image: suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/user-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3002
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3002"
        - name: NODE_OPTIONS
          value: "--max-old-space-size=384"
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: user-service-config
              key: db.host
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: user-service-config
              key: db.port
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: user-service-config
              key: db.user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: user-service-secrets
              key: db.password
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: user-service-config
              key: db.name
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: user-service-config
              key: redis.host
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: user-service-config
              key: redis.port
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: user-service-secrets
              key: redis.password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: user-service-secrets
              key: jwt.secret
        - name: JWT_EXPIRES_IN
          valueFrom:
            configMapKeyRef:
              name: user-service-config
              key: jwt.expires
        - name: KNOWLEDGE_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: user-service-config
              key: knowledge.base.url
        - name: KNOWLEDGE_GRAPH_URL
          valueFrom:
            configMapKeyRef:
              name: user-service-config
              key: knowledge.graph.url
        - name: USER_PROFILE_SERVICE
          valueFrom:
            configMapKeyRef:
              name: user-service-config
              key: user.profile.url
        - name: SHARE_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: user-service-config
              key: share.base.url
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: user-service-config
              key: log.level
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: uploads
          mountPath: /app/uploads
          readOnly: false
        - name: tmp
          mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
      volumes:
      - name: logs
        persistentVolumeClaim:
          claimName: user-service-logs-pvc
      - name: uploads
        persistentVolumeClaim:
          claimName: user-service-uploads-pvc
      - name: tmp
        emptyDir: {}
      imagePullSecrets:
      - name: suoke-registry-secret
      securityContext:
        fsGroup: 1001
      terminationGracePeriodSeconds: 30
