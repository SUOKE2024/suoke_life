apiVersion: batch/v1
kind: CronJob
metadata:
  name: user-service-backup
  namespace: suoke
  labels:
    app: user-service
    role: backup
spec:
  schedule: "0 2 * * *"  # 每天凌晨2点执行
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          containers:
          - name: backup
            image: bitnami/mysql:8.0
            imagePullPolicy: IfNotPresent
            env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: user-service-config
                  key: db.host
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: user-service-config
                  key: db.port
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: user-service-config
                  key: db.user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: user-service-secrets
                  key: db.password
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: user-service-config
                  key: db.name
            command:
            - /bin/bash
            - -c
            - |
              # 生成备份文件名
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              BACKUP_FILE="${DB_NAME}_${TIMESTAMP}.sql.gz"
              
              # 执行备份
              echo "开始备份数据库 ${DB_NAME}..."
              mysqldump -h${DB_HOST} -P${DB_PORT} -u${DB_USER} -p${DB_PASSWORD} \
                --single-transaction --quick --lock-tables=false ${DB_NAME} | gzip > /backups/${BACKUP_FILE}
              
              if [ $? -eq 0 ]; then
                echo "备份成功: /backups/${BACKUP_FILE}"
                
                # 保留最近7天的备份
                find /backups -name "${DB_NAME}_*.sql.gz" -type f -mtime +7 -delete
                
                # 列出当前备份文件
                echo "当前备份文件:"
                ls -lah /backups/
              else
                echo "备份失败!"
                exit 1
              fi
            volumeMounts:
            - name: backup-storage
              mountPath: /backups
          restartPolicy: OnFailure
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: user-service-backup-pvc 