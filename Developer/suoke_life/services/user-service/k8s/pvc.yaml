apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: user-service-logs-pvc
  namespace: suoke
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: suoke-standard
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: user-service-uploads-pvc
  namespace: suoke
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: suoke-standard
  resources:
    requests:
      storage: 10Gi 