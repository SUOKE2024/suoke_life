name: 知识库服务 CI/CD 流水线

on:
  push:
    branches: [ main, release/*, feature/* ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  IMAGE_NAME: knowledge-base-service
  REGISTRY: registry.suoke.life
  GO_VERSION: '1.24'

jobs:
  lint-test:
    name: 代码检查与测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 设置版本号
        id: set_version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            VERSION=$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)
          elif [[ "${{ github.ref }}" =~ ^refs/heads/release/.* ]]; then
            VERSION=$(echo ${{ github.ref }} | sed 's|refs/heads/release/||')
          else
            VERSION=$(git rev-parse --short HEAD)
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 设置Go环境
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 安装依赖
        run: go mod download

      - name: 代码风格检查
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=5m

      - name: 代码质量分析
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=suokelife_knowledge-base-service
            -Dsonar.organization=suokelife

      - name: 单元测试
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: 上传测试覆盖率报告
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: coverage-report
          path: coverage.out
  
  vector-db-integration-test:
    name: 向量数据库集成测试
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v3
      
      - name: 设置Go环境
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: 安装依赖
        run: go mod download
      
      - name: 准备测试数据
        run: |
          go run ./cmd/tools/seed_testdata

      - name: 运行集成测试
        env:
          VECTOR_STORE_HOST: localhost
          VECTOR_STORE_PORT: 19530
          VECTOR_STORE_COLLECTION: test_collection
        run: go test -v -tags=integration ./internal/infrastructure/vectorstore/...
  
  security-scan:
    name: 安全扫描
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v3

      - name: 依赖安全扫描
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: 构建临时镜像用于扫描
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan

      - name: 容器镜像扫描
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: 上传安全扫描结果
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
  
  build-push:
    name: 构建和推送镜像
    runs-on: ubuntu-latest
    needs: [security-scan, vector-db-integration-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v3

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: 登录阿里云容器镜像服务
        uses: aliyun/acr-login@v1
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 确定版本号
        id: version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            VERSION=$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)
          elif [[ "${{ github.ref }}" =~ ^refs/heads/release/.* ]]; then
            VERSION=$(echo ${{ github.ref }} | sed 's|refs/heads/release/||')
          else
            VERSION=$(git rev-parse --short HEAD)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: 构建推送镜像
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: 更新CHANGELOG
        id: changelog
        uses: TriPSs/conventional-changelog-action@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          git-message: 'chore(release): {version}'
          tag-prefix: 'v'
          output-file: 'CHANGELOG.md'
          release-count: '10'
          skip-version-file: 'true'
          skip-on-empty: 'true'
          fallback-version: '${{ steps.version.outputs.version }}'
  
  deploy-dev:
    name: 部署到开发环境
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'dev'
    environment:
      name: development
      url: https://dev.api.suoke.life/kb
    steps:
      - uses: actions/checkout@v3

      - name: 设置Kubectl
        uses: azure/setup-kubectl@v3

      - name: 配置Kubernetes凭证
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_DEV }}

      - name: 更新镜像版本
        run: |
          cd k8s/overlays/dev
          kustomize edit set image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.version }}

      - name: 部署应用
        run: |
          kubectl apply -k k8s/overlays/dev

      - name: 验证部署
        run: |
          kubectl rollout status deployment/knowledge-base -n suoke-dev --timeout=180s

  deploy-staging:
    name: 部署到预发布环境
    runs-on: ubuntu-latest
    needs: [build-push, deploy-dev]
    if: startsWith(github.ref, 'refs/heads/release/') || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.api.suoke.life/kb
    steps:
      - uses: actions/checkout@v3

      - name: 设置Kubectl
        uses: azure/setup-kubectl@v3

      - name: 配置Kubernetes凭证
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: 更新镜像版本
        run: |
          cd k8s/overlays/staging
          kustomize edit set image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.version }}

      - name: 部署应用
        run: |
          kubectl apply -k k8s/overlays/staging

      - name: 验证部署
        run: |
          kubectl rollout status deployment/knowledge-base -n suoke-staging --timeout=180s

      - name: 同步知识库数据
        run: |
          kubectl exec -n suoke-staging deploy/knowledge-base -- ./knowledge-base-service sync

  deploy-prod:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: [build-push, deploy-staging]
    if: startsWith(github.ref, 'refs/heads/release/') || github.event.inputs.environment == 'prod'
    environment:
      name: production
      url: https://api.suoke.life/kb
    steps:
      - uses: actions/checkout@v3

      - name: 设置Kubectl
        uses: azure/setup-kubectl@v3

      - name: 配置Kubernetes凭证
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}

      - name: 更新镜像版本
        run: |
          cd k8s/overlays/prod
          kustomize edit set image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.version }}

      - name: 部署应用
        run: |
          kubectl apply -k k8s/overlays/prod

      - name: 验证部署
        run: |
          kubectl rollout status deployment/knowledge-base -n suoke-prod --timeout=180s

      - name: 同步知识库数据
        run: |
          kubectl exec -n suoke-prod deploy/knowledge-base -- ./knowledge-base-service sync

  index-benchmark:
    name: 索引性能测试
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v3

      - name: 设置Go环境
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: 安装依赖
        run: go mod download
      
      - name: 执行索引性能测试
        run: |
          mkdir -p benchmark-results
          go run ./cmd/benchmark/index > benchmark-results/index-benchmark.json

      - name: 执行检索性能测试
        run: |
          go run ./cmd/benchmark/retrieval > benchmark-results/retrieval-benchmark.json

      - name: 上传性能测试结果
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: benchmark-results/

  notify:
    name: 部署结果通知
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-staging, deploy-prod, index-benchmark]
    if: always()
    steps:
      - name: 发送钉钉通知
        uses: zcong1993/actions-ding@master
        with:
          dingToken: ${{ secrets.DING_TALK_TOKEN }}
          body: |
            {
              "msgtype": "markdown",
              "markdown": {
                "title": "知识库服务部署状态",
                "text": "### 知识库服务部署状态 📢\n\n**版本**: ${{ needs.build-push.outputs.version }}\n\n**环境状态**:\n- 开发环境: ${{ needs.deploy-dev.result || '未触发' }}\n- 预发布环境: ${{ needs.deploy-staging.result || '未触发' }}\n- 生产环境: ${{ needs.deploy-prod.result || '未触发' }}\n- 性能测试: ${{ needs.index-benchmark.result || '未触发' }}\n\n**触发者**: ${{ github.actor }}\n\n[查看工作流详情](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
              }
            }