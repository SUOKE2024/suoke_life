apiVersion: v1
kind: ConfigMap
metadata:
  name: knowledge-base-config
  namespace: suoke-prod
  labels:
    app: knowledge-base-service
    tier: data
data:
  # 数据库配置
  DB_TIMEOUT_SECONDS: "30"
  
  # 服务器配置
  SERVER_READ_TIMEOUT_SECONDS: "60"
  SERVER_WRITE_TIMEOUT_SECONDS: "60"
  SERVER_IDLE_TIMEOUT_SECONDS: "120"
  
  # 向量存储配置
  VECTOR_STORE_TIMEOUT_SECONDS: "30"
  VECTOR_STORE_COLLECTION: "knowledge_base_documents"
  
  # 嵌入配置
  EMBEDDING_CONTEXT_SIZE: "4096"
  
  # 内容限制
  MAX_CONTENT_SIZE: "10mb"
  MAX_TAGS_PER_DOCUMENT: "20"
  MAX_CATEGORIES_PER_DOCUMENT: "5"
  
  # 审核配置
  REQUIRE_CONTENT_APPROVAL: "false"
  ADMIN_EMAIL: "admin@suoke.life"
  
  # 性能配置
  PAGINATION_DEFAULT_LIMIT: "20"
  PAGINATION_MAX_LIMIT: "100"
  
  # 文档版本控制
  MAX_VERSIONS_PER_DOCUMENT: "10"
  ENABLE_VERSION_CONTROL: "true"
  
  # CORS配置
  CORS_ORIGINS: "https://app.suoke.life,https://admin.suoke.life,https://suoke.life"
  
  # OpenTelemetry配置
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
  OTEL_TRACES_SAMPLER_ARG: "0.5"
  OTEL_METRICS_EXPORT_INTERVAL: "15000"
  OTEL_LOGS_EXPORT_INTERVAL: "15000"