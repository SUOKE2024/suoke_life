apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: knowledge-base-backup-pvc
  namespace: suoke-prod
  labels:
    app: knowledge-base-service
    role: backup-storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: alicloud-disk-ssd
  resources:
    requests:
      storage: 10Gi