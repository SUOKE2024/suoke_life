apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-base-service
  namespace: suoke-prod
  labels:
    app: knowledge-base-service
    version: v1
    tier: data
    part-of: suoke-platform
    managed-by: kustomize
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: knowledge-base-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: knowledge-base-service
        version: v1
        tier: data
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "suoke-knowledge-base"
        vault.hashicorp.com/agent-inject-secret-database-creds: "suoke/data/knowledge-base-service/db"
        vault.hashicorp.com/agent-inject-template-database-creds: |
          {{- with secret "suoke/data/knowledge-base-service/db" -}}
          export DB_CONNECTION_STRING="{{ .Data.data.postgresql_url }}"
          export VECTOR_STORE_API_KEY="{{ .Data.data.milvus_api_key }}"
          export EMBEDDING_API_TOKEN="{{ .Data.data.embedding_api_token }}"
          {{- end -}}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - stateful-services
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "database"
          effect: "NoSchedule"
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: knowledge-base-service
          image: suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/knowledge-base-service:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - name: http
              containerPort: 3002
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          env:
            - name: PORT
              value: "3002"
            - name: APP_HOST
              value: "0.0.0.0"
            - name: LOG_LEVEL
              value: "info"
            - name: VECTOR_STORE_HOST
              value: "milvus"
            - name: VECTOR_STORE_PORT
              value: "19530"
            - name: EMBEDDING_MODEL_URL
              value: "http://embedding-service:8000/embed"
            - name: EMBEDDING_DIMENSIONS
              value: "1536"
            - name: EMBEDDING_BATCH_SIZE
              value: "10"
            - name: TEXT_SPLITTER_CHUNK_SIZE
              value: "512"
            - name: TEXT_SPLITTER_CHUNK_OVERLAP
              value: "128"
            - name: KNOWLEDGE_GRAPH_SERVICE_URL
              value: "http://knowledge-graph-service:3000"
            - name: RAG_SERVICE_URL
              value: "http://rag-service:3000"
            - name: OTEL_SERVICE_NAME
              value: "knowledge-base-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
          envFrom:
            - configMapRef:
                name: knowledge-base-config
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
            - name: tmp
              mountPath: /app/tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: knowledge-base-data-pvc
        - name: logs
          persistentVolumeClaim:
            claimName: knowledge-base-logs-pvc
        - name: tmp
          emptyDir: {}
      imagePullSecrets:
        - name: suoke-registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: knowledge-base-service
  labels:
    app: knowledge-base-service
spec:
  selector:
    app: knowledge-base-service
  ports:
  - port: 80
    targetPort: 3002
    protocol: TCP
  type: ClusterIP