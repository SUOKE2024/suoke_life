apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-base-service
  namespace: suoke-prod
  labels:
    app: knowledge-base-service
    version: v1
    tier: data
    part-of: suoke-platform
    managed-by: kustomize
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knowledge-base-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: knowledge-base-service
        version: v1
        tier: data
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: knowledge-base-service
          image: suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/knowledge-base-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3002
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          env:
            - name: PORT
              value: "3002"
            - name: APP_HOST
              value: "0.0.0.0"
            - name: LOG_LEVEL
              value: "info"
            - name: DB_CONNECTION_STRING
              value: "postgresql://$(DATABASE_USER):$(DATABASE_PASSWORD)@postgres-service:5432/suoke?sslmode=disable"
            - name: DATABASE_HOST
              value: "postgres-service"
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: "suoke"
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: DATABASE_SSL_MODE
              value: "disable"
            - name: DATABASE_CONNECTION_RETRY
              value: "5"
            - name: VECTOR_STORE_HOST
              value: "milvus-service"
            - name: VECTOR_STORE_PORT
              value: "19530"
            - name: VECTOR_STORE_COLLECTION
              value: "knowledge_base_documents"
            - name: EMBEDDING_MODEL_URL
              value: "http://embedding-service:8000/embed"
            - name: EMBEDDING_DIMENSIONS
              value: "1536"
            - name: EMBEDDING_BATCH_SIZE
              value: "10"
            - name: TEXT_SPLITTER_CHUNK_SIZE
              value: "512"
            - name: TEXT_SPLITTER_CHUNK_OVERLAP
              value: "128"
            - name: OTEL_SERVICE_NAME
              value: "knowledge-base-service"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
            - name: tmp
              mountPath: /app/tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: knowledge-base-data-pvc
        - name: logs
          persistentVolumeClaim:
            claimName: knowledge-base-logs-pvc
        - name: tmp
          emptyDir: {}
      imagePullSecrets:
        - name: aliyun-docker-registry
        - name: suoke-registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: knowledge-base-service
  namespace: suoke-prod
  labels:
    app: knowledge-base-service
spec:
  selector:
    app: knowledge-base-service
  ports:
  - port: 80
    targetPort: 3002
    protocol: TCP
  type: ClusterIP