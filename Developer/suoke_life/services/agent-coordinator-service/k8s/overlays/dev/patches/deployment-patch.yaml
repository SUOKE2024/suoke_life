apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-coordinator
spec:
  template:
    spec:
      containers:
      - name: agent-coordinator
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        env:
        - name: ENV
          value: "development"
        - name: LOG_LEVEL
          value: "debug"
        - name: CONFIG_PATH
          value: "/app/configs/config.yaml"