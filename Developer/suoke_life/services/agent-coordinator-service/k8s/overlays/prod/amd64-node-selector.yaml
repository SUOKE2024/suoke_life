apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-coordinator
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
        node-type: ai-services
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                - amd64