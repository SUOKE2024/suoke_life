apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-coordinator
spec:
  template:
    spec:
      containers:
      - name: agent-coordinator
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: ENV
          value: "production"
        - name: LOG_LEVEL
          value: "info"
        volumeMounts:
        - name: data-volume
          mountPath: /app/data
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: agent-coordinator-data 