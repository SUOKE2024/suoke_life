apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: suoke-prod

resources:
- ../../base
- hpa.yaml
- pdb.yaml
- pvc.yaml
- network-policy.yaml

patches:
- path: patches/deployment-patch.yaml
- path: patches/amd64-node-selector.yaml

commonLabels:
  app: agent-coordinator
  environment: prod

images:
- name: agent-coordinator
  newName: suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/agent-coordinator
  newTag: latest

namePrefix: prod-

replicas:
- name: agent-coordinator
  count: 2 