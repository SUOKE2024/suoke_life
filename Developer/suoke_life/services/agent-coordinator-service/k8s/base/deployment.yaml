apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-coordinator
spec:
  selector:
    matchLabels:
      app: agent-coordinator
  template:
    metadata:
      labels:
        app: agent-coordinator
    spec:
      containers:
      - name: agent-coordinator
        image: agent-coordinator:latest
        ports:
        - containerPort: 8080
          name: http
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: PORT
          value: "8080"
        - name: CONFIG_FILE
          value: "/etc/agent-coordinator/config.yaml"
        volumeMounts:
        - name: config-volume
          mountPath: /etc/agent-coordinator
      volumes:
      - name: config-volume
        configMap:
          name: agent-coordinator-config