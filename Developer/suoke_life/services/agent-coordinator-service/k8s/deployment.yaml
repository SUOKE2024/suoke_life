apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-coordinator
  namespace: suoke
  labels:
    app: agent-coordinator
    tier: ai
    part-of: suoke-life
    api-gateway-managed: "true"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
    backup.velero.io/backup-volumes: "config-volume,logs-volume"
    sidecar.istio.io/inject: "true"
    proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
    instrumentation.opentelemetry.io/inject-sdk: "true"
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "agent-coordinator"
    vault.hashicorp.com/agent-inject-secret-config: "secret/data/agent-coordinator"
    vault.hashicorp.com/agent-inject-template-config: |
      {{- with secret "secret/data/agent-coordinator" -}}
      {
        "api_keys": {{ .Data.data.api_keys | toJSON }},
        "security": {{ .Data.data.security | toJSON }},
        "caching": {{ .Data.data.caching | toJSON }}
      }
      {{- end -}}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-coordinator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: agent-coordinator
        tier: ai
        part-of: suoke-life
        api-gateway-managed: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        checksum/config: "${CHECKSUM}"
        sidecar.istio.io/inject: "true"
        instrumentation.opentelemetry.io/inject-sdk: "true"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "agent-coordinator"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/agent-coordinator"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/agent-coordinator" -}}
          {
            "api_keys": {{ .Data.data.api_keys | toJSON }},
            "security": {{ .Data.data.security | toJSON }},
            "caching": {{ .Data.data.caching | toJSON }}
          }
          {{- end -}}
    spec:
      nodeSelector:
        node-type: ai-services
      tolerations:
      - key: dedicated
        value: ai-inference
        operator: Equal
        effect: NoSchedule
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - agent-coordinator
              topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: init-dirs
        image: busybox:1.35
        command: ["sh", "-c", "mkdir -p /app/logs /app/data && chown -R 1000:1000 /app"]
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: logs-volume
          mountPath: /app/logs
        - name: data-volume
          mountPath: /app/data
      containers:
      - name: agent-coordinator
        image: ${REGISTRY_HOST}/suoke-life/agent-coordinator-service:${VERSION}
        imagePullPolicy: Always
        ports:
        - containerPort: 3007
          name: api
        env:
        - name: PORT
          value: "3007"
        - name: ENVIRONMENT
          value: "${ENVIRONMENT}"
        - name: LOG_LEVEL
          value: "${LOG_LEVEL}"
        - name: ENABLE_API_AUTH
          value: "${ENABLE_API_AUTH}"
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: agent-coordinator-secrets
              key: api-key
        - name: ENABLE_REQUEST_LOGGING
          value: "true"
        - name: RATE_LIMIT_ENABLED
          value: "true"
        - name: MAX_REQUESTS_PER_MINUTE
          value: "100"
        - name: AGENT_STATE_PERSISTENCE
          value: "${AGENT_STATE_PERSISTENCE}"
        - name: REDIS_HOST
          value: "${REDIS_HOST}"
        - name: REDIS_PORT
          value: "${REDIS_PORT}"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secrets
              key: redis-password
              optional: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 3007
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 3007
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 10
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
        - name: logs-volume
          mountPath: /app/logs
      volumes:
      - name: config-volume
        configMap:
          name: agent-coordinator-config
      - name: logs-volume
        persistentVolumeClaim:
          claimName: agent-coordinator-logs-pvc
      - name: data-volume
        persistentVolumeClaim:
          claimName: agent-coordinator-data-pvc