apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-coordinator-config
  namespace: suoke
  labels:
    app: agent-coordinator
    tier: ai
    part-of: suoke-life
data:
  config.json: |
    {
      "environment": "${ENVIRONMENT}",
      "serviceName": "agent-coordinator-service",
      "serviceVersion": "${VERSION}",
      "loggingEnabled": true,
      "logLevel": "${LOG_LEVEL}",
      "authEnabled": ${ENABLE_API_AUTH},
      "rateLimitEnabled": true,
      "maxRequestsPerMinute": 100,
      "persistenceType": "${AGENT_STATE_PERSISTENCE}",
      "redisHost": "${REDIS_HOST}",
      "redisPort": ${REDIS_PORT},
      "redisDB": 0
    }