# 项目标识
sonar.projectKey=suoke_life_agent_coordinator
sonar.organization=suoke-life

# 项目名称和版本
sonar.projectName=代理协调服务
sonar.projectVersion=1.0.0

# 源代码路径
sonar.sources=src
sonar.tests=test

# 指定测试文件匹配模式
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# 排除生成的文件和测试文件
sonar.exclusions=node_modules/**,dist/**,coverage/**,**/*.d.ts,src/**/*.test.ts

# 覆盖率报告路径
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.testExecutionReportPaths=reports/jest-junit.xml

# 编码
sonar.sourceEncoding=UTF-8

# 语言
sonar.language=ts

# TypeScript配置文件路径
sonar.typescript.tsconfigPath=tsconfig.json

# 禁用复制粘贴检测的阈值
sonar.cpd.exclusions=**/*.test.ts,**/*.spec.ts

# 可达性
sonar.qualitygate.wait=true 