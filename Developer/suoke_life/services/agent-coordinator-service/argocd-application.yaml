apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-coordinator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.com/suoke-life/agent-coordinator-service.git
    targetRevision: HEAD
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: suoke-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - PruneLast=true
    - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-coordinator-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.suoke.life/suoke/agent-coordinator-service.git
    targetRevision: HEAD
    path: k8s/overlays/staging
    kustomize:
      images:
      - suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/agent-coordinator-service:staging
  destination:
    server: https://kubernetes.default.svc
    namespace: suoke-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-coordinator-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.suoke.life/suoke/agent-coordinator-service.git
    targetRevision: HEAD
    path: k8s/overlays/dev
    kustomize:
      images:
      - suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/agent-coordinator-service:dev
  destination:
    server: https://kubernetes.default.svc
    namespace: suoke-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true