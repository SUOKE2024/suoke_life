image: golang:1.20-alpine

variables:
  GO111MODULE: "on"
  CGO_ENABLED: "0"
  GOOS: "linux"
  GOARCH: "amd64"
  GOPATH: "$CI_PROJECT_DIR/.go"
  GOPRIVATE: "github.com/suoke-life"
  DOCKER_REGISTRY: "suoke-registry.cn-hangzhou.cr.aliyuncs.com"
  DOCKER_REPOSITORY: "suoke/agent-coordinator-service"
  IMAGE_TAG: ${CI_COMMIT_SHORT_SHA}
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: 1
  GO_VERSION: "1.20"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .go/pkg/mod/

stages:
  - lint
  - test
  - build
  - deploy
  - benchmark
  - chaos

.go-cache:
  variables:
    GOPATH: $CI_PROJECT_DIR/.go
  cache:
    paths:
      - .go/pkg/mod/

.docker:
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker login -u $ALIYUN_DOCKER_USERNAME -p $ALIYUN_DOCKER_PASSWORD $DOCKER_REGISTRY

golint:
  stage: lint
  image: golang:${GO_VERSION}-alpine
  extends: .go-cache
  script:
    - apk add --no-cache gcc musl-dev
    - go install golang.org/x/lint/golint@latest
    - go mod download
    - golint -set_exit_status ./...
  only:
    - merge_requests
    - main
    - staging
    - prod

gotest:
  stage: test
  image: golang:${GO_VERSION}-alpine
  extends: .go-cache
  script:
    - apk add --no-cache gcc musl-dev
    - go mod download
    - go test -v ./...
  only:
    - merge_requests
    - main
    - staging
    - prod

build:
  stage: build
  extends: .docker
  script:
    - echo "Building amd64 architecture image"
    - docker build 
      --build-arg VERSION=${CI_COMMIT_SHORT_SHA}
      --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
      --build-arg VCS_REF=${CI_COMMIT_SHA}
      --platform linux/amd64
      -t ${DOCKER_REGISTRY}/${DOCKER_REPOSITORY}:${IMAGE_TAG}
      -t ${DOCKER_REGISTRY}/${DOCKER_REPOSITORY}:latest .
    - docker push ${DOCKER_REGISTRY}/${DOCKER_REPOSITORY}:${IMAGE_TAG}
    - docker push ${DOCKER_REGISTRY}/${DOCKER_REPOSITORY}:latest
  only:
    - main
    - staging
    - prod

.deploy-template:
  image: 
    name: dtzar/helm-kubectl:3.12
    entrypoint: [""]
  script:
    - echo "Deploying to ${ENVIRONMENT} environment"
    - kubectl config use-context ${K8S_CONTEXT}
    - cd k8s/overlays/${ENVIRONMENT}
    - kustomize edit set image agent-coordinator=${DOCKER_REGISTRY}/${DOCKER_REPOSITORY}:${IMAGE_TAG}
    - kubectl apply -k .
    - kubectl rollout status deployment/agent-coordinator -n suoke

deploy-dev:
  stage: deploy
  extends: .deploy-template
  variables:
    ENVIRONMENT: dev
    K8S_CONTEXT: suoke-dev
  only:
    - main

deploy-staging:
  stage: deploy
  extends: .deploy-template
  variables:
    ENVIRONMENT: staging
    K8S_CONTEXT: suoke-staging
  only:
    - staging
  when: manual

deploy-prod:
  stage: deploy
  extends: .deploy-template
  variables:
    ENVIRONMENT: prod
    K8S_CONTEXT: suoke-prod
  only:
    - prod
  when: manual
  environment:
    name: production

benchmark:
  stage: benchmark
  image: alpine:3.17
  before_script:
    - apk add --no-cache go curl
  script:
    - go mod download
    - go run cmd/benchmark/main.go
  only:
    - merge_requests
    - main
    - tags

benchmark_schedule:
  stage: benchmark
  image: alpine:3.17
  before_script:
    - apk add --no-cache go curl
  script:
    - go mod download
    - go run cmd/benchmark/main.go --compare
  only:
    - schedules

chaos_test:
  stage: chaos
  image: alpine:3.17
  before_script:
    - apk add --no-cache go curl
  script:
    - go mod download
    - go run cmd/chaos/main.go
  only:
    - merge_requests
    - main
    - tags
  when: manual 