server {
    listen 80;
    server_name 118.31.223.213;
    
    # 访问日志配置
    access_log /var/log/nginx/suoke_access.log;
    error_log /var/log/nginx/suoke_error.log;

    # 静态网站根目录
    root /var/www/suoke.life/html;
    index index.html;

    # 默认首页
    location = / {
        try_files $uri $uri/ /index.html;
    }
    
    # 静态资源缓存设置
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    
    # API网关路由 - 所有API请求
    location /api/ {
        proxy_pass http://172.16.199.86:80/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
    
    # 特殊处理 - 认证服务直接路径
    location /auth/ {
        proxy_pass http://172.16.199.86:80/api/v1/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
    
    # 健康检查端点
    location /health {
        proxy_pass http://172.16.199.86:80/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 5s;
        proxy_connect_timeout 3s;
    }
    
    # AI服务路径
    location /ai/ {
        proxy_pass http://172.16.199.136:80/ai/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s; # AI操作可能需要更长时间
        proxy_connect_timeout 10s;
        proxy_buffering off; # 用于流式响应
    }
    
    # RAG服务路径
    location /rag/ {
        proxy_pass http://172.16.199.136:80/api/v1/rag/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s; 
        proxy_connect_timeout 10s;
    }
    
    # 数据服务路径 (如有必要直接访问)
    location /data/ {
        proxy_pass http://172.16.199.88:80/api/v1/data/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }
    
    # WebSocket支持 (AI聊天等)
    location /ws/ {
        proxy_pass http://172.16.199.136:80/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s; # WebSocket连接可能长时间保持
        proxy_send_timeout 3600s;
    }
    
    # 默认处理
    location / {
        try_files $uri $uri/ /index.html;
    }
} 