server {
    listen 80;
    server_name 118.31.223.213;
    
    # 访问日志配置
    access_log /var/log/nginx/suoke_access.log;
    error_log /var/log/nginx/suoke_error.log;

    # 静态网站根目录
    root /var/www/suoke.life/html;
    index index.html;

    # 默认首页
    location = / {
        try_files $uri $uri/ /index.html;
    }
    
    # 静态资源缓存设置
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    
    # API网关路由 - 所有API请求
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 特殊处理 - 认证服务直接路径
    location /auth/ {
        proxy_pass http://127.0.0.1:30001/api/v1/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 健康检查端点
    location /health {
        proxy_pass http://127.0.0.1:30001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # 默认处理
    location / {
        try_files $uri $uri/ /index.html;
    }
} 