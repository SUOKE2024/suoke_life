version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - suoke-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: suoke_test
    ports:
      - "3306:3306"
    volumes:
      - ./tests/mysql-init:/docker-entrypoint-initdb.d
    networks:
      - suoke-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_password"]
      interval: 5s
      timeout: 3s
      retries: 5
  
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    environment:
      - GO_ENV=test
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root_password
      - DB_NAME=suoke_test
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - suoke-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 3
  
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    environment:
      - GO_ENV=test
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - USER_SERVICE_URL=http://user-service:8082
      - JWT_SECRET=test_secret
      - JWT_EXPIRATION=15m
      - REFRESH_TOKEN_EXPIRATION=24h
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - suoke-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3
  
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    environment:
      - GO_ENV=test
      - AUTH_SERVICE_URL=http://auth-service:8081
      - USER_SERVICE_URL=http://user-service:8082
      - METRICS_ENABLED=true
      - METRICS_PATH=/metrics
      - LOG_LEVEL=debug
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - suoke-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  suoke-network:
    driver: bridge