apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-models-pvc
  namespace: suoke
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: alicloud-disk-efficiency
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: knowledge-data-pvc
  namespace: suoke
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: alicloud-disk-ssd
  resources:
    requests:
      storage: 100Gi 