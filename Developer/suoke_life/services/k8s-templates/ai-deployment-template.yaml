apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${SERVICE_NAME}
  namespace: suoke
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ${SERVICE_NAME}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ${SERVICE_NAME}
    spec:
      nodeSelector:
        suoke.life/node-pool: suoke-ai-np
      containers:
      - name: ${SERVICE_NAME}
        image: ${REGISTRY_URL}/${REGISTRY_NAMESPACE}/${SERVICE_NAME}:${TAG}
        ports:
        - containerPort: ${PORT}
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
            nvidia.com/gpu: ${GPU_COUNT:-0}
          limits:
            cpu: 2000m
            memory: 4Gi
            nvidia.com/gpu: ${GPU_COUNT:-0}
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "${PORT}"
        - name: ENABLE_GPU
          value: "${ENABLE_GPU:-false}"
        livenessProbe:
          httpGet:
            path: /health
            port: ${PORT}
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: ${PORT}
          initialDelaySeconds: 10
          periodSeconds: 15
        volumeMounts:
        - name: ${SERVICE_NAME}-config
          mountPath: /app/config
        - name: ai-models
          mountPath: /app/models
      volumes:
      - name: ${SERVICE_NAME}-config
        configMap:
          name: ${SERVICE_NAME}-config
      - name: ai-models
        persistentVolumeClaim:
          claimName: ai-models-pvc 