apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${SERVICE_NAME}
  namespace: suoke
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ${SERVICE_NAME}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ${SERVICE_NAME}
    spec:
      nodeSelector:
        suoke.life/node-pool: suoke-core-np
      containers:
      - name: ${SERVICE_NAME}
        image: ${REGISTRY_URL}/${REGISTRY_NAMESPACE}/${SERVICE_NAME}:${TAG}
        ports:
        - containerPort: ${PORT}
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "${PORT}"
        livenessProbe:
          httpGet:
            path: /health
            port: ${PORT}
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /ready
            port: ${PORT}
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: ${SERVICE_NAME}-config
          mountPath: /app/config
      volumes:
      - name: ${SERVICE_NAME}-config
        configMap:
          name: ${SERVICE_NAME}-config 