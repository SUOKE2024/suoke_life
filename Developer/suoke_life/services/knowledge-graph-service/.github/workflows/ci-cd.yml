name: 知识图谱服务 CI/CD 流水线

on:
  push:
    branches: 
      - main
      - develop
      - 'release/**'
      - 'feature/**'
    paths:
      - 'services/knowledge-graph-service/**'
      - '.github/workflows/knowledge-graph-service.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/knowledge-graph-service/**'
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      version:
        description: '手动指定版本号'
        required: false
        type: string

env:
  IMAGE_NAME: suokelife/knowledge-graph-service
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  GO_VERSION: 1.20

jobs:
  lint:
    name: 代码规范检查
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/knowledge-graph-service
    steps:
      - uses: actions/checkout@v3
      - name: 设置 Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: 安装 golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - name: 运行规范检查
        run: golangci-lint run ./...

  test:
    name: 单元测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/knowledge-graph-service
    steps:
      - uses: actions/checkout@v3
      - name: 设置 Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: 运行测试
        run: go test -v -race -coverprofile=coverage.out ./...
      - name: 上传测试覆盖率报告
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: ./services/knowledge-graph-service/coverage.out
          retention-days: 7

  security-scan:
    name: 安全扫描
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/knowledge-graph-service
    steps:
      - uses: actions/checkout@v3
      - name: 设置 Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: 安装 gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: 运行 gosec 安全扫描
        run: gosec ./...
      - name: 运行 nancy 依赖扫描
        run: |
          go list -json -deps ./... | go run github.com/sonatype-nexus-community/nancy@latest sleuth
      - name: 运行 SonarCloud 扫描
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ./services/knowledge-graph-service
          args: >
            -Dsonar.projectKey=suokelife_knowledge-graph-service
            -Dsonar.organization=suokelife

  build-and-push:
    name: 构建并推送镜像
    needs: [lint, test, security-scan]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 设置版本号
        id: version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "VERSION=$(date +'%Y%m%d')-$(git rev-parse --short HEAD)-release" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "VERSION=$(date +'%Y%m%d')-$(git rev-parse --short HEAD)-dev" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" =~ ^refs/heads/release/(.*)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "VERSION=${VERSION}-$(git rev-parse --short HEAD)-rc" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(date +'%Y%m%d')-$(git rev-parse --short HEAD)-snapshot" >> $GITHUB_OUTPUT
          fi

      - name: 登录到 Aliyun 容器镜像服务
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          install: true
          use: true
      
      - name: 设置 QEMU 用于多架构构建
        uses: docker/setup-qemu-action@v2
        with:
          platforms: linux/amd64,linux/arm64

      - name: 构建和推送多架构 Docker 镜像
        uses: docker/build-push-action@v4
        with:
          context: ./services/knowledge-graph-service
          file: ./services/knowledge-graph-service/Dockerfile.new
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: 构建和推送 AMD64 架构镜像
        uses: docker/build-push-action@v4
        with:
          context: ./services/knowledge-graph-service
          file: ./services/knowledge-graph-service/Dockerfile.amd64
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-amd64
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-amd64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-amd64,mode=max

      - name: 构建和推送 ARM64 架构镜像
        uses: docker/build-push-action@v4
        with:
          context: ./services/knowledge-graph-service
          file: ./services/knowledge-graph-service/Dockerfile.new
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-arm64
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-arm64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-arm64,mode=max

      - name: 创建 artifacts
        run: |
          mkdir -p ./artifacts
          echo "${{ steps.version.outputs.VERSION }}" > ./artifacts/version.txt
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}" > ./artifacts/image.txt
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-amd64" > ./artifacts/image-amd64.txt
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-arm64" > ./artifacts/image-arm64.txt

      - name: 上传 Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-info
          path: ./artifacts/
          retention-days: 7

  deploy-dev:
    name: 部署到开发环境
    if: (github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'dev') && github.event_name != 'pull_request'
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: 下载构建信息
        uses: actions/download-artifact@v3
        with:
          name: build-info
          path: ./artifacts/
      
      - name: 设置版本和镜像变量
        id: vars
        run: |
          echo "VERSION=$(cat ./artifacts/version.txt)" >> $GITHUB_OUTPUT
          echo "IMAGE=$(cat ./artifacts/image.txt)" >> $GITHUB_OUTPUT
      
      - name: 设置 Kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_DEV }}
      
      - name: 部署到 Kubernetes
        working-directory: ./services/knowledge-graph-service
        run: |
          cd k8s
          kubectl apply -k overlays/dev
          kubectl set image deployment/knowledge-graph knowledge-graph=${{ steps.vars.outputs.IMAGE }} -n suoke
          kubectl rollout status deployment/knowledge-graph -n suoke --timeout=180s
      
      - name: 发送部署通知到钉钉
        uses: ghostoy/dingtalk-action@master
        with:
          webhook: ${{ secrets.DINGTALK_WEBHOOK }}
          msgtype: markdown
          content: |
            {
              "title": "知识图谱服务部署通知",
              "text": "### 🚀 知识图谱服务已部署到开发环境\n\n**版本**: ${{ steps.vars.outputs.VERSION }}\n\n**部署人**: ${{ github.actor }}\n\n**相关提交**: [${{ github.sha }}](${{ github.event.repository.html_url }}/commit/${{ github.sha }})\n\n**详情**: [查看工作流](${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }})"
            }

  deploy-staging:
    name: 部署到预发布环境
    if: (github.ref == 'refs/heads/release/*' || github.event.inputs.environment == 'staging') && github.event_name != 'pull_request'
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: 下载构建信息
        uses: actions/download-artifact@v3
        with:
          name: build-info
          path: ./artifacts/
      
      - name: 设置版本和镜像变量
        id: vars
        run: |
          echo "VERSION=$(cat ./artifacts/version.txt)" >> $GITHUB_OUTPUT
          echo "IMAGE=$(cat ./artifacts/image.txt)" >> $GITHUB_OUTPUT
      
      - name: 设置 Kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}
      
      - name: 部署到 Kubernetes
        working-directory: ./services/knowledge-graph-service
        run: |
          cd k8s
          kubectl apply -k overlays/staging
          kubectl set image deployment/knowledge-graph knowledge-graph=${{ steps.vars.outputs.IMAGE }} -n suoke
          kubectl rollout status deployment/knowledge-graph -n suoke --timeout=180s
      
      - name: 发送部署通知到钉钉
        uses: ghostoy/dingtalk-action@master
        with:
          webhook: ${{ secrets.DINGTALK_WEBHOOK }}
          msgtype: markdown
          content: |
            {
              "title": "知识图谱服务部署通知",
              "text": "### 🚀 知识图谱服务已部署到预发布环境\n\n**版本**: ${{ steps.vars.outputs.VERSION }}\n\n**部署人**: ${{ github.actor }}\n\n**相关提交**: [${{ github.sha }}](${{ github.event.repository.html_url }}/commit/${{ github.sha }})\n\n**详情**: [查看工作流](${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }})"
            }

  deploy-prod:
    name: 部署到生产环境
    if: (github.ref == 'refs/heads/main' || github.event.inputs.environment == 'prod') && github.event_name != 'pull_request'
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: 下载构建信息
        uses: actions/download-artifact@v3
        with:
          name: build-info
          path: ./artifacts/
      
      - name: 设置版本和镜像变量
        id: vars
        run: |
          echo "VERSION=$(cat ./artifacts/version.txt)" >> $GITHUB_OUTPUT
          echo "IMAGE=$(cat ./artifacts/image.txt)" >> $GITHUB_OUTPUT
          echo "IMAGE_AMD64=$(cat ./artifacts/image-amd64.txt)" >> $GITHUB_OUTPUT
      
      - name: 设置 Kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}
      
      - name: 部署到 Kubernetes
        working-directory: ./services/knowledge-graph-service
        run: |
          # 确认AMD64镜像标签已设置
          export MULTI_ARCH_IMAGE=${{ steps.vars.outputs.IMAGE }}
          export AMD64_IMAGE=${{ steps.vars.outputs.IMAGE_AMD64 }}
          
          # 执行部署
          chmod +x ./scripts/deploy-to-k8s.sh
          ./scripts/deploy-to-k8s.sh suoke-prod
          
          # 确认部署状态
          kubectl rollout status deployment/knowledge-graph-service -n suoke-prod --timeout=300s
      
      - name: 发送部署通知到钉钉
        uses: ghostoy/dingtalk-action@master
        with:
          webhook: ${{ secrets.DINGTALK_WEBHOOK }}
          msgtype: markdown
          content: |
            {
              "title": "知识图谱服务部署通知",
              "text": "### 🚀 知识图谱服务已部署到生产环境\n\n**版本**: ${{ steps.vars.outputs.VERSION }}\n\n**多架构镜像**: ${{ steps.vars.outputs.IMAGE }}\n\n**AMD64镜像**: ${{ steps.vars.outputs.IMAGE_AMD64 }}\n\n**部署人**: ${{ github.actor }}\n\n**相关提交**: [${{ github.sha }}](${{ github.event.repository.html_url }}/commit/${{ github.sha }})\n\n**详情**: [查看工作流](${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }})"
            }

  notify-deployment-result:
    name: 通知部署结果
    needs: [deploy-dev, deploy-staging, deploy-prod]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 下载构建信息
        uses: actions/download-artifact@v3
        with:
          name: build-info
          path: ./artifacts/
      
      - name: 设置版本变量
        id: vars
        run: |
          echo "VERSION=$(cat ./artifacts/version.txt)" >> $GITHUB_OUTPUT
      
      - name: 部署结果通知
        uses: ghostoy/dingtalk-action@master
        with:
          webhook: ${{ secrets.DINGTALK_WEBHOOK }}
          msgtype: markdown
          content: |
            {
              "title": "知识图谱服务部署完成",
              "text": "### 📢 知识图谱服务部署摘要\n\n**版本**: ${{ steps.vars.outputs.VERSION }}\n\n**部署状态**:\n- 开发环境: ${{ needs.deploy-dev.result || '未部署' }}\n- 预发布环境: ${{ needs.deploy-staging.result || '未部署' }}\n- 生产环境: ${{ needs.deploy-prod.result || '未部署' }}\n\n**部署人**: ${{ github.actor }}\n\n**详情**: [查看工作流](${{ github.event.repository.html_url }}/actions/runs/${{ github.run_id }})"
            }