# 应用配置
APP_ENV=development
APP_PORT=3000
APP_HOST=0.0.0.0
LOG_LEVEL=info
SERVER_PROTOCOL=http

# Neo4j数据库配置
NEO4J_PROTOCOL=bolt
NEO4J_HOST=localhost
NEO4J_PORT=7687
NEO4J_DATABASE=suoke
NEO4J_USERNAME=neo4j
NEO4J_PASSWORD=password
NEO4J_CONNECTION_POOL_SIZE=10
NEO4J_CONNECTION_TIMEOUT=30000

# Redis配置
REDIS_HOST=localhost
REDIS_PORT=6379
REDIS_PASSWORD=
REDIS_DB=0
REDIS_PREFIX=kg_
REDIS_TTL=3600

# 向量数据库配置 (PGVector 或 Milvus)
VECTOR_DB_TYPE=pgvector
VECTOR_DB_HOST=localhost
VECTOR_DB_PORT=5432
VECTOR_DB_NAME=suoke_vectors
VECTOR_DB_USERNAME=postgres
VECTOR_DB_PASSWORD=password
VECTOR_DB_POOL_SIZE=10
VECTOR_DB_CONNECTION_TIMEOUT=30000

# OpenTelemetry配置
OTEL_ENABLED=true
OTEL_SERVICE_NAME=knowledge-graph-service
OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317
OTEL_EXPORTER_OTLP_PROTOCOL=grpc
OTEL_TRACES_SAMPLER=parentbased_traceidratio
OTEL_TRACES_SAMPLER_ARG=0.5
OTEL_METRICS_EXPORT_INTERVAL=15000
OTEL_LOGS_EXPORT_INTERVAL=15000

# API配置
API_TIMEOUT=30000
API_RATE_LIMIT=100
API_KEY=your-api-key-here
JWT_SECRET=your-jwt-secret-here

# API文档配置
ENABLE_API_DOCS=true
SWAGGER_PROTECTED=false
SWAGGER_USERNAME=admin
SWAGGER_PASSWORD=suoke@2024
SWAGGER_THEME_PRIMARY_COLOR=#35BB78

# 知识图谱配置
GRAPH_MAX_DEPTH=5
GRAPH_RELATIONSHIP_THRESHOLD=0.7
GRAPH_CACHE_TTL=3600
GRAPH_DEFAULT_BATCH_SIZE=100
GRAPH_MAX_RESULTS=1000

# 模型配置
EMBEDDING_MODEL_NAME=suoke-embeddings-v1
EMBEDDING_MODEL_PATH=/app/models/embeddings
EMBEDDING_DIMENSION=768
EMBEDDING_BATCH_SIZE=32
EMBEDDING_CACHE_ENABLED=true

# RAG服务配置
RAG_SERVICE_URL=http://rag-service:3000
RAG_TIMEOUT=30000
RAG_MAX_TOKENS=4096
RAG_API_KEY=your-rag-api-key

# 健康检查配置
HEALTH_CHECK_INTERVAL=30
HEALTH_CHECK_TIMEOUT=5
HEALTH_CHECK_STARTUP_THRESHOLD=60

# 安全配置
CORS_ENABLED=true
CORS_ORIGINS=http://localhost:3000,https://suoke.life
ENCRYPTION_KEY=your-encryption-key-here
VAULT_ENABLED=false
VAULT_ADDR=http://localhost:8200
VAULT_TOKEN=your-vault-token-here
VAULT_PATH=secret/knowledge-graph-service

# 可视化配置
VISUALIZATION_3D_ENABLED=true
VISUALIZATION_AR_ENABLED=true
VISUALIZATION_VR_ENABLED=true
VISUALIZATION_DEFAULT_LAYOUT=force
VISUALIZATION_MAX_NODES=500
VISUALIZATION_CACHE_TTL=1800

# 搜索配置
SEARCH_FUZZY_THRESHOLD=0.6
SEARCH_VECTOR_THRESHOLD=0.7
SEARCH_MAX_RESULTS=100
SEARCH_CACHE_TTL=1800
SEARCH_HIGHLIGHT_ENABLED=true
SEARCH_AUTOCOMPLETE_LIMIT=10

# 性能配置
PERFORMANCE_TIMEOUT_WARNING_THRESHOLD=5000
PERFORMANCE_MEMORY_WARNING_THRESHOLD=1073741824
PERFORMANCE_CPU_WARNING_THRESHOLD=80

# 阿里云容器镜像仓库凭据
REGISTRY_URL=suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/
REGISTRY_USERNAME=netsong@sina.com
REGISTRY_PASSWORD=Netsong2025 