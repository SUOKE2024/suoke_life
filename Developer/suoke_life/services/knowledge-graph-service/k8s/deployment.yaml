apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-graph-service
  namespace: suoke-prod
  labels:
    app: knowledge-graph-service
    tier: data
    component: knowledge-graph
  annotations:
    app.kubernetes.io/part-of: suoke-platform
    app.kubernetes.io/managed-by: argocd
    backup.velero.io/backup-volumes: "data,models,tmp"
    backup.velero.io/schedule: "daily"
    backup.velero.io/ttl: "720h"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: knowledge-graph-service
  template:
    metadata:
      labels:
        app: knowledge-graph-service
        tier: data
        component: knowledge-graph
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
        sidecar.istio.io/inject: "true"
    spec:
      # 节点亲和性 - 确保部署在数据服务节点池
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-type
                operator: In
                values:
                - stateful-services
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - knowledge-graph-service
              topologyKey: kubernetes.io/hostname
      
      # 污点容忍 - 允许部署在有污点的数据节点上
      tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "database"
        effect: "NoSchedule"
        
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      
      # 初始化容器 - 为主容器准备环境
      initContainers:
      - name: init-permissions
        image: busybox:1.34.1
        command: ["sh", "-c", "chmod -R 755 /app/data /app/models /app/tmp && chown -R 1000:1000 /app/data /app/models /app/tmp"]
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: false
          runAsUser: 0
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: models
          mountPath: /app/models
        - name: tmp
          mountPath: /app/tmp
      
      containers:
      - name: knowledge-graph-service
        image: suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/knowledge-graph-service-go:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        env:
        - name: ENV
          value: "production"
        - name: LOG_LEVEL
          value: "info"
        - name: LOG_FORMAT
          value: "json"
        - name: SERVER_PORT
          value: "8080"
        # Graph DB配置
        - name: DB_NEO4J_URI
          value: "bolt://neo4j-service:7687"
        - name: DB_NEO4J_USERNAME
          valueFrom:
            secretKeyRef:
              name: knowledge-graph-secrets
              key: neo4j-username
        - name: DB_NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: knowledge-graph-secrets
              key: neo4j-password
        - name: DB_NEO4J_DATABASE
          value: "suoke_knowledge_graph"
        # Redis配置
        - name: REDIS_HOST
          value: "redis-master"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: knowledge-graph-secrets
              key: redis-password
        # Milvus配置
        - name: MILVUS_URI
          value: "milvus-standalone:19530"
        - name: MILVUS_USERNAME
          valueFrom:
            secretKeyRef:
              name: knowledge-graph-secrets
              key: milvus-username
        - name: MILVUS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: knowledge-graph-secrets
              key: milvus-password
        # RAG服务配置
        - name: RAG_SERVICE_URL
          value: "http://rag-service:8000"
        # 安全配置
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: knowledge-graph-secrets
              key: api-key
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: knowledge-graph-secrets
              key: encryption-key
        # OpenTelemetry配置
        - name: OTEL_SERVICE_NAME
          value: "knowledge-graph-service"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://suoke-collector-collector.monitoring:4317"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.namespace=suoke,service.name=knowledge-graph-service"
        - name: OTEL_TRACES_SAMPLER
          value: "parentbased_traceidratio"
        - name: OTEL_TRACES_SAMPLER_ARG
          value: "0.5"
        - name: OTEL_LOGS_EXPORTER
          value: "otlp"
        - name: OTEL_METRICS_EXPORTER
          value: "otlp"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9464
          protocol: TCP
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: models
          mountPath: /app/models
        - name: tmp
          mountPath: /app/tmp
        - name: configs
          mountPath: /app/configs
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 12
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
      
      - name: fluent-bit
        image: fluent/fluent-bit:1.9.10
        imagePullPolicy: IfNotPresent
        command: ["/fluent-bit/bin/fluent-bit", "-c", "/fluent-bit/etc/fluent-bit.conf"]
        volumeMounts:
        - name: app-logs
          mountPath: /var/log/app
          readOnly: true
        - name: fluent-bit-config
          mountPath: /fluent-bit/etc/
        resources:
          limits:
            cpu: "100m"
            memory: "128Mi"
          requests:
            cpu: "50m"
            memory: "64Mi"
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
      
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: knowledge-graph-data-pvc
      - name: models
        persistentVolumeClaim:
          claimName: knowledge-graph-models-pvc
      - name: tmp
        emptyDir: {}
      - name: configs
        configMap:
          name: knowledge-graph-config
      - name: app-logs
        emptyDir: {}
      - name: fluent-bit-config
        configMap:
          name: knowledge-graph-fluentbit-config
      
      imagePullSecrets:
      - name: aliyun-registry-secret
      
      terminationGracePeriodSeconds: 60