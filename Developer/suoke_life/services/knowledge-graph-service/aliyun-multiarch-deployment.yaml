apiVersion: v1
kind: Service
metadata:
  name: knowledge-graph-service
  labels:
    app: knowledge-graph-service
    tier: backend
    part-of: suoke-platform
spec:
  ports:
  - port: 3000
    targetPort: 3000
  selector:
    app: knowledge-graph-service
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: knowledge-graph-config
data:
  APP_ENV: "{{APP_ENV}}"
  APP_PORT: "3000"
  APP_HOST: "0.0.0.0"
  LOG_LEVEL: "{{LOG_LEVEL}}"
  SERVER_PROTOCOL: "http"
  
  # 数据库连接配置在这里添加您的实际值
  NEO4J_PROTOCOL: "bolt"
  NEO4J_HOST: "neo4j-service"
  NEO4J_PORT: "7687"
  NEO4J_DATABASE: "suoke"
  
  # Redis配置
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_PREFIX: "kg_"
  
  # 向量数据库配置
  VECTOR_DB_TYPE: "pgvector"
  VECTOR_DB_HOST: "postgres-service"
  VECTOR_DB_PORT: "5432"
  VECTOR_DB_NAME: "suoke_vectors"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-graph-service
  labels:
    app: knowledge-graph-service
    tier: backend
    part-of: suoke-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: knowledge-graph-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: knowledge-graph-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: knowledge-graph-service
        image: "{{IMAGE_URL}}"
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        envFrom:
        - configMapRef:
            name: knowledge-graph-config
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        startupProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
        volumeMounts:
        - name: data-volume
          mountPath: /app/data
        - name: logs-volume
          mountPath: /app/logs
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: knowledge-graph-data-pvc
      - name: logs-volume
        emptyDir: {}
      imagePullSecrets:
      - name: suoke-registry-secret
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: knowledge-graph-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi