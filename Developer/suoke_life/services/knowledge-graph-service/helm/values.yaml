# 命名空间配置
namespace: default
createNamespace: false


# 默认全局设置
global:
  environment: production
  imageRegistry: suoke-registry.cn-hangzhou.cr.aliyuncs.com
  imagePullSecrets:
    - name: suoke-registry-secret
  storageClass: suoke-premium
  networkPolicy:
    enabled: true

# 应用设置
replicaCount: 2

image:
  repository: suoke/knowledge-graph-service-go
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets:
  - name: suoke-registry-secret

nameOverride: ""
fullnameOverride: ""

# 服务账号设置
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod注解
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9464"
  prometheus.io/path: "/metrics"
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/role: "suoke-knowledge-graph"
  vault.hashicorp.com/agent-inject-secret-db-creds: "suoke/data/knowledge-graph-service/db"

# Pod安全上下文
podSecurityContext:
  fsGroup: 1000
  runAsUser: 1000
  runAsNonRoot: true

# 容器安全上下文
securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false

# 服务设置
service:
  type: ClusterIP
  port: 8080
  metricsPort: 9464
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9464"

# Ingress设置
ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: kg.suoke.life
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: knowledge-graph-tls
      hosts:
        - kg.suoke.life

# 资源限制和请求
resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

# 自动伸缩设置
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60

# 节点亲和性和容忍设置
nodeSelector: {}

affinity: {}

tolerations: []

# 持久卷设置
persistence:
  enabled: true
  data:
    size: 50Gi
    storageClass: suoke-premium
    annotations:
      volume.beta.kubernetes.io/storage-provisioner: csi.aliyun.com
  models:
    size: 20Gi
    storageClass: suoke-premium
    annotations:
      volume.beta.kubernetes.io/storage-provisioner: csi.aliyun.com
  tmp:
    size: 10Gi
    storageClass: suoke-standard
    annotations:
      volume.beta.kubernetes.io/storage-provisioner: csi.aliyun.com

# 探针设置
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 12

# 环境变量设置
env:
  # 应用配置
  ENV: production
  SERVER_PORT: "8080"
  LOG_LEVEL: info
  LOG_FORMAT: json
  
  # Neo4j数据库配置
  DB_NEO4J_URI: bolt://neo4j-service:7687
  DB_NEO4J_DATABASE: suoke_knowledge_graph
  
  # Redis配置
  REDIS_HOST: redis-master
  REDIS_PORT: "6379"
  
  # Milvus向量数据库配置
  MILVUS_URI: milvus-standalone:19530
  
  # OpenTelemetry配置
  OTEL_SERVICE_NAME: knowledge-graph-service
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_RESOURCE_ATTRIBUTES: service.namespace=suoke,service.name=knowledge-graph-service
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.5"
  OTEL_LOGS_EXPORTER: otlp
  OTEL_METRICS_EXPORTER: otlp
  
  # 知识图谱配置
  GRAPH_MAX_DEPTH: "5"
  GRAPH_RELATIONSHIP_THRESHOLD: "0.7"
  GRAPH_CACHE_TTL: "3600"
  
  # RAG服务配置
  RAG_SERVICE_URL: http://rag-service:8000

# 密钥环境变量
secret:
  DB_NEO4J_USERNAME: placeholder
  DB_NEO4J_PASSWORD: placeholder
  MILVUS_USERNAME: placeholder
  MILVUS_PASSWORD: placeholder
  REDIS_PASSWORD: placeholder
  API_KEY: placeholder
  ENCRYPTION_KEY: placeholder

# 服务监控设置
serviceMonitor:
  enabled: true
  interval: 15s
  scrapeTimeout: 10s
  selector:
    release: prometheus

# Istio服务网格设置
istio:
  enabled: true
  mtls:
    mode: PERMISSIVE
  gateway:
    enabled: true
    host: kg.suoke.life
    tls:
      enabled: true
      secretName: knowledge-graph-tls

# ConfigMap配置
config:
  enabled: false

# Neo4j依赖设置 
neo4j:
  enabled: false  # 使用外部Neo4j服务

# Redis依赖设置
redis:
  enabled: false  # 使用外部Redis服务

# Milvus依赖设置
milvus:
  enabled: false  # 使用外部Milvus服务

# FluentBit日志收集配置
fluentBit:
  enabled: true
  config:
    service:
      flush: 1
      daemon: off
      log_level: info
    input:
      name: tail
      path: /var/log/app/*.log
      parser: json
    filter:
      name: kubernetes
      match: kube.*
    output:
      name: elasticsearch
      match: "*"
      host: elasticsearch-master
      port: 9200
      logstash_format: on
      logstash_prefix: knowledge-graph
      replace_dots: on
      retry_limit: 3
