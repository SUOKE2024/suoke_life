# 存储类保持不变，仅修改探针配置
persistence:
  data:
    storageClassName: "alicloud-disk-essd"  # 保持原始值
  models:
    storageClassName: "alicloud-disk-essd"  # 保持原始值
  tmp:
    storageClassName: "alicloud-disk-essd"  # 保持原始值

service:
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
    - port: 9464
      targetPort: metrics
      protocol: TCP
      name: prometheus

deployment:
  annotations:
    # 添加时间戳以触发重新部署
    timestamp: "2025-04-07T19:30:00Z"
  
  ports:
    - name: http
      containerPort: 8080
      protocol: TCP
    - name: metrics
      containerPort: 9464
      protocol: TCP

  livenessProbe:
    # 明确使用httpGet类型探针
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    
  readinessProbe:
    # 明确使用httpGet类型探针
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# 禁用其他探针类型
tcpSocket: null
exec: null 