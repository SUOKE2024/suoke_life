apiVersion: v1
kind: Service
metadata:
  name: knowledge-graph-service
  namespace: default
  labels:
    app: knowledge-graph-service
spec:
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 9464
      targetPort: 9464
      protocol: TCP
      name: metrics
  selector:
    app: knowledge-graph-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-graph-service
  namespace: default
  labels:
    app: knowledge-graph-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knowledge-graph-service
  template:
    metadata:
      labels:
        app: knowledge-graph-service
    spec:
      containers:
        - name: knowledge-graph-service
          image: knowledge-graph-service:scratch
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9464
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: models
              mountPath: /app/models
            - name: tmp
              mountPath: /app/tmp
          env:
            - name: LOG_LEVEL
              value: "debug"
            - name: DEBUG
              value: "true"
      volumes:
        - name: data
          emptyDir: {}
        - name: models
          emptyDir: {}
        - name: tmp
          emptyDir: {} 