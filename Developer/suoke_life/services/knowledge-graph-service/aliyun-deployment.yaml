apiVersion: v1
kind: ConfigMap
metadata:
  name: knowledge-graph-service-config
  namespace: suoke-services
data:
  default.yaml: |
    server:
      port: 8080
      ginMode: release
    
    db:
      uri: neo4j://neo4j-service:7687
      username: neo4j
      password: password
    
    logLevel: info

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-graph-service
  namespace: suoke-services
  labels:
    app: knowledge-graph-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knowledge-graph-service
  template:
    metadata:
      labels:
        app: knowledge-graph-service
    spec:
      containers:
      - name: knowledge-graph-service
        image: suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/knowledge-graph-service:latest
        imagePullPolicy: Always
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 256Mi
        ports:
        - containerPort: 8080
          name: http
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
      volumes:
      - name: config-volume
        configMap:
          name: knowledge-graph-service-config
      imagePullSecrets:
      - name: aliyun-registry-secret

---
apiVersion: v1
kind: Service
metadata:
  name: knowledge-graph-service
  namespace: suoke-services
spec:
  selector:
    app: knowledge-graph-service
  ports:
  - name: http
    port: 80
    targetPort: 8080
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: knowledge-graph-service-ingress
  namespace: suoke-services
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: kg.suoke.life
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: knowledge-graph-service
            port:
              number: 80 