name: XiaoAI Service CI/CD

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'services/xiaoai-service/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'services/xiaoai-service/**'
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development

jobs:
  test:
    name: 测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/xiaoai-service

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: services/xiaoai-service/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 代码风格检查
        run: npm run lint

      - name: 单元测试
        run: npm run test:unit

  build-and-push:
    name: 构建并推送镜像
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: services/xiaoai-service/package-lock.json

      - name: 安装依赖
        working-directory: services/xiaoai-service
        run: npm ci

      - name: 构建TypeScript项目
        working-directory: services/xiaoai-service
        run: npm run build

      - name: 配置QEMU
        uses: docker/setup-qemu-action@v2

      - name: 配置Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: 获取版本号
        id: package-version
        working-directory: services/xiaoai-service
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          echo "commit_sha=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: 确定镜像标签
        id: determine-tags
        env:
          VERSION: ${{ steps.package-version.outputs.version }}
          COMMIT_SHA: ${{ steps.package-version.outputs.commit_sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          # 始终添加版本号和特定提交的标签
          TAGS="suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/xiaoai-service:${VERSION}"
          TAGS="${TAGS},suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/xiaoai-service:${VERSION}-${COMMIT_SHA}"
          
          # 根据分支添加不同的标签
          if [[ "$BRANCH" == "main" || "$BRANCH" == "master" ]]; then
            TAGS="${TAGS},suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/xiaoai-service:latest"
            TAGS="${TAGS},suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/xiaoai-service:stable"
          elif [[ "$BRANCH" == "develop" ]]; then
            TAGS="${TAGS},suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/xiaoai-service:develop"
          else
            TAGS="${TAGS},suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/xiaoai-service:${BRANCH}"
          fi
          
          # 如果是手动触发，则添加环境标签
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAGS="${TAGS},suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/xiaoai-service:${{ github.event.inputs.environment }}"
          fi
          
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: 登录阿里云容器镜像服务
        uses: docker/login-action@v2
        with:
          registry: suoke-registry.cn-hangzhou.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v4
        with:
          context: services/xiaoai-service
          platforms: linux/amd64
          push: true
          tags: ${{ steps.determine-tags.outputs.tags }}
          cache-from: type=registry,ref=suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/xiaoai-service:buildcache
          cache-to: type=registry,ref=suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke/xiaoai-service:buildcache,mode=max

  deploy-to-k8s:
    name: 部署到Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) || github.event_name == 'workflow_dispatch'
    env:
      DOCKER_REGISTRY: suoke-registry.cn-hangzhou.cr.aliyuncs.com/suoke

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 获取版本号
        id: package-version
        working-directory: services/xiaoai-service
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: 安装envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: 设置环境变量
        id: set-env
        run: |
          # 设置默认环境
          ENV_NAME="${{ github.event.inputs.environment || 'production' }}"
          
          # 根据环境设置命名空间
          if [[ "$ENV_NAME" == "production" ]]; then
            NAMESPACE="suoke-services"
          elif [[ "$ENV_NAME" == "staging" ]]; then
            NAMESPACE="suoke-staging"
          else
            NAMESPACE="suoke-dev"
          fi
          
          echo "env_name=${ENV_NAME}" >> $GITHUB_OUTPUT
          echo "namespace=${NAMESPACE}" >> $GITHUB_OUTPUT

      - name: 设置Kubernetes配置
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: 检查命名空间是否存在
        id: check-namespace
        run: |
          NS="${{ steps.set-env.outputs.namespace }}"
          if kubectl get namespace $NS &> /dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: 创建命名空间（如果不存在）
        if: steps.check-namespace.outputs.exists == 'false'
        run: |
          kubectl create namespace ${{ steps.set-env.outputs.namespace }}

      - name: 部署到Kubernetes
        working-directory: services/xiaoai-service
        env:
          NAMESPACE: ${{ steps.set-env.outputs.namespace }}
          ENV_NAME: ${{ steps.set-env.outputs.env_name }}
          SERVICE_VERSION: ${{ steps.package-version.outputs.version }}
        run: |
          # 创建临时部署文件目录
          mkdir -p k8s-deploy
          mkdir -p k8s-deploy/networkpolicies
          
          # 使用envsubst处理环境变量
          for file in k8s/*.yaml; do
            envsubst < $file > k8s-deploy/$(basename $file)
          done
          
          # 处理子目录中的文件
          for file in k8s/networkpolicies/*.yaml; do
            if [ -f "$file" ]; then
              envsubst < $file > k8s-deploy/networkpolicies/$(basename $file)
            fi
          done
          
          # 应用K8s配置
          kubectl apply -f k8s-deploy/ -n ${NAMESPACE}
          kubectl apply -f k8s-deploy/networkpolicies/ -n ${NAMESPACE}
          
          # 等待部署完成
          kubectl rollout status deployment/xiaoai-service -n ${NAMESPACE}

      - name: 部署后检查
        if: success()
        env:
          NAMESPACE: ${{ steps.set-env.outputs.namespace }}
        run: |
          echo "✅ 部署成功！检查服务状态..."
          kubectl get pods -l app=xiaoai-service -n ${NAMESPACE}
          kubectl get svc -l app=xiaoai-service -n ${NAMESPACE} 