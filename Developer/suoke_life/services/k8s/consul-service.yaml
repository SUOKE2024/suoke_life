apiVersion: v1
kind: Service
metadata:
  name: suoke-discovery
  namespace: suoke
  labels:
    app: suoke-discovery
    component: consul
spec:
  type: ClusterIP
  ports:
  - port: 8500
    targetPort: 8500
    protocol: TCP
    name: http
  - port: 8600
    targetPort: 8600
    protocol: TCP
    name: dns
  selector:
    app: suoke-discovery