apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: suoke-dev

bases:
  - ../../base

patchesStrategicMerge:
  - ../../patches/dev-overlay.yaml
  - ../../patches/resource-limits-patch.yaml

configMapGenerator:
  - name: rag-service-config
    behavior: merge
    literals:
      - RAG_LOG_LEVEL=debug
      - RAG_DEBUG=true
      - RAG_ENV=development
      - RAG_VECTOR_DB_TYPE=faiss

images:
  - name: rag-service
    newName: registry.suoke.life/rag-service
    newTag: dev-latest