apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: suoke-prod
  labels:
    app: rag-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: rag-service
        image: ubuntu:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash", "-c"]
        args:
          - |
            apt-get update && apt-get install -y ca-certificates tzdata
            echo "RAG服务镜像占位符，实际部署时需要替换为真实镜像"
            sleep infinity
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: rag-config
        env:
        # Neo4j配置
        - name: RAG_NEO4J_URI
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: neo4j-uri
        - name: RAG_NEO4J_USER
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: neo4j-user
        - name: RAG_NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: neo4j-password
        - name: RAG_NEO4J_DATABASE
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: neo4j-database
              
        # Redis配置
        - name: RAG_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: redis-password
        - name: RAG_REDIS_SSL
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: redis-ssl
              
        # LLM服务配置
        - name: RAG_LLM_SERVICE_URL
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: llm-service-url
        - name: RAG_LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: llm-api-key
              
        # JWT配置
        - name: RAG_JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: jwt-secret-key
        - name: RAG_JWT_ALGORITHM
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: jwt-algorithm
              
        volumeMounts:
        - name: ssl-certs
          mountPath: /etc/ssl/certs/api.suoke.life.crt
          subPath: ssl-cert
        - name: ssl-keys
          mountPath: /etc/ssl/private/api.suoke.life.key
          subPath: ssl-key
        - name: logs
          mountPath: /var/log/rag-service
          
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
            
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 15
          
      volumes:
      - name: ssl-certs
        secret:
          secretName: rag-secrets
          items:
          - key: ssl-cert
            path: ssl-cert
      - name: ssl-keys
        secret:
          secretName: rag-secrets
          items:
          - key: ssl-key
            path: ssl-key
      - name: logs
        emptyDir: {}
        
      imagePullSecrets:
      - name: aliyun-registry-secret

---
apiVersion: v1
kind: Service
metadata:
  name: rag-service
  namespace: suoke-prod
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  - port: 9090
    targetPort: metrics
    protocol: TCP
    name: metrics
  selector:
    app: rag-service

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-service
  namespace: suoke-prod
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.suoke.life
    secretName: rag-tls
  rules:
  - host: api.suoke.life
    http:
      paths:
      - path: /rag
        pathType: Prefix
        backend:
          service:
            name: rag-service
            port:
              name: http 