name: RAG服务 CI/CD 流水线

on:
  push:
    branches: [ main, release/*, feature/* ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  IMAGE_NAME: rag-service
  REGISTRY: registry.suoke.life

jobs:
  lint-test:
    name: 代码检查与测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 设置版本号
        id: set_version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            VERSION=$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)
          elif [[ "${{ github.ref }}" =~ ^refs/heads/release/.* ]]; then
            VERSION=$(echo ${{ github.ref }} | sed 's|refs/heads/release/||')
          else
            VERSION=$(git rev-parse --short HEAD)
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 设置Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pylint mypy black

      - name: 代码格式检查
        run: black --check src tests

      - name: 类型检查
        run: mypy src

      - name: 代码风格检查
        run: pylint --disable=all --enable=E,F,W src tests

      - name: 单元测试
        run: pytest --cov=src tests/

      - name: 上传测试覆盖率报告
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: htmlcov/
  
  security-scan:
    name: 安全扫描
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v3

      - name: 依赖安全扫描
        uses: snyk/actions/python@master
        with:
          args: --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: 构建临时镜像用于扫描
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan

      - name: 容器镜像扫描
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: 上传安全扫描结果
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
  
  build-push:
    name: 构建和推送镜像
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v3

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: 登录阿里云容器镜像服务
        uses: aliyun/acr-login@v1
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 确定版本号
        id: version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            VERSION=$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)
          elif [[ "${{ github.ref }}" =~ ^refs/heads/release/.* ]]; then
            VERSION=$(echo ${{ github.ref }} | sed 's|refs/heads/release/||')
          else
            VERSION=$(git rev-parse --short HEAD)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "$VERSION" > VERSION
          
      - name: 构建推送镜像
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
  
  deploy-dev:
    name: 部署到开发环境
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'dev'
    environment:
      name: development
      url: https://dev.api.suoke.life/rag
    steps:
      - uses: actions/checkout@v3

      - name: 设置Kubectl
        uses: azure/setup-kubectl@v3

      - name: 配置Kubernetes凭证
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_DEV }}

      - name: 更新镜像版本
        run: |
          cd k8s/overlays/dev
          kustomize edit set image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.version }}

      - name: 部署应用
        run: |
          kubectl apply -k k8s/overlays/dev

      - name: 验证部署
        run: |
          kubectl rollout status deployment/rag -n suoke-dev --timeout=180s

  deploy-staging:
    name: 部署到预发布环境
    runs-on: ubuntu-latest
    needs: [build-push, deploy-dev]
    if: startsWith(github.ref, 'refs/heads/release/') || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.api.suoke.life/rag
    steps:
      - uses: actions/checkout@v3

      - name: 设置Kubectl
        uses: azure/setup-kubectl@v3

      - name: 配置Kubernetes凭证
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: 更新镜像版本
        run: |
          cd k8s/overlays/staging
          kustomize edit set image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.version }}

      - name: 部署应用
        run: |
          kubectl apply -k k8s/overlays/staging

      - name: 验证部署
        run: |
          kubectl rollout status deployment/rag -n suoke-staging --timeout=180s

  deploy-prod:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: [build-push, deploy-staging]
    if: startsWith(github.ref, 'refs/heads/release/') || github.event.inputs.environment == 'prod'
    environment:
      name: production
      url: https://api.suoke.life/rag
    steps:
      - uses: actions/checkout@v3

      - name: 设置Kubectl
        uses: azure/setup-kubectl@v3

      - name: 配置Kubernetes凭证
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}

      - name: 更新镜像版本
        run: |
          cd k8s/overlays/prod
          kustomize edit set image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.version }}

      - name: 部署应用
        run: |
          kubectl apply -k k8s/overlays/prod

      - name: 验证部署
        run: |
          kubectl rollout status deployment/rag -n suoke --timeout=180s

  load-test:
    name: 负载测试
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v3

      - name: 安装k6
        run: |
          curl -s https://packagecloud.io/install/repositories/k6/k6/script.deb.sh | sudo bash
          sudo apt-get install k6

      - name: 运行负载测试
        run: |
          k6 run tests/load/load-test.js --out json=load_test_results/results.json

      - name: 分析测试结果
        run: |
          python scripts/analyze_load_test.py -f load_test_results/results.json -t 500

      - name: 上传测试结果
        uses: actions/upload-artifact@v3
        with:
          name: load-test-results
          path: load_test_results/

  notify:
    name: 部署结果通知
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-staging, deploy-prod, load-test]
    if: always()
    steps:
      - name: 发送钉钉通知
        uses: zcong1993/actions-ding@master
        with:
          dingToken: ${{ secrets.DING_TALK_TOKEN }}
          body: |
            {
              "msgtype": "markdown",
              "markdown": {
                "title": "RAG服务部署状态",
                "text": "### RAG服务部署状态 📢\n\n**版本**: ${{ needs.build-push.outputs.version }}\n\n**环境状态**:\n- 开发环境: ${{ needs.deploy-dev.result || '未触发' }}\n- 预发布环境: ${{ needs.deploy-staging.result || '未触发' }}\n- 生产环境: ${{ needs.deploy-prod.result || '未触发' }}\n- 负载测试: ${{ needs.load-test.result || '未触发' }}\n\n**触发者**: ${{ github.actor }}\n\n[查看工作流详情](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
              }
            }