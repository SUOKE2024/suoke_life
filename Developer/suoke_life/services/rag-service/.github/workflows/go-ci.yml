name: RAG服务 Go CI/CD 流水线

on:
  push:
    branches: [ main, release/*, feature/* ]
    paths:
      - 'go-src/**'
      - '.github/workflows/go-ci.yml'
      - 'Dockerfile.go'
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  IMAGE_NAME: rag-service
  REGISTRY: registry.suoke.life
  GO_VERSION: '1.21'

jobs:
  lint-test:
    name: Go代码检查与测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 设置版本号
        id: set_version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            VERSION=$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)
          elif [[ "${{ github.ref }}" =~ ^refs/heads/release/.* ]]; then
            VERSION=$(echo ${{ github.ref }} | sed 's|refs/heads/release/||')
          else
            VERSION=$(git rev-parse --short HEAD)
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 设置Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 安装依赖
        run: |
          cd go-src
          go mod download

      - name: 代码格式检查
        run: |
          cd go-src
          go fmt ./...
          if [ -n "$(git status --porcelain)" ]; then
            echo "代码格式不符合规范，请运行go fmt"
            exit 1
          fi

      - name: 静态代码分析
        run: |
          cd go-src
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: 单元测试
        run: |
          cd go-src
          go test -v -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

      - name: 上传测试覆盖率报告
        uses: actions/upload-artifact@v3
        with:
          name: go-coverage-report
          path: go-src/coverage.out
  
  security-scan:
    name: Go安全扫描
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v3

      - name: 设置Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go依赖安全扫描
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: ${{ env.GO_VERSION }}
          go-package: './go-src/...'

      - name: 构建临时镜像用于扫描
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./go-src/Dockerfile
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan

      - name: 容器镜像扫描
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: 上传安全扫描结果
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
  
  build-push:
    name: 构建和推送Go镜像
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v3

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: 登录阿里云容器镜像服务
        uses: aliyun/acr-login@v1
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 确定版本号
        id: version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            VERSION=$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)
          elif [[ "${{ github.ref }}" =~ ^refs/heads/release/.* ]]; then
            VERSION=$(echo ${{ github.ref }} | sed 's|refs/heads/release/||')
          else
            VERSION=$(git rev-parse --short HEAD)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "$VERSION" > VERSION
          
      - name: 构建推送镜像
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./go-src/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
  
  deploy-dev:
    name: 部署Go服务到开发环境
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'dev'
    environment:
      name: development
      url: https://dev.api.suoke.life/rag
    steps:
      - uses: actions/checkout@v3

      - name: 设置Kubectl
        uses: azure/setup-kubectl@v3

      - name: 配置Kubernetes凭证
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_DEV }}

      - name: 更新镜像版本
        run: |
          cd k8s/overlays/dev
          kustomize edit set image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.version }}

      - name: 部署应用
        run: |
          # 确保命名空间存在
          kubectl get ns suoke-dev || kubectl create ns suoke-dev
          # 部署应用
          kubectl apply -k k8s/overlays/dev

      - name: 验证部署
        run: |
          kubectl rollout status deployment/rag-service -n suoke-dev --timeout=180s
      
      - name: 执行健康检查
        run: |
          # 等待服务启动
          sleep 20
          # 获取服务IP
          SERVICE_URL=$(kubectl get svc rag-service -n suoke-dev -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          # 检查健康端点
          curl -f http://$SERVICE_URL:8080/health || exit 1

  deploy-staging:
    name: 部署Go服务到预发布环境
    runs-on: ubuntu-latest
    needs: [build-push, deploy-dev]
    if: startsWith(github.ref, 'refs/heads/release/') || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.api.suoke.life/rag
    steps:
      - uses: actions/checkout@v3

      - name: 设置Kubectl
        uses: azure/setup-kubectl@v3

      - name: 配置Kubernetes凭证
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: 更新镜像版本
        run: |
          cd k8s/overlays/staging
          kustomize edit set image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.version }}

      - name: 部署应用
        run: |
          kubectl apply -k k8s/overlays/staging

      - name: 验证部署
        run: |
          kubectl rollout status deployment/rag-service -n suoke-staging --timeout=180s
      
      - name: 执行健康检查
        run: |
          # 等待服务启动
          sleep 20
          # 获取服务IP
          SERVICE_URL=$(kubectl get svc rag-service -n suoke-staging -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          # 检查健康端点
          curl -f http://$SERVICE_URL:8080/health || exit 1

  deploy-prod:
    name: 部署Go服务到生产环境
    runs-on: ubuntu-latest
    needs: [build-push, deploy-staging]
    if: startsWith(github.ref, 'refs/heads/release/') || github.event.inputs.environment == 'prod'
    environment:
      name: production
      url: https://api.suoke.life/rag
    steps:
      - uses: actions/checkout@v3

      - name: 设置Kubectl
        uses: azure/setup-kubectl@v3

      - name: 配置Kubernetes凭证
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}

      - name: 更新镜像版本
        run: |
          cd k8s/overlays/prod
          kustomize edit set image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.version }}

      - name: 部署应用
        run: |
          kubectl apply -k k8s/overlays/prod
          
      - name: 验证部署
        run: |
          kubectl rollout status deployment/rag-service -n suoke-prod --timeout=300s
      
      - name: 执行生产环境健康检查
        run: |
          # 等待服务启动
          sleep 30
          # 获取服务IP
          SERVICE_URL=$(kubectl get svc rag-service -n suoke-prod -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          # 检查健康端点
          curl -f http://$SERVICE_URL:8080/health || exit 1
          
      - name: 执行功能验证
        run: |
          # 使用测试脚本验证基本功能
          cd scripts
          chmod +x verify_go_deployment.sh
          ./verify_go_deployment.sh --env=prod
          
  notify:
    name: 发送通知
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-staging, deploy-prod]
    if: always()
    steps:
      - name: 检查部署状态
        id: check
        run: |
          if [[ "${{ needs.deploy-dev.result }}" == "success" && "${{ contains(needs.*.result, 'failure') }}" == "false" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=Go版RAG服务部署成功！版本: ${{ needs.build-push.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=Go版RAG服务部署失败，请检查CI/CD日志" >> $GITHUB_OUTPUT
          fi
          
      - name: 发送钉钉通知
        uses: zcong1993/actions-ding@master
        with:
          dingToken: ${{ secrets.DING_TALK_TOKEN }}
          body: |
            {
              "msgtype": "markdown",
              "markdown": {
                "title": "Go版RAG服务部署通知",
                "text": "### RAG服务部署状态: ${{ steps.check.outputs.status }}\n\n${{ steps.check.outputs.message }}\n\n> 分支: ${{ github.ref }}\n\n> 提交者: ${{ github.actor }}\n\n> [查看详细CI/CD日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
              }
            } 