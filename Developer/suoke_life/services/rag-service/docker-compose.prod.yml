version: '3.8'

services:
  rag-service:
    image: suoke/rag-service:latest
    container_name: suoke-rag-service
    restart: always
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    environment:
      - TZ=Asia/Shanghai
      - ENV=production
      - LOG_LEVEL=info
      - MAX_CONCURRENCY=8
      - ENABLE_PROFILING=false
    ports:
      - "8080:8080"
    networks:
      - suoke-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Redis用于缓存和队列管理
  redis:
    image: redis:alpine
    container_name: suoke-redis
    restart: always
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-suokeLife2024}
    networks:
      - suoke-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  # PostgreSQL用于向量存储
  postgres:
    image: ankane/pgvector:latest
    container_name: suoke-postgres
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-suoke}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-suokeLife2024}
      - POSTGRES_DB=${POSTGRES_DB:-ragdb}
    networks:
      - suoke-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suoke"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # Nginx反向代理
  nginx:
    image: nginx:stable-alpine
    container_name: suoke-nginx
    restart: always
    volumes:
      - ./deployment/nginx/conf.d:/etc/nginx/conf.d
      - ./deployment/nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - rag-service
    networks:
      - suoke-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

volumes:
  redis-data:
  postgres-data:

networks:
  suoke-net:
    driver: bridge 