global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    scrape_interval: 5s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api-gateway:9090']
    
  - job_name: 'prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['localhost:9090'] 