apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: api-gateway-logs-pvc
spec:
  storageClassName: alicloud-disk-ssd
  resources:
    requests:
      storage: 8Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: api-gateway-config-pvc
spec:
  storageClassName: alicloud-disk-ssd
  resources:
    requests:
      storage: 1Gi 