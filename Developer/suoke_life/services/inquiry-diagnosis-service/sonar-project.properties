sonar.projectKey=suokelife_inquiry-diagnosis-service
sonar.organization=suokelife

# 项目名称和版本
sonar.projectName=索克生活问诊服务
sonar.projectVersion=1.0

# 源代码目录
sonar.sources=src
sonar.tests=tests

# 排除的目录
sonar.exclusions=node_modules/**,dist/**,coverage/**,**/*.test.ts,**/*.spec.ts
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# 语言
sonar.language=ts
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# 字符集
sonar.sourceEncoding=UTF-8

# 分支分析配置
sonar.branch.name=${env.GITHUB_REF_NAME}

# 质量门设置
sonar.qualitygate.wait=true