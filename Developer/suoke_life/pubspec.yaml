name: suoke_life
description: A comprehensive health management platform integrating traditional Chinese medicine and modern preventive medicine concepts.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.5
  flutter_svg: ^2.0.6
  google_fonts: ^4.0.4
  cached_network_image: ^3.2.3
  lottie: ^3.3.1
  shimmer: ^3.0.0
  flutter_screenutil: ^5.8.4
  
  # Architecture
  flutter_riverpod: ^2.4.4
  riverpod_annotation: ^2.2.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  auto_route: ^10.0.1
  
  # Storage
  sqflite: ^2.2.8+4
  path: ^1.8.3
  path_provider: ^2.0.15
  flutter_secure_storage: ^8.0.0
  shared_preferences: ^2.1.2
  
  # Network
  dio: ^5.2.1+1
  connectivity_plus: ^4.0.1
  http: ^1.2.0
  
  # Authentication
  jwt_decoder: ^2.0.1
  local_auth: ^2.1.6
  
  # Utils
  intl: ^0.19.0
  logger: ^1.4.0
  uuid: ^4.5.1
  collection: ^1.17.1
  rxdart: ^0.27.7
  url_launcher: ^6.1.12
  equatable: ^2.0.5
  flutter_dotenv: ^5.1.0
  
  # Sensors & Hardware
  sensors_plus: ^3.0.2
  permission_handler: ^10.4.0
  camera: ^0.10.5+2
  image_picker: ^1.0.0
  audio_session: ^0.1.16
  just_audio: ^0.9.34
  record: ^4.4.4
  geolocator: ^9.0.2
  
  # AI & ML
  tflite_flutter: ^0.10.1
  google_ml_kit: ^0.16.1
  
  # FFI 与 Rust 集成相关
  ffi: ^2.1.0
  flutter_rust_bridge: ^1.82.1
  
  # 状态管理
  flutter_staggered_grid_view: ^0.7.0
  
  # 路由
  flutter_launcher_icons: ^0.13.1
  image: ^4.5.3
  
  # 后台服务
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.2
  
  # 设备传感器和信息
  device_info_plus: ^9.0.2
  activity_recognition_flutter: ^5.0.0
  light: ^3.0.0 
  noise_meter: ^5.0.2
  workmanager: ^0.5.2
  
  # 加密和安全
  encrypt: ^5.0.3
  crypto: ^3.0.3
  
  # 数据可视化
  fl_chart: ^0.63.0
  syncfusion_flutter_charts: ^24.2.6
  graphview: ^1.2.0
  
  # 多媒体与多模态
  speech_to_text: ^6.3.0
  flutter_tts: ^4.2.2
  video_player: ^2.8.4
  
  # 机器学习
  vector_math: ^2.1.4
  
  # 添加缺失的依赖
  package_info_plus: ^8.3.0
  web: ^1.1.1
  dartz: ^0.10.1
  internet_connection_checker: ^1.0.0+1
  mockito: ^5.4.5
  auto_route_generator: ^10.0.1
  
  # 区块链相关
  web3dart: ^2.7.3
  web_socket_channel: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^2.0.2
  
  # 代码生成
  build_runner: ^2.4.14
  freezed: ^2.4.5          # 与freezed_annotation 2.4.1保持兼容
  json_serializable: ^6.8.0 # 最新稳定版6.x
  riverpod_generator: ^2.4.0 # 匹配Riverpod 2.4.x
  test: any
  golden_toolkit: ^0.15.0
  network_image_mock: ^2.1.1
  collection: ^1.17.2

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/datasets/
    - assets/contracts/
    - .env
    - .env.development
    - .env.test
    - .env.production

  fonts:
    - family: PingFang SC
      fonts:
        - asset: assets/fonts/PingFang-SC-Regular.ttf
          weight: 400
        - asset: assets/fonts/PingFang-SC-Medium.ttf
          weight: 500
        - asset: assets/fonts/PingFang-SC-Semibold.ttf
          weight: 600

flutter_intl:
  enabled: true
  class_name: S
  main_locale: zh_CN
  arb_dir: assets/locales/arb
  output_dir: lib/generated
  use_deferred_loading: false

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.jpg"
  image_path_ios: "assets/images/app_icon.jpg"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#35BB78"
  adaptive_icon_foreground: "assets/images/app_icon.jpg"
  web:
    generate: true
    image_path: "assets/images/app_icon.jpg"
    background_color: "#35BB78"
    theme_color: "#35BB78"
  windows:
    generate: true
    image_path: "assets/images/app_icon.jpg"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/app_icon.jpg"