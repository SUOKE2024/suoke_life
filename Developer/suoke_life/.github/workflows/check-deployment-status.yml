name: 检查部署状态

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["RAG Service Podman CI/CD"]
    types:
      - completed

jobs:
  check-status:
    runs-on: macos-14-arm64
    permissions:
      contents: read
      packages: read
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取版本信息
        id: version
        run: |
          VERSION=$(cat services/rag-service/VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "检查版本: $VERSION"

      - name: 安装必要工具
        run: |
          brew install jq
          brew install wget
          brew install podman

      - name: 检查镜像状态
        env:
          REGISTRY_URL: suoke-registry.cn-hangzhou.cr.aliyuncs.com
          REGISTRY_USERNAME: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}
        run: |
          # 启动Podman
          podman machine init
          podman machine start
          
          echo "正在检查镜像仓库状态..."
          
          # 使用Podman登录镜像仓库
          echo "$REGISTRY_PASSWORD" | podman login --username=$REGISTRY_USERNAME $REGISTRY_URL --password-stdin
          
          # 检查latest标签
          echo "检查latest标签状态："
          podman pull $REGISTRY_URL/suoke/rag-service:latest || echo "latest标签不存在"
          
          # 检查版本标签
          echo "检查版本标签状态："
          podman pull $REGISTRY_URL/suoke/rag-service:${{ steps.version.outputs.version }} || echo "版本标签不存在"
          
          # 列出本地镜像
          echo "本地镜像状态："
          podman images | grep rag-service || echo "未找到本地镜像"

      - name: 检查Kubernetes配置
        run: |
          echo "检查Kubernetes配置文件..."
          if [ -d "services/rag-service/k8s" ]; then
            echo "找到K8s配置目录"
            echo "K8s配置文件列表："
            ls -la services/rag-service/k8s/
            echo "配置文件内容摘要："
            for file in services/rag-service/k8s/*.yaml; do
              if [ -f "$file" ]; then
                echo "=== $(basename $file) ==="
                head -n 5 "$file"
                echo "..."
              fi
            done
          else
            echo "K8s配置目录不存在"
          fi

      - name: 检查构建产物
        run: |
          echo "检查最新构建产物..."
          mkdir -p /tmp/artifacts
          
          # 尝试下载最新的构建产物
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/SUOKE2024/suoke_life/actions/artifacts" \
            > /tmp/artifacts/artifacts.json
            
          echo "最新构建产物信息："
          cat /tmp/artifacts/artifacts.json | jq '.artifacts[] | select(.name=="k8s-configs") | {name, created_at, size_in_bytes}'

      - name: 生成部署状态报告
        run: |
          echo "===================="
          echo "部署状态检查报告"
          echo "===================="
          echo "检查时间: $(date)"
          echo "版本: ${{ steps.version.outputs.version }}"
          echo "镜像地址: ${REGISTRY_URL}/suoke/rag-service"
          echo ""
          
          echo "1. 版本信息"
          echo "------------"
          cat services/rag-service/VERSION
          echo ""
          
          echo "2. K8s配置状态"
          echo "------------"
          if [ -d "services/rag-service/k8s" ]; then
            echo "配置文件数量: $(ls -1 services/rag-service/k8s/*.yaml 2>/dev/null | wc -l)"
            echo "配置文件列表:"
            ls -la services/rag-service/k8s/
          else
            echo "未找到K8s配置目录"
          fi
          echo ""
          
          echo "3. 镜像状态"
          echo "------------"
          echo "镜像仓库: ${REGISTRY_URL}/suoke/rag-service"
          podman images | grep rag-service || echo "未找到本地镜像"
          echo ""
          
          echo "4. 检查结果"
          echo "------------"
          echo "✓ 代码检出完成"
          echo "✓ 版本信息获取完成"
          echo "✓ 镜像状态检查完成"
          echo "✓ K8s配置检查完成"
          echo ""
          
          echo "5. 运行环境"
          echo "------------"
          echo "操作系统: $(sw_vers -productName) $(sw_vers -productVersion)"
          echo "Podman版本: $(podman version)"
          echo "Runner: macos-14-arm64"
          echo ""
          
          echo "====================" 