name: 检查部署状态

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["RAG Service Podman CI/CD"]
    types:
      - completed

jobs:
  check-status:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取版本信息
        id: version
        run: |
          VERSION=$(cat services/rag-service/VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "检查版本: $VERSION"

      - name: 检查镜像状态
        env:
          REGISTRY_URL: suoke-registry.cn-hangzhou.cr.aliyuncs.com
          REGISTRY_USERNAME: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}
        run: |
          # 安装阿里云CLI
          wget https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz
          tar xzvf aliyun-cli-linux-latest-amd64.tgz
          sudo mv aliyun /usr/local/bin/
          
          # 配置阿里云CLI
          aliyun configure set \
            --profile default \
            --mode AK \
            --region cn-hangzhou \
            --access-key-id ${{ secrets.ALIYUN_ACCESS_KEY_ID }} \
            --access-key-secret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
            
          echo "正在检查镜像仓库状态..."
          
          # 使用Docker登录镜像仓库
          echo "$REGISTRY_PASSWORD" | docker login --username=$REGISTRY_USERNAME $REGISTRY_URL --password-stdin
          
          # 检查latest标签
          echo "检查latest标签状态："
          docker pull $REGISTRY_URL/suoke/rag-service:latest || echo "latest标签不存在"
          
          # 检查版本标签
          echo "检查版本标签状态："
          docker pull $REGISTRY_URL/suoke/rag-service:${{ steps.version.outputs.version }} || echo "版本标签不存在"
          
          # 列出本地镜像
          echo "本地镜像状态："
          docker images | grep rag-service

      - name: 检查Kubernetes配置
        run: |
          echo "检查Kubernetes配置文件..."
          if [ -d "services/rag-service/k8s" ]; then
            echo "找到K8s配置目录"
            ls -la services/rag-service/k8s/
          else
            echo "K8s配置目录不存在"
          fi

      - name: 保存检查结果
        uses: actions/upload-artifact@v4
        with:
          name: deployment-status
          path: |
            services/rag-service/k8s/
            services/rag-service/VERSION
          retention-days: 5

      - name: 检查构建产物
        run: |
          echo "检查最新构建产物..."
          mkdir -p /tmp/artifacts
          
          # 尝试下载最新的构建产物
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/SUOKE2024/suoke_life/actions/artifacts" \
            > /tmp/artifacts/artifacts.json
            
          echo "最新构建产物信息："
          cat /tmp/artifacts/artifacts.json | jq '.artifacts[] | select(.name=="k8s-configs") | {name, created_at, size_in_bytes}'

      - name: 输出检查结果
        run: |
          echo "部署状态检查完成"
          echo "检查时间: $(date)"
          echo "版本: ${{ steps.version.outputs.version }}"
          echo "镜像地址: ${REGISTRY_URL}/suoke/rag-service" 