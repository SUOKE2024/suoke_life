name: API Gateway CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/api-gateway/**'
      - 'services/shared/**'
      - '.github/workflows/api-gateway.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/api-gateway/**'
      - 'services/shared/**'
      - '.github/workflows/api-gateway.yml'
  workflow_dispatch:

jobs:
  test:
    name: Test API Gateway
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'services/api-gateway/package.json'
      
      - name: Install dependencies
        run: |
          cd services/api-gateway
          npm ci
      
      - name: Run linting
        run: |
          cd services/api-gateway
          npm run lint
      
      - name: Run tests
        run: |
          cd services/api-gateway
          npm test
  
  build:
    name: Build API Gateway
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure Aliyun credentials
        uses: aliyun/acr-login@v1
        with:
          login-server: https://registry.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}
      
      - name: Build, tag, and push image to Aliyun Container Registry
        id: build-image
        env:
          ACR_REGISTRY: registry.aliyuncs.com
          ACR_NAMESPACE: suoke
          IMAGE_NAME: api-gateway
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd services/api-gateway
          docker build -t $ACR_REGISTRY/$ACR_NAMESPACE/$IMAGE_NAME:$IMAGE_TAG .
          docker tag $ACR_REGISTRY/$ACR_NAMESPACE/$IMAGE_NAME:$IMAGE_TAG $ACR_REGISTRY/$ACR_NAMESPACE/$IMAGE_NAME:latest
          docker push $ACR_REGISTRY/$ACR_NAMESPACE/$IMAGE_NAME:$IMAGE_TAG
          docker push $ACR_REGISTRY/$ACR_NAMESPACE/$IMAGE_NAME:latest
          echo "image=$ACR_REGISTRY/$ACR_NAMESPACE/$IMAGE_NAME:$IMAGE_TAG" >> $GITHUB_OUTPUT
  
  deploy-dev:
    name: Deploy to Dev K8s
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: development
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      
      - name: Update Kubernetes deployment
        run: |
          # 替换YAML文件中的镜像标签
          cd scripts/deploy/kubernetes
          sed -i "s|image:.*api-gateway.*|image: ${{ needs.build.outputs.image }}|g" api-gateway.yaml
          
          # 应用Kubernetes配置
          kubectl apply -f api-gateway.yaml -n suoke
          
          # 等待部署完成
          kubectl rollout status deployment/api-gateway -n suoke --timeout=300s
  
  deploy-prod:
    name: Deploy to Production K8s
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.suoke.life
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      
      - name: Update Kubernetes deployment
        run: |
          # 替换YAML文件中的镜像标签
          cd scripts/deploy/kubernetes
          sed -i "s|image:.*api-gateway.*|image: ${{ needs.build.outputs.image }}|g" api-gateway.yaml
          
          # 应用Kubernetes配置
          kubectl apply -f api-gateway.yaml -n suoke-prod
          
          # 等待部署完成
          kubectl rollout status deployment/api-gateway -n suoke-prod --timeout=300s 