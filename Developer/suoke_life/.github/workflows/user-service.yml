name: User Service CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/user-service/**'
      - 'services/shared/**'
      - '.github/workflows/user-service.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/user-service/**'
      - 'services/shared/**'
      - '.github/workflows/user-service.yml'
  workflow_dispatch:

jobs:
  test:
    name: Test User Service
    runs-on: ubuntu-latest
    permissions:
      contents: read    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: suoke_user_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'services/user-service/package.json'
      
      - name: Install dependencies
        run: |
          cd services/user-service
          npm ci
      
      - name: Run linting
        run: |
          cd services/user-service
          npm run lint
      
      - name: Run migrations
        run: |
          cd services/user-service
          npm run db:migrate
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: suoke_user_test
      
      - name: Run tests
        run: |
          cd services/user-service
          npm test
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: suoke_user_test
          NODE_ENV: test
  
  build:
    name: Build User Service
    runs-on: ubuntu-latest
    permissions:
      contents: read    needs: test
    if: github.event_name != 'pull_request'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure Aliyun credentials
        uses: aliyun/acr-login@v1
        with:
          login-server: https://registry.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}
      
      - name: Build, tag, and push image to Aliyun Container Registry
        id: build-image
        env:
          ACR_REGISTRY: registry.aliyuncs.com
          ACR_NAMESPACE: suoke
          IMAGE_NAME: user-service
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd services/user-service
          docker build -t $ACR_REGISTRY/$ACR_NAMESPACE/$IMAGE_NAME:$IMAGE_TAG .
          docker tag $ACR_REGISTRY/$ACR_NAMESPACE/$IMAGE_NAME:$IMAGE_TAG $ACR_REGISTRY/$ACR_NAMESPACE/$IMAGE_NAME:latest
          docker push $ACR_REGISTRY/$ACR_NAMESPACE/$IMAGE_NAME:$IMAGE_TAG
          docker push $ACR_REGISTRY/$ACR_NAMESPACE/$IMAGE_NAME:latest
          echo "image=$ACR_REGISTRY/$ACR_NAMESPACE/$IMAGE_NAME:$IMAGE_TAG" >> $GITHUB_OUTPUT
  
  deploy-dev:
    name: Deploy to Dev K8s
    runs-on: ubuntu-latest
    permissions:
      contents: read    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: development
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      
      - name: Update Kubernetes deployment
        run: |
          # 替换YAML文件中的镜像标签
          cd scripts/deploy/kubernetes
          sed -i "s|image:.*user-service.*|image: ${{ needs.build.outputs.image }}|g" user-service.yaml
          
          # 应用Kubernetes配置
          kubectl apply -f user-service.yaml -n suoke
          
          # 等待部署完成
          kubectl rollout status deployment/user-service -n suoke --timeout=300s
      
      - name: Run DB migrations
        run: |
          # 创建一个临时任务来运行数据库迁移
          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: user-db-migrate-${{ github.sha }}
            namespace: suoke
          spec:
            ttlSecondsAfterFinished: 600
            template:
              spec:
                containers:
                - name: migrate
                  image: ${{ needs.build.outputs.image }}
                  command: ["npm", "run", "db:migrate"]
                  env:
                  - name: NODE_ENV
                    value: development
                restartPolicy: Never
            backoffLimit: 3
          EOF
          
          # 等待迁移任务完成
          kubectl wait --for=condition=complete --timeout=300s job/user-db-migrate-${{ github.sha }} -n suoke
  
  deploy-prod:
    name: Deploy to Production K8s
    runs-on: ubuntu-latest
    permissions:
      contents: read    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.suoke.life/api/v1/users/health
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      
      - name: Update Kubernetes deployment
        run: |
          # 替换YAML文件中的镜像标签
          cd scripts/deploy/kubernetes
          sed -i "s|image:.*user-service.*|image: ${{ needs.build.outputs.image }}|g" user-service.yaml
          
          # 应用Kubernetes配置
          kubectl apply -f user-service.yaml -n suoke-prod
          
          # 等待部署完成
          kubectl rollout status deployment/user-service -n suoke-prod --timeout=300s
      
      - name: Run DB migrations in production
        run: |
          # 创建一个临时任务来运行数据库迁移
          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: user-db-migrate-prod-${{ github.sha }}
            namespace: suoke-prod
          spec:
            ttlSecondsAfterFinished: 600
            template:
              spec:
                containers:
                - name: migrate
                  image: ${{ needs.build.outputs.image }}
                  command: ["npm", "run", "db:migrate"]
                  env:
                  - name: NODE_ENV
                    value: production
                restartPolicy: Never
            backoffLimit: 3
          EOF
          
          # 等待迁移任务完成
          kubectl wait --for=condition=complete --timeout=300s job/user-db-migrate-prod-${{ github.sha }} -n suoke-prod 