name: RAG Service CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/rag-service/**'
      - '.github/workflows/rag-service-ci-cd.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/rag-service/**'
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - staging
          - prod
      version:
        description: '版本标签 (默认为auto)'
        required: false
        default: 'auto'
      skip_tests:
        description: '跳过测试'
        required: false
        default: false
        type: boolean
      multi_arch:
        description: '构建多架构镜像'
        required: false
        default: true
        type: boolean

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  IMAGE_NAME: suoke/rag-service
  SERVICE_DIR: services/rag-service

jobs:
  test:
    name: 测试
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      
      - name: 设置Go环境
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: 安装依赖
        run: |
          cd ${{ env.SERVICE_DIR }}
          go mod download
      
      - name: 静态代码分析
        run: |
          cd ${{ env.SERVICE_DIR }}
          go vet ./...
      
      - name: 运行单元测试
        run: |
          cd ${{ env.SERVICE_DIR }}
          go test -v ./internal/...
      
      - name: 运行集成测试
        run: |
          cd ${{ env.SERVICE_DIR }}
          ./scripts/run_integrated_tests.sh
      
      - name: 运行TCM特征测试
        run: |
          cd ${{ env.SERVICE_DIR }}
          go run ./tests/test_multimodal.go -image ./tests/samples/tongue.jpg -query "舌红苔白" -verbose
      
      - name: 保存测试结果
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: ${{ env.SERVICE_DIR }}/tests/test_results
          retention-days: 5
  
  build:
    name: 构建多架构镜像
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      
      - name: 设置版本号
        id: version
        run: |
          if [ "${{ inputs.version }}" = "auto" ] || [ "${{ inputs.version }}" = "" ]; then
            VERSION="$(date +'%Y%m%d%H%M%S')-$(echo ${{ github.sha }} | cut -c1-7)"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      
      - name: 登录到阿里云容器镜像服务
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}
      
      - name: 设置 QEMU 用于多架构构建
        if: ${{ inputs.multi_arch != false }}
        uses: docker/setup-qemu-action@v2
        with:
          platforms: 'arm64,amd64'
      
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: 构建并推送多架构镜像
        if: ${{ inputs.multi_arch != false }}
        uses: docker/build-push-action@v4
        with:
          context: ./${{ env.SERVICE_DIR }}
          file: ./${{ env.SERVICE_DIR }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            BUILD_VERSION=${{ env.VERSION }}
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            COMMIT_SHA=${{ github.sha }}
      
      - name: 构建并推送单架构镜像
        if: ${{ inputs.multi_arch == false }}
        uses: docker/build-push-action@v4
        with:
          context: ./${{ env.SERVICE_DIR }}
          file: ./${{ env.SERVICE_DIR }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            BUILD_VERSION=${{ env.VERSION }}
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            COMMIT_SHA=${{ github.sha }}
      
      - name: 输出镜像信息
        run: |
          echo "镜像已构建并推送: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}"
          if [ "${{ inputs.multi_arch }}" != "false" ]; then
            echo "已构建架构: linux/amd64, linux/arm64"
          else
            echo "已构建架构: linux/amd64"
          fi

  deploy:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    
    environment:
      name: ${{ inputs.environment || 'prod' }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      
      - name: 设置 Kubernetes 环境
        uses: azure/k8s-set-context@v1
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
      
      - name: 设置环境变量
        run: |
          if [ "${{ inputs.version }}" = "auto" ] || [ "${{ inputs.version }}" = "" ]; then
            VERSION="$(date +'%Y%m%d%H%M%S')-$(echo ${{ github.sha }} | cut -c1-7)"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          DEPLOY_ENV="${{ inputs.environment }}"
          if [ -z "$DEPLOY_ENV" ]; then
            DEPLOY_ENV="prod"
          fi
          echo "DEPLOY_ENV=$DEPLOY_ENV" >> $GITHUB_ENV
          
          echo "NAMESPACE=suoke-$DEPLOY_ENV" >> $GITHUB_ENV
      
      - name: 检查并创建命名空间
        run: |
          kubectl get namespace ${{ env.NAMESPACE }} || kubectl create namespace ${{ env.NAMESPACE }}
      
      - name: 创建镜像拉取密钥
        run: |
          kubectl create secret docker-registry aliyun-registry-secret \
            --docker-server=${{ env.REGISTRY }} \
            --docker-username=${{ secrets.ALIYUN_REGISTRY_USERNAME }} \
            --docker-password=${{ secrets.ALIYUN_REGISTRY_PASSWORD }} \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -
      
      - name: 修改k8s配置文件中的镜像标签
        run: |
          # 更新kustomization.yaml中的镜像标签
          sed -i "s|newTag:.*|newTag: ${{ env.VERSION }}|g" ${{ env.SERVICE_DIR }}/k8s/overlays/${{ env.DEPLOY_ENV }}/kustomization.yaml
          
          echo "已更新 ${{ env.SERVICE_DIR }}/k8s/overlays/${{ env.DEPLOY_ENV }}/kustomization.yaml 中的镜像标签为 ${{ env.VERSION }}"
      
      - name: 部署到 Kubernetes
        run: |
          kubectl apply -k ${{ env.SERVICE_DIR }}/k8s/overlays/${{ env.DEPLOY_ENV }}
          echo "已应用配置到命名空间: ${{ env.NAMESPACE }}"
      
      - name: 等待部署完成
        run: |
          kubectl rollout status deployment/rag-service -n ${{ env.NAMESPACE }} --timeout=300s
      
      - name: 部署后验证
        run: |
          # 等待服务可用
          echo "等待服务完全启动..."
          sleep 30
          
          # 获取服务信息
          SERVICE_TYPE=$(kubectl get svc rag-service -n ${{ env.NAMESPACE }} -o jsonpath='{.spec.type}')
          
          if [ "$SERVICE_TYPE" == "LoadBalancer" ]; then
            SERVICE_URL=$(kubectl get svc rag-service -n ${{ env.NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            # 执行健康检查
            curl -s -f "http://$SERVICE_URL:8080/health" || exit 1
            echo "部署验证成功！服务已可用于: http://$SERVICE_URL:8080"
          else
            # 对于非LoadBalancer类型服务的验证
            echo "服务类型为 $SERVICE_TYPE，跳过外部URL验证"
            # 使用端口转发进行本地验证
            kubectl port-forward svc/rag-service 8080:8080 -n ${{ env.NAMESPACE }} &
            PF_PID=$!
            sleep 5
            curl -s -f "http://localhost:8080/health" || exit 1
            kill $PF_PID
            echo "部署验证成功！服务运行状态正常"
          fi
      
      - name: 发送部署通知
        if: always()
        run: |
          if [ "$?" == "0" ]; then
            DEPLOY_STATUS="✅ 成功"
          else
            DEPLOY_STATUS="❌ 失败"
          fi
          
          curl -X POST ${{ secrets.WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d '{
              "msgtype": "markdown",
              "markdown": {
                "title": "RAG服务部署状态",
                "text": "### RAG服务部署状态\n**环境**: ${{ env.DEPLOY_ENV }}\n**版本**: ${{ env.VERSION }}\n**状态**: '"$DEPLOY_STATUS"'\n**时间**: '"$(date '+%Y-%m-%d %H:%M:%S')"'\n**执行人**: ${{ github.actor }}\n[查看详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
              }
            }' || echo "无法发送通知"
