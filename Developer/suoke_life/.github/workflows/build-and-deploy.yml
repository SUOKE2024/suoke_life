name: 构建与部署

on:
  push:
    branches: [ main, master ]
    paths:
      - 'services/**'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch:
    inputs:
      service:
        description: '要部署的服务'
        required: true
        default: 'api-gateway'
        type: choice
        options:
          - api-gateway
          - rag-service
          - user-service
          - content-service
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - staging
          - production

env:
  REGISTRY_SERVER: registry.cn-hangzhou.aliyuncs.com
  REGISTRY_NAMESPACE: suoke

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 检测变更的服务
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            api-gateway:
              - 'services/api-gateway/**'
            rag-service:
              - 'services/rag-service/**'
            user-service:
              - 'services/user-service/**'
            content-service:
              - 'services/content-service/**'

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.services != '[]' }}
    strategy:
      matrix:
        service: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{}"]', github.event.inputs.service)) || fromJSON(needs.detect-changes.outputs.services) }}
        environment: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{}"]', github.event.inputs.environment)) || fromJSON('["production"]') }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置时间戳
        id: timestamp
        run: |
          echo "timestamp=$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

      - name: 设置镜像标签
        id: set-image
        run: |
          echo "image_tag=${{ steps.timestamp.outputs.timestamp }}-${{ matrix.environment }}" >> $GITHUB_OUTPUT
          echo "full_image_name=${{ env.REGISTRY_SERVER }}/${{ env.REGISTRY_NAMESPACE }}/${{ matrix.service }}:${{ steps.timestamp.outputs.timestamp }}-${{ matrix.environment }}" >> $GITHUB_OUTPUT

      - name: 登录阿里云容器镜像服务
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY_SERVER }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: 构建并推送镜像
        uses: docker/build-push-action@v4
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ steps.set-image.outputs.full_image_name }}
          cache-from: type=registry,ref=${{ env.REGISTRY_SERVER }}/${{ env.REGISTRY_NAMESPACE }}/${{ matrix.service }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY_SERVER }}/${{ env.REGISTRY_NAMESPACE }}/${{ matrix.service }}:cache,mode=max

      - name: 设置Kubernetes配置
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: 更新部署配置
        run: |
          # 创建临时目录
          mkdir -p k8s-temp
          
          # 复制部署配置
          cp -r scripts/deploy/kubernetes/${{ matrix.service }}.yaml k8s-temp/deployment.yaml
          
          # 更新镜像标签
          sed -i "s|image:.*|image: ${{ steps.set-image.outputs.full_image_name }}|g" k8s-temp/deployment.yaml
          
          # 注入JWT密钥（如果服务需要）
          if [ "${{ matrix.service }}" == "api-gateway" ]; then
            # 检查ConfigMap是否存在
            if kubectl get configmap ${{ matrix.service }}-config -n suoke 2>/dev/null; then
              kubectl delete configmap ${{ matrix.service }}-config -n suoke
            fi
            
            # 创建包含JWT密钥的ConfigMap
            kubectl create configmap ${{ matrix.service }}-config \
              --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -n suoke
          fi
          
          # 显示配置文件内容（调试用）
          echo "部署配置:"
          cat k8s-temp/deployment.yaml

      - name: 部署到Kubernetes
        run: |
          kubectl apply -f k8s-temp/deployment.yaml
          
          # 等待部署完成
          echo "等待部署完成..."
          kubectl rollout status deployment/${{ matrix.service }} -n suoke --timeout=300s
          
          # 显示部署状态
          echo "部署状态:"
          kubectl get deployment ${{ matrix.service }} -n suoke
          
          # 显示Pod状态
          echo "Pod状态:"
          kubectl get pods -n suoke -l app=${{ matrix.service }}
        
      - name: 验证部署
        run: |
          # 等待服务就绪
          sleep 30
          
          # 获取Pod状态
          READY_PODS=$(kubectl get pods -n suoke -l app=${{ matrix.service }} -o jsonpath='{.items[?(@.status.phase=="Running")].metadata.name}')
          
          if [ -z "$READY_PODS" ]; then
            echo "服务未能成功部署，检查Pod日志:"
            FAILED_POD=$(kubectl get pods -n suoke -l app=${{ matrix.service }} -o jsonpath='{.items[0].metadata.name}')
            kubectl logs $FAILED_POD -n suoke
            exit 1
          else
            echo "服务已成功部署。"
            POD_NAME=$(echo $READY_PODS | cut -d' ' -f1)
            echo "Pod日志:"
            kubectl logs $POD_NAME -n suoke --tail=20
          fi
          
          # 显示服务信息
          echo "服务信息:"
          kubectl get service ${{ matrix.service }} -n suoke
          
      - name: 部署通知
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "::notice::🎉 服务 ${{ matrix.service }} 已成功部署到 ${{ matrix.environment }} 环境"
          else
            echo "::error::❌ 服务 ${{ matrix.service }} 部署到 ${{ matrix.environment }} 环境失败"
          fi 