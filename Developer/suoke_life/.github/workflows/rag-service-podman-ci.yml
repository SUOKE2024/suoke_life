name: RAG Service Docker CI/CD

on:
  push:
    paths:
      - 'services/rag-service/**'
      - '.github/workflows/rag-service-podman-ci.yml'
  workflow_dispatch:

env:
  REGISTRY_URL: suoke-registry.cn-hangzhou.cr.aliyuncs.com
  REGISTRY_NAMESPACE: suoke
  REGISTRY_USERNAME: netsong@sina.com
  REGISTRY_PASSWORD: Netsong2025

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Docker
        uses: docker/setup-buildx-action@v3
        
      - name: 显示Docker版本
        run: docker --version

      - name: 登录阿里云镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: 构建和推送镜像
        run: |
          cd services/rag-service
          VERSION=$(cat VERSION)
          echo "当前版本: $VERSION"
          IMAGE_NAME="${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/rag-service:${VERSION}"
          
          # 列出文件确认存在
          ls -la
          echo "确认Dockerfile存在:"
          cat Dockerfile
          
          # 使用Docker构建镜像
          echo "开始构建镜像..."
          docker build -t ${IMAGE_NAME} .
          
          echo "推送镜像 ${IMAGE_NAME}..."
          docker push ${IMAGE_NAME}
          
          # 同时标记latest标签
          echo "标记latest标签..."
          docker tag ${IMAGE_NAME} ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/rag-service:latest
          
          echo "推送latest标签..."
          docker push ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/rag-service:latest
          
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "IMAGE_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "镜像构建和推送完成"

      - name: 准备Kubernetes配置
        run: |
          # 创建临时目录用于存储K8s配置
          mkdir -p /tmp/k8s-configs
          
          # 复制现有K8s配置文件
          cp -r services/rag-service/k8s/* /tmp/k8s-configs/ || echo "No pre-existing K8s configs found"
          
          # 使用环境变量替换K8s配置中的变量
          export REGISTRY_URL=${{ env.REGISTRY_URL }}
          export REGISTRY_NAMESPACE=${{ env.REGISTRY_NAMESPACE }}
          export IMAGE_TAG=${IMAGE_VERSION}
          
          # 创建应用时间戳文件
          echo "Deployment timestamp: $(date)" > /tmp/k8s-configs/deploy-timestamp.txt
          echo "Image: ${REGISTRY_URL}/${REGISTRY_NAMESPACE}/rag-service:${IMAGE_TAG}" >> /tmp/k8s-configs/deploy-timestamp.txt
          echo "Version: ${IMAGE_VERSION}" >> /tmp/k8s-configs/deploy-timestamp.txt
          echo "K8s配置准备完成"

      - name: 上传Kubernetes配置
        uses: actions/upload-artifact@v4
        with:
          name: k8s-configs
          path: /tmp/k8s-configs
          retention-days: 7 