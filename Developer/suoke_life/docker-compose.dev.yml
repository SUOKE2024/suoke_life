version: '3.8'

services:
  # API网关服务
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    image: suokelife/api-gateway:dev
    container_name: suoke-api-gateway
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - PORT=8000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    volumes:
      - ./services/api-gateway:/app
      - /app/node_modules
    networks:
      - suoke-network
    depends_on:
      - otel-collector
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 知识图谱服务
  knowledge-graph-service:
    build:
      context: ./services/knowledge-graph-service
      dockerfile: Dockerfile
    image: suokelife/knowledge-graph-service:dev
    container_name: suoke-kg-service
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - PORT=3010
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=suokelife
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    volumes:
      - ./services/knowledge-graph-service:/app
      - /app/node_modules
    networks:
      - suoke-network
    depends_on:
      - neo4j
      - otel-collector
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 知识库服务
  knowledge-base-service:
    build:
      context: ./services/knowledge-base-service
      dockerfile: Dockerfile
    image: suokelife/knowledge-base-service:dev
    container_name: suoke-kb-service
    ports:
      - "3020:3020"
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - PORT=3020
      - MONGODB_URI=mongodb://mongodb:27017/suoke_knowledge
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=suokelife
      - MINIO_SECRET_KEY=suokelife123
      - MINIO_USE_SSL=false
      - MINIO_BUCKET=knowledge-base
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    volumes:
      - ./services/knowledge-base-service:/app
      - /app/node_modules
    networks:
      - suoke-network
    depends_on:
      - mongodb
      - minio
      - otel-collector
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3020/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # RAG服务
  rag-service:
    build:
      context: ./services/rag-service
      dockerfile: Dockerfile
    image: suokelife/rag-service:dev
    container_name: suoke-rag-service
    ports:
      - "3030:3030"
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - PORT=3030
      - KNOWLEDGE_BASE_SERVICE_URL=http://knowledge-base-service:3020
      - KNOWLEDGE_GRAPH_SERVICE_URL=http://knowledge-graph-service:3010
      - VECTOR_DB_TYPE=qdrant
      - QDRANT_URL=http://qdrant:6333
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    volumes:
      - ./services/rag-service:/app
      - /app/node_modules
    networks:
      - suoke-network
    depends_on:
      - knowledge-base-service
      - knowledge-graph-service
      - qdrant
      - otel-collector
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 小艾服务
  xiaoai-service:
    build:
      context: ./services/xiaoai-service
      dockerfile: Dockerfile
    image: suokelife/xiaoai-service:dev
    container_name: suoke-xiaoai-service
    ports:
      - "3040:3040"
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - PORT=3040
      - RAG_SERVICE_URL=http://rag-service:3030
      - LLM_TYPE=openai
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    volumes:
      - ./services/xiaoai-service:/app
      - /app/node_modules
    networks:
      - suoke-network
    depends_on:
      - rag-service
      - otel-collector
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3040/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 四诊协调器服务
  four-diagnosis-coordinator:
    build:
      context: ./services/four-diagnosis-coordinator
      dockerfile: Dockerfile
    image: suokelife/four-diagnosis-coordinator:dev
    container_name: suoke-4d-coordinator
    ports:
      - "3050:3050"
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - PORT=3050
      - LOOKING_DIAGNOSIS_URL=http://looking-diagnosis:3051
      - INQUIRY_DIAGNOSIS_URL=http://inquiry-diagnosis:3052
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    volumes:
      - ./services/four-diagnosis-coordinator:/app
      - /app/node_modules
    networks:
      - suoke-network
    depends_on:
      - looking-diagnosis
      - inquiry-diagnosis
      - otel-collector
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3050/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 望诊服务
  looking-diagnosis:
    build:
      context: ./services/looking-diagnosis-service
      dockerfile: Dockerfile
    image: suokelife/looking-diagnosis:dev
    container_name: suoke-looking-diagnosis
    ports:
      - "3051:3051"
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - PORT=3051
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    volumes:
      - ./services/looking-diagnosis-service:/app
      - /app/node_modules
    networks:
      - suoke-network
    depends_on:
      - otel-collector
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3051/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 问诊服务
  inquiry-diagnosis:
    build:
      context: ./services/inquiry-diagnosis-service
      dockerfile: Dockerfile
    image: suokelife/inquiry-diagnosis:dev
    container_name: suoke-inquiry-diagnosis
    ports:
      - "3052:3052"
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - PORT=3052
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    volumes:
      - ./services/inquiry-diagnosis-service:/app
      - /app/node_modules
    networks:
      - suoke-network
    depends_on:
      - otel-collector
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3052/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Neo4j 数据库（知识图谱）
  neo4j:
    image: neo4j:5.12
    container_name: suoke-neo4j
    ports:
      - "7474:7474"  # 浏览器UI
      - "7687:7687"  # Bolt协议
    environment:
      - NEO4J_AUTH=neo4j/suokelife
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    networks:
      - suoke-network
    healthcheck:
      test: ["CMD", "wget", "http://localhost:7474", "-O", "/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MongoDB（知识库存储）
  mongodb:
    image: mongo:6.0
    container_name: suoke-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=suokelife
    volumes:
      - mongodb_data:/data/db
    networks:
      - suoke-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://root:suokelife@localhost:27017/admin", "--eval", "'db.adminCommand({ping:1})'"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO（对象存储）
  minio:
    image: minio/minio:RELEASE.2023-09-30T07-16-56Z
    container_name: suoke-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=suokelife
      - MINIO_ROOT_PASSWORD=suokelife123
    volumes:
      - minio_data:/data
    command: server --console-address ":9001" /data
    networks:
      - suoke-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Qdrant（向量数据库）
  qdrant:
    image: qdrant/qdrant:v1.4.1
    container_name: suoke-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - suoke-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # OpenTelemetry收集器
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.89.0
    container_name: suoke-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./services/shared/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # 暴露指标
      - "8889:8889"   # Prometheus 抓取端点
    networks:
      - suoke-network
    depends_on:
      - jaeger
      - prometheus

  # Jaeger（分布式追踪）
  jaeger:
    image: jaegertracing/all-in-one:1.48
    container_name: suoke-jaeger
    ports:
      - "16686:16686"  # UI
      - "14250:14250"  # gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - suoke-network

  # Prometheus（监控指标）
  prometheus:
    image: prom/prometheus:v2.45.1
    container_name: suoke-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./services/shared/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - suoke-network

  # Grafana（监控可视化）
  grafana:
    image: grafana/grafana:10.0.3
    container_name: suoke-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=suokelife
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./services/shared/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    networks:
      - suoke-network
    depends_on:
      - prometheus

networks:
  suoke-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  mongodb_data:
  minio_data:
  qdrant_data:
  prometheus_data:
  grafana_data: