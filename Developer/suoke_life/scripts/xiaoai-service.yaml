apiVersion: v1
kind: Service
metadata:
  name: xiaoai-service
  namespace: suoke
  labels:
    app: xiaoai-service
    component: master-agent
spec:
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app: xiaoai-service
    component: master-agent
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xiaoai-service
  namespace: suoke
  labels:
    app: xiaoai-service
    component: master-agent
spec:
  replicas: 3
  selector:
    matchLabels:
      app: xiaoai-service
      component: master-agent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: xiaoai-service
        component: master-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: xiaoai-service
          image: registry.suoke.life/xiaoai-service:1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: AGENT_ID
              valueFrom:
                configMapKeyRef:
                  name: xiaoai-agent-config
                  key: AGENT_ID
            - name: AGENT_NAME
              valueFrom:
                configMapKeyRef:
                  name: xiaoai-agent-config
                  key: AGENT_NAME
            - name: AGENT_VERSION
              valueFrom:
                configMapKeyRef:
                  name: xiaoai-agent-config
                  key: AGENT_VERSION
          envFrom:
            - configMapRef:
                name: xiaoai-agent-config
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
            - name: models-volume
              mountPath: /app/models
            - name: rules-volume
              mountPath: /app/rules
            - name: cache-volume
              mountPath: /app/cache
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "8Gi"
              nvidia.com/gpu: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - name: config-volume
          configMap:
            name: xiaoai-agent-config
        - name: models-volume
          persistentVolumeClaim:
            claimName: xiaoai-models-pvc
        - name: rules-volume
          configMap:
            name: xiaoai-rules-config
        - name: cache-volume
          emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: xiaoai-models-pvc
  namespace: suoke
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: standard
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: xiaoai-service-hpa
  namespace: suoke
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: xiaoai-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: xiaoai-service-network-policy
  namespace: suoke
spec:
  podSelector:
    matchLabels:
      app: xiaoai-service
      component: master-agent
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: suoke
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: suoke
        - podSelector:
            matchLabels:
              app: looking-diagnosis-service
    - to:
        - namespaceSelector:
            matchLabels:
              name: suoke
        - podSelector:
            matchLabels:
              app: voice-diagnosis-service
    - to:
        - namespaceSelector:
            matchLabels:
              name: suoke
        - podSelector:
            matchLabels:
              app: pulse-diagnosis-service
    - to:
        - namespaceSelector:
            matchLabels:
              name: suoke
        - podSelector:
            matchLabels:
              app: fusion-service
    - to:
        - namespaceSelector:
            matchLabels:
              name: suoke
        - podSelector:
            matchLabels:
              app: knowledge-graph-service
    - to:
        - namespaceSelector:
            matchLabels:
              name: suoke
        - podSelector:
            matchLabels:
              app: reasoning-engine
    - to:
        - namespaceSelector:
            matchLabels:
              name: suoke
        - podSelector:
            matchLabels:
              app: multimodal-processor
    - ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: xiaoai-service-pdb
  namespace: suoke
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: xiaoai-service
      component: master-agent 