data:
  agent-config.json: |
    {
      "agent": {
        "name": "望诊",
        "id": "wangzhen",
        "version": "1.0.0",
        "description": "索克生活中医望诊智能体，负责中医四诊中的望诊环节，通过面部、舌象、形体等特征分析，进行体质辨识和健康状态评估",
        "avatar": "assets/agents/wangzhen_avatar.png",
        "greeting": "您好，我是望诊，您的中医望诊专家。请上传您的面部照片或舌象照片，我将为您分析体质特征和健康状态。",
        "capabilities": [
          "面色诊断",
          "舌象分析",
          "眼耳鼻诊断",
          "形体姿态评估",
          "体质辨识",
          "健康状态评估",
          "辨证分析",
          "语音引导拍照",
          "无障碍服务支持"
        ],
        "priority": "high",
        "visibility": "patient-facing",
        "role": "specialist",
        "specializations": ["望诊分析", "四诊合参", "多模态图像处理", "语音交互", "无障碍服务"]
      },
      "models": {
        "primary": {
          "id": "tcm-looking-diagnosis-llm",
          "type": "llm",
          "path": "/app/models/llm/looking-diagnosis-llm-v1.2.0.onnx",
          "config": {
            "temperature": 0.7,
            "top_p": 0.95,
            "max_tokens": 2048,
            "presence_penalty": 0.1,
            "frequency_penalty": 0.1
          }
        },
        "embedding": {
          "id": "tcm-embedding-model",
          "type": "embedding",
          "path": "/app/models/llm/tcm-embedding-model.onnx",
          "config": {
            "dimensions": 768,
            "normalize": true
          }
        },
        "face_detection": {
          "id": "face-detection-model",
          "type": "vision",
          "path": "/app/models/detection/face-detection-v2.1.0.onnx",
          "config": {
            "threshold": 0.85,
            "input_size": [640, 640]
          }
        },
        "face_landmarks": {
          "id": "face-landmarks-model",
          "type": "vision",
          "path": "/app/models/landmarks/face-landmarks-v1.4.0.onnx",
          "config": {
            "landmarks_count": 468,
            "input_size": [192, 192]
          }
        },
        "complexion_analyzer": {
          "id": "complexion-analyzer",
          "type": "vision",
          "path": "/app/models/complexion/complexion-analyzer-v1.3.0.onnx",
          "config": {
            "classes": ["淡白", "红润", "潮红", "晦暗", "黝黑", "黄褐", "青紫", "萎黄"],
            "threshold": 0.75
          }
        },
        "tongue_analyzer": {
          "id": "tongue-analyzer",
          "type": "vision",
          "path": "/app/models/tongue/tongue-analyzer-v2.0.0.onnx",
          "config": {
            "tongue_color_classes": ["淡白舌", "淡红舌", "红舌", "绛舌", "青紫舌", "瘀斑舌", "芒刺舌"],
            "coating_classes": ["无苔", "薄白苔", "厚白苔", "黄苔", "厚黄苔", "灰黑苔", "腻苔"],
            "threshold": 0.80
          }
        }
      },
      "tools": {
        "enabled": true,
        "list": [
          {
            "name": "analyze_face_complexion",
            "description": "分析面色特征，识别中医面诊特征和对应的体质状态",
            "parameters": [
              {
                "name": "face_image",
                "type": "image",
                "description": "面部照片",
                "required": true
              },
              {
                "name": "lighting_condition",
                "type": "string",
                "description": "拍摄光线条件",
                "required": false
              }
            ]
          },
          {
            "name": "analyze_tongue",
            "description": "分析舌象特征，识别舌色、舌态、舌苔等信息",
            "parameters": [
              {
                "name": "tongue_image",
                "type": "image",
                "description": "舌象照片",
                "required": true
              },
              {
                "name": "before_meal",
                "type": "boolean",
                "description": "是否在饭前拍摄",
                "required": false
              }
            ]
          },
          {
            "name": "analyze_eye_ear_nose",
            "description": "分析眼、耳、鼻等部位特征",
            "parameters": [
              {
                "name": "face_image",
                "type": "image",
                "description": "面部照片",
                "required": true
              }
            ]
          },
          {
            "name": "analyze_body_posture",
            "description": "分析体态与姿势特征",
            "parameters": [
              {
                "name": "body_image",
                "type": "image",
                "description": "全身或上半身照片",
                "required": true
              }
            ]
          },
          {
            "name": "identify_constitution",
            "description": "通过望诊结果分析体质类型",
            "parameters": [
              {
                "name": "complexion_features",
                "type": "object",
                "description": "面色分析结果",
                "required": false
              },
              {
                "name": "tongue_features",
                "type": "object",
                "description": "舌象分析结果",
                "required": false
              },
              {
                "name": "other_features",
                "type": "object",
                "description": "其他望诊特征",
                "required": false
              }
            ]
          },
          {
            "name": "search_tcm_knowledge",
            "description": "搜索中医知识库获取望诊相关信息",
            "parameters": [
              {
                "name": "query",
                "type": "string",
                "description": "搜索查询内容",
                "required": true
              },
              {
                "name": "category",
                "type": "string",
                "description": "知识类别：面诊、舌诊、形体等",
                "required": false
              }
            ]
          },
          {
            "name": "get_health_recommendations",
            "description": "基于望诊结果提供健康建议",
            "parameters": [
              {
                "name": "diagnosis_results",
                "type": "object",
                "description": "望诊分析结果",
                "required": true
              },
              {
                "name": "constitution_type",
                "type": "string",
                "description": "体质类型",
                "required": true
              },
              {
                "name": "season",
                "type": "string",
                "description": "当前季节",
                "required": false
              }
            ]
          },
          {
            "name": "voice_guided_photo_capture",
            "description": "通过语音引导用户完成照片采集",
            "parameters": [
              {
                "name": "capture_type",
                "type": "string",
                "description": "拍摄类型：面部/舌象/全身",
                "required": true
              },
              {
                "name": "accessibility_mode",
                "type": "boolean",
                "description": "是否启用无障碍模式",
                "required": false,
                "default": false
              },
              {
                "name": "voice_guidance_level",
                "type": "string",
                "description": "语音引导详细程度：简单/标准/详细",
                "required": false,
                "default": "标准"
              }
            ]
          },
          {
            "name": "photo_quality_feedback",
            "description": "实时评估照片质量并提供语音反馈",
            "parameters": [
              {
                "name": "image_stream",
                "type": "stream",
                "description": "实时图像流",
                "required": true
              },
              {
                "name": "feedback_type",
                "type": "string",
                "description": "反馈类型：光线/角度/清晰度/构图",
                "required": true
              }
            ]
          }
        ]
      },
      "context": {
        "system_prompt": "你是索克生活健康平台的中医望诊智能体「望诊」。你的主要任务是通过中医四诊的「望诊」环节，分析用户的面色、舌象、形体等特征，进行体质辨识和健康状态评估。\n\n指导原则：\n1. 遵循中医理论体系，以整体观念、辨证论治为核心\n2. 通过图像分析获取望诊信息，如面色、舌象、眼耳鼻特征、形体姿态等\n3. 使用专业且易懂的语言解释分析结果和健康建议\n4. 结合季节、环境等因素进行整体分析\n5. 根据望诊结果，给出初步的辨证分析和养生建议\n6. 有针对性地引导用户提供补充信息或配合其他诊法\n7. 注意识别异常体征，提示及时就医\n\n望诊要点：\n- 面色分析：色泽（淡白、红润、潮红、晦暗、黝黑、黄褐、青紫、萎黄）、部位分布、光泽\n- 舌诊分析：舌质（色、形、态、动态）、舌苔（色、厚薄、腻润干燥、部位分布）\n- 眼耳鼻分析：形态特征、色泽、神态\n- 形体姿态分析：体型、姿势、动态特征\n\n你的回应应当：\n- 简明扼要地描述分析结果，突出关键发现\n- 解释分析结果与体质类型及健康状态的关联\n- 提供有针对性的养生保健建议\n- 在必要时建议结合其他诊法（问诊、闻诊、切诊）进行综合判断\n- 保持专业、客观、有同理心的语气",
        "memory_window": 10,
        "max_tokens": 16000,
        "default_temperature": 0.7
      },
