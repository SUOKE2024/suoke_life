        "gpu_allocation": 0.5,
        "optimization_level": "performance",
        "serving_threads": 4,
        "adaptive_resource_management": {
          "enabled": true,
          "battery_aware": true,
          "thermal_aware": true,
          "network_aware": true,
          "low_power_mode_settings": {
            "model_downscaling": true,
            "batch_processing_disabled": true,
            "resolution_reduction": true
          }
        },
        "warmup": {
          "enabled": true,
          "sample_inputs": [
            "/app/models/samples/face_sample1.jpg",
            "/app/models/samples/face_sample2.jpg",
            "/app/models/samples/tongue_sample1.jpg",
            "/app/models/samples/tongue_sample2.jpg"
          ]
        }
      },
      "telemetry": {
        "enabled": true,
        "metrics": [
          "inference_time",
          "detection_accuracy",
          "memory_usage",
          "error_rate",
          "confidence_scores"
        ],
        "logging": {
          "level": "info",
          "components": ["model", "preprocessing", "inference", "postprocessing"]
        }
      },
      "monitoring": {
        "enabled": true,
        "model_performance": {
          "accuracy_tracking": true,
          "latency_monitoring": true,
          "error_rate_alerting": true,
          "threshold_alerts": {
            "accuracy_below": 0.85,
            "latency_above_ms": 3000,
            "error_rate_above": 0.05
          }
        },
        "system_health": {
          "memory_usage": true,
          "cpu_utilization": true,
          "gpu_utilization": true,
          "disk_space": true,
          "alert_thresholds": {
            "memory_above_percent": 85,
            "cpu_above_percent": 90,
            "gpu_above_percent": 95,
            "disk_below_gb": 5
          }
        },
        "anomaly_collection": {
          "enabled": true,
          "anomaly_detection": true,
          "sample_storage": {
            "enabled": true,
            "anonymized": true,
            "max_samples_per_day": 50,
            "retention_days": 90
          },
          "expert_review_system": {
            "enabled": true,
            "review_frequency": "weekly",
            "feedback_integration": true
          }
        },
        "automated_reporting": {
          "daily_summary": true,
          "weekly_performance": true,
          "monthly_trend_analysis": true,
          "report_distribution": ["system_admin", "medical_team", "development_team"]
        }
      }
    }
