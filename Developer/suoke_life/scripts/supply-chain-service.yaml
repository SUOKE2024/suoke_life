apiVersion: apps/v1
kind: Deployment
metadata:
  name: supply-chain-service
  namespace: suoke
  labels:
    app: supply-chain-service
    tier: backend
    version: v1
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3011"
    prometheus.io/path: "/metrics"
    seccomp.security.alpha.kubernetes.io/pod: "runtime/default"
    container.apparmor.security.beta.kubernetes.io/supply-chain-service: "runtime/default"
    backup.velero.io/backup-volumes: "supply-chain-data,supply-chain-logs"
    backup.velero.io/schedule: "daily"
    backup.velero.io/ttl: "720h"
    backup.velero.io/restore-test: "enabled"
    sidecar.istio.io/statsInclusionPrefixes: "supply_chain_,tcm_,product_,order_,inventory_"
    trivy.security.scanning/enabled: "true"
    alertmanager.rules/supply-chain-service: |
      groups:
      - name: supply-chain-service-alerts
        rules:
        - alert: SupplyChainServiceHighError
        expr: rate(supply_chain_http_requests_total{status=~"5.."}[5m]) / rate(supply_chain_http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          service: supply-chain-service
        annotations:
            summary: "供应链服务错误率高"
          description: "供应链服务在过去2分钟内错误率超过5%"
        - alert: SupplyChainServiceHighLatency
          expr: histogram_quantile(0.95, sum(rate(supply_chain_request_duration_seconds_bucket[5m])) by (le)) > 1.5
          for: 3m
        labels:
          severity: warning
          service: supply-chain-service
        annotations:
            summary: "供应链服务延迟高"
            description: "供应链服务95%请求响应时间超过1.5秒，持续3分钟"
      - alert: SupplyChainServiceDown
        expr: up{app="supply-chain-service"} == 0
        for: 1m
        labels:
          severity: critical
          service: supply-chain-service
        annotations:
          summary: "供应链服务不可用"
            description: "供应链服务实例不可用"
        - alert: ProductInventoryLow
          expr: supply_chain_product_inventory_count < 10
          for: 10m
        labels:
          severity: warning
          service: supply-chain-service
        annotations:
            summary: "产品库存不足"
            description: "某些产品库存低于10个单位，请及时补货"
        - alert: OrderProcessingDelay
          expr: supply_chain_order_processing_time_seconds > 300
          for: 15m
          labels:
            severity: warning
            service: supply-chain-service
          annotations:
            summary: "订单处理延迟"
            description: "订单处理时间超过5分钟，需要检查订单处理流程"
        - alert: BlockchainSyncFailure
          expr: supply_chain_blockchain_sync_failures_total > 0
          for: 15m
          labels:
            severity: warning
            service: supply-chain-service
          annotations:
            summary: "区块链同步失败"
            description: "与区块链网络同步溯源数据失败，请检查连接状态"
    grafana.dashboards/config: |
      {
        "supply-chain-dashboard": {
          "url": "/grafana/dashboards/supply-chain-service",
          "title": "供应链服务监控面板",
          "refresh": "30s",
        "panels": [
          {
            "title": "请求速率",
            "targets": [{"expr": "sum(rate(supply_chain_http_requests_total[5m])) by (status)"}]
          },
          {
            "title": "错误率",
            "targets": [{"expr": "sum(rate(supply_chain_http_requests_total{status=~\"5..\"}[5m])) / sum(rate(supply_chain_http_requests_total[5m]))"}]
          },
            {
              "title": "响应延迟",
              "targets": [{"expr": "histogram_quantile(0.95, sum(rate(supply_chain_request_duration_seconds_bucket[5m])) by (le))"}]
            },
          {
            "title": "订单处理时间",
              "targets": [{"expr": "supply_chain_order_processing_time_seconds"}]
            },
            {
              "title": "库存水平",
              "targets": [{"expr": "supply_chain_product_inventory_count"}]
            },
            {
              "title": "区块链溯源写入速率",
              "targets": [{"expr": "rate(supply_chain_blockchain_writes_total[5m])"}]
            },
            {
              "title": "CPU使用率",
              "targets": [{"expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"suoke\", pod=~\"supply-chain-service-.*\"}[5m]))"}]
            },
            {
              "title": "内存使用",
              "targets": [{"expr": "sum(container_memory_usage_bytes{namespace=\"suoke\", pod=~\"supply-chain-service-.*\"})"}]
            }
          ]
        }
      }
spec:
  replicas: 3
  selector:
    matchLabels:
      app: supply-chain-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: supply-chain-service
        tier: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3011"
        prometheus.io/path: "/metrics"
        checksum/config: "${CHECKSUM}"  # 配置变更时触发Pod更新
    spec:
      priorityClassName: high-priority
      terminationGracePeriodSeconds: 45
      serviceAccountName: supply-chain-service
      initContainers:
      - name: config-validator
        image: registry.suoke.life/config-validator:latest
        command:
        - "/bin/sh"
        - "-c"
        - |
          echo "验证供应链服务配置..."
          if [ -f /app/config/supply-chain-config.json ]; then
            echo "配置文件存在，验证JSON格式..."
            cat /app/config/supply-chain-config.json | jq . > /dev/null
            if [ $? -eq 0 ]; then
              echo "配置文件格式正确"
            else
              echo "配置文件JSON格式错误，退出"
              exit 1
            fi
          else
            echo "配置文件不存在，退出"
            exit 1
          fi
          echo "配置验证完成"
        volumeMounts:
        - name: supply-chain-config-volume
          mountPath: /app/config
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
      - name: data-directory-setup
        image: registry.suoke.life/alpine:latest
        command:
        - "/bin/sh"
        - "-c"
        - |
          echo "创建必要的数据目录..."
          mkdir -p /app/data/cache
          mkdir -p /app/data/reports
          mkdir -p /app/data/logs
          mkdir -p /app/data/exports
          mkdir -p /app/data/temp
          chmod -R 755 /app/data
          echo "数据目录已创建"
        volumeMounts:
        - name: supply-chain-data
          mountPath: /app/data
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
      - name: cache-warmup
        image: registry.suoke.life/supply-chain-service:prod
        command:
        - "/bin/sh"
        - "-c"
        - |
          echo "预热商品分类缓存..."
          node /app/scripts/cache-warmup.js --type=categories
          echo "预热热门商品缓存..."
          node /app/scripts/cache-warmup.js --type=popular_products
          echo "预热节气数据缓存..."
          node /app/scripts/cache-warmup.js --type=solar_terms
          echo "缓存预热完成"
        env:
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: redis_host
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: redis_port
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: supply-chain-secrets
              key: redis_password
        volumeMounts:
        - name: supply-chain-config-volume
          mountPath: /app/config
          readOnly: true
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 400m
            memory: 512Mi
      - name: database-migration
        image: registry.suoke.life/supply-chain-service:prod
        command:
        - "/bin/sh"
        - "-c"
        - |
          echo "执行数据库迁移..."
          export DATABASE_URL="mysql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}"
          node /app/scripts/migrate.js --auto-migrate --seed-data
          echo "数据库迁移完成"
        env:
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: database_host
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: database_port
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: database_name
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: supply-chain-secrets
              key: database_user
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: supply-chain-secrets
              key: database_password
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 400m
            memory: 512Mi
      containers:
      - name: supply-chain-service
        image: registry.suoke.life/supply-chain-service:prod
        imagePullPolicy: Always
        command:
        - "/bin/bash"
        - "-c"
        - |
          # 确保数据目录存在和权限
          mkdir -p /app/logs /app/data/reports /app/data/cache /app/data/temp
          
          # 设置正确的权限
          chmod -R 755 /app/logs /app/data
          
          # 设置环境变量
          export NODE_OPTIONS="--max-old-space-size=2048"
          export SUPPLY_CHAIN_CONFIG="/app/config/supply-chain-config.json"
          export TLS_CERT_PATH="/etc/ssl/certs/supply-chain-service.crt"
          export TLS_KEY_PATH="/etc/ssl/private/supply-chain-service.key"
          
          # 打印启动信息
          echo "启动供应链服务 - $(date)"
          echo "节点环境: $NODE_ENV"
          echo "日志级别: $LOG_LEVEL"
          
          # 检查数据库连接
          node /app/scripts/check-db-connection.js || exit 1
          
          # 预热缓存
          node /app/scripts/cache-warmup.js
          
          # 启动应用
          exec node /app/server.js
        ports:
        - containerPort: 3011
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: LOG_LEVEL
          value: "info"
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: database_host
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: database_port
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: database_name
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: supply-chain-secrets
              key: database_user
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: supply-chain-secrets
              key: database_password
        - name: DATABASE_POOL_MIN
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: database_pool_min
        - name: DATABASE_POOL_MAX
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: database_pool_max
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: redis_host
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: redis_port
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: supply-chain-secrets
              key: redis_password
        - name: PAYMENT_API_KEY
          valueFrom:
            secretKeyRef:
              name: supply-chain-secrets
              key: payment_api_key
        - name: LOGISTICS_API_KEY
          valueFrom:
            secretKeyRef:
              name: supply-chain-secrets
              key: logistics_api_key
        - name: RAG_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: rag_service_url
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: supply-chain-secrets
              key: encryption_key
        - name: CONSTITUTION_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: constitution_service_url
        - name: HEALTH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: health_service_url
        - name: FEATURE_FLAGS
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: feature_flags
        - name: SERVICE_TIMEOUTS
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: service_timeouts
        - name: METRICS_EXPORT_ENABLED
          value: "true"
        - name: DISTRIBUTED_TRACING_ENABLED
          value: "true"
        - name: BLOCKCHAIN_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: blockchain_service_url
        - name: BLOCKCHAIN_NETWORK_TYPE
          value: "hyperledger-fabric"
        - name: BLOCKCHAIN_API_KEY
          valueFrom:
            secretKeyRef:
              name: supply-chain-secrets
              key: blockchain_api_key
        - name: SUPPLIER_PORTAL_ENABLED
          value: "true"
        - name: SUPPLIER_APPROVAL_WORKFLOW
          value: "automatic"
        - name: PRODUCT_CUSTOMIZATION_ENABLED
          value: "true"
        - name: CUSTOM_PRODUCT_APPROVAL_WORKFLOW
          value: "manual"
        - name: FARM_EXPERIENCE_ENABLED
          value: "true"
        - name: GEOLOCATION_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: geolocation_service_url
        - name: BLOCKCHAIN_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: supply-chain-config
              key: blockchain_provider
        - name: ENABLE_OPENAI_COMPATIBILITY
          value: "true"
        - name: OPENAI_API_VERSION
          value: "2023-07-01"
        - name: OPENAI_API_KEY_HEADER
          value: "X-OpenAI-Api-Key"
        - name: OPENAI_TOOLS_ENABLED
          value: "true"
        - name: OPENAI_RESPONSE_FORMAT
          value: "openai_compatible"
        - name: OPENAI_ENDPOINTS_PREFIX
          value: "/api/v1/openai"
        - name: OPENAI_TOOLS_CONFIG_PATH
          value: "/app/config/openai/openai-tools.json"
        resources:
          requests:
            cpu: 300m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 3011
            httpHeaders:
            - name: X-Probe-Type
              value: "liveness"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3011
            httpHeaders:
            - name: X-Probe-Type
              value: "readiness"
            - name: Content-Type
              value: "application/json"
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
          successThreshold: 1
        startupProbe:
          httpGet:
            path: /health/startup
            port: 3011
            scheme: HTTP
            httpHeaders:
            - name: X-Probe-Type
              value: "startup"
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12
          timeoutSeconds: 3
          successThreshold: 1
        lifecycle:
          postStart:
            exec:
              command:
              - "/bin/bash"
              - "-c"
              - |
                # 记录启动事件
                echo "$(date -Iseconds) - CONTAINER_STARTED - 供应链服务启动, PID: $$, NODE_ENV: ${NODE_ENV}" >> /app/logs/lifecycle.log
                
                # 创建必要的目录
                mkdir -p /app/data/reports/$(date +%Y-%m-%d)
                
                # 发送启动通知
                curl -s -X POST ${NOTIFICATION_SERVICE_URL}/api/notifications/system \
                  -H "Content-Type: application/json" \
                  -d "{\"service\":\"supply-chain-service\",\"event\":\"startup\",\"level\":\"info\",\"message\":\"供应链服务已启动\",\"timestamp\":\"$(date -Iseconds)\"}" || true
                
                # 注册服务到服务发现
                curl -s -X PUT ${SERVICE_REGISTRY_URL}/api/services/register \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"supply-chain-service\",\"version\":\"1.0.0\",\"status\":\"starting\",\"endpoints\":[{\"name\":\"main\",\"url\":\"http://supply-chain-service:3011\"}]}" || true
          preStop:
            exec:
              command:
              - "/bin/bash"
              - "-c"
              - |
                # 记录关闭事件
                echo "$(date -Iseconds) - CONTAINER_STOPPING - 供应链服务正在优雅关闭..." >> /app/logs/lifecycle.log
                
                # 通知服务发现此服务即将下线
                curl -s -X PUT ${SERVICE_REGISTRY_URL}/api/services/status \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"supply-chain-service\",\"status\":\"stopping\"}" || true
                  
                # 等待处理中的请求完成
                sleep 5
                
                # 关闭连接池
                curl -s -X POST http://localhost:3011/internal/shutdown \
                  -H "Content-Type: application/json" \
                  -H "Authorization: Bearer ${INTERNAL_API_TOKEN}" \
                  -d "{\"reason\":\"container_stopping\",\"gracePeriod\":10}" || true
                
                # 再次等待确保请求都已完成
                sleep 10
                
                # 记录成功关闭
                echo "$(date -Iseconds) - CONTAINER_STOPPED - 供应链服务已完成优雅关闭" >> /app/logs/lifecycle.log
        volumeMounts:
        - name: supply-chain-config-volume
          mountPath: /app/config
          readOnly: true
        - name: supply-chain-data
          mountPath: /app/data
        - name: supply-chain-logs
          mountPath: /app/logs
        - name: supply-chain-temp
          mountPath: /app/temp
        - name: openai-config-volume
          mountPath: /app/config/openai
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: supply-chain-config-volume
        configMap:
          name: supply-chain-config-files
      - name: supply-chain-data
        persistentVolumeClaim:
          claimName: supply-chain-data-pvc
      - name: supply-chain-logs
        persistentVolumeClaim:
          claimName: supply-chain-logs-pvc
      - name: supply-chain-temp
        emptyDir: {}
      - name: openai-config-volume
        configMap:
          name: supply-chain-openai-config
      - name: supply-chain-tls
        secret:
          secretName: supply-chain-service-tls
          items:
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - supply-chain-service
              topologyKey: kubernetes.io/hostname
          - weight: 70
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - supply-chain-service
              topologyKey: topology.kubernetes.io/zone
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: cloud.google.com/gke-nodepool
                operator: In
                values:
                - standard-nodes
              - key: node.kubernetes.io/instance-type
                operator: In
                values:
                - n2-standard-4
                - n2-standard-8
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 90
            preference:
              matchExpressions:
              - key: failure-domain.beta.kubernetes.io/region
                operator: In
                values:
                - asia-east1
                - asia-east2
          - weight: 80
            preference:
              matchExpressions:
              - key: node-role.kubernetes.io/production
                operator: In
                values:
                - "true"
          - weight: 70
            preference:
              matchExpressions:
              - key: supply-chain/optimized
                operator: In
                values:
                - "true"
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: supply-chain-service
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: supply-chain-service
---
apiVersion: v1
kind: Service
metadata:
  name: supply-chain-service
  namespace: suoke
  labels:
    app: supply-chain-service
    tier: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3011"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: supply-chain-service
  ports:
  - port: 80
    targetPort: 3011
    name: http
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600  # 会话保持1小时
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: supply-chain-service-ingress
  namespace: suoke
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://suoke.life,https://app.suoke.life"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";
      more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self'; img-src 'self' data:; style-src 'self'; connect-src 'self'";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "5"
spec:
  tls:
  - hosts:
    - supply.suoke.life
    secretName: supply-chain-tls
  rules:
  - host: supply.suoke.life
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: supply-chain-service
            port:
              number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: supply-chain-service
  namespace: suoke
  labels:
    app: supply-chain-service
  annotations:
    autoscaling.alpha.kubernetes.io/metrics-visibility: "all"
    autoscaling.alpha.kubernetes.io/behavior: |
      {
        "scaleDown": {
          "stabilizationWindowSeconds": 300,
          "policies": [
            {
              "type": "Percent",
              "value": 20,
              "periodSeconds": 60
            }
          ]
        },
        "scaleUp": {
          "stabilizationWindowSeconds": 60,
          "policies": [
            {
              "type": "Percent",
              "value": 50,
              "periodSeconds": 60
            },
            {
              "type": "Pods",
              "value": 4,
              "periodSeconds": 60
            }
          ],
          "selectPolicy": "Max"
        }
      }
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: supply-chain-service
  minReplicas: 3
  maxReplicas: 12
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: supply_chain_http_requests_per_second
      target:
        type: AverageValue
        averageValue: 300
  - type: External
    external:
      metric:
        name: supply_chain_active_orders
        selector:
          matchLabels:
            status: processing
      target:
        type: AverageValue
        averageValue: 200
  - type: External
    external:
      metric:
        name: supply_chain_queue_length
        selector:
          matchLabels:
            queue: order_processing
      target:
        type: AverageValue
        averageValue: 50
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: supply-chain-service-pdb
  namespace: suoke
  labels:
    app: supply-chain-service
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: supply-chain-service
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: supply-chain-service-circuit-breaker
  namespace: suoke
spec:
  host: supply-chain-service
  trafficPolicy:
    connectionPool:
      http:
        maxRequestsPerConnection: 10
        http1MaxPendingRequests: 1024
        http2MaxRequests: 1024
        maxRetries: 3
      tcp:
        maxConnections: 1000
        connectTimeout: 3s
        tcpKeepalive:
          time: 600s
          interval: 60s
    outlierDetection:
      consecutiveErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 50
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: high-priority
value: 1000000
globalDefault: false
description: "用于关键微服务的高优先级"
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: supply-chain-service-monitor
  namespace: monitoring
  labels:
    app: supply-chain-service
    release: prometheus-operator
spec:
  selector:
    matchLabels:
      app: supply-chain-service
  namespaceSelector:
    matchNames:
      - suoke
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s
    metricRelabelings:
    - sourceLabels: [__name__]
      regex: 'supply_chain_.*'
      action: keep
    - sourceLabels: [__name__]
      regex: 'go_.*'
      action: drop
    - targetLabel: app
      replacement: supply-chain-service
    relabelings:
    - sourceLabels: [__meta_kubernetes_pod_node_name]
      targetLabel: node
    - sourceLabels: [__meta_kubernetes_pod_name]
      targetLabel: pod
  - port: http
    path: /metrics/business
    interval: 30s
    scrapeTimeout: 10s
    honorLabels: true
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: supply-chain-service-quota
  namespace: suoke
spec:
  hard:
    pods: "20"
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: supply-chain-service-limits
  namespace: suoke
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: 200m
      memory: 512Mi
    default:
      cpu: 500m
      memory: 1Gi
    min:
      cpu: 50m
      memory: 128Mi
    max:
      cpu: 4
      memory: 8Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: supply-chain-rag-config
  namespace: suoke
data:
  rag-integration.json: |
    {
      "enabled": true,
      "serviceEndpoint": "${RAG_SERVICE_URL}",
      "timeout": 3000,
      "maxConcurrentRequests": 20,
      "queryTemplates": {
        "productRecommendation": "请根据{constitution_type}体质特点，推荐适合的{product_category}产品，详细说明理由和注意事项。",
        "productUsage": "请详细介绍{product_name}的功效作用、使用方法、适用体质以及注意事项。",
        "seasonalHealth": "当前节气是{solar_term}，请推荐适合此节气的养生食材和使用方法。",
        "foodCombination": "请分析{product_name}与{other_product}一起食用是否合适，有何协同或相克效果？",
        "constitutionAdvice": "我是{constitution_type}体质，请推荐适合我的日常饮食、应季食材和注意事项。",
        "medicinalFoodAdvice": "请详细介绍{product_name}作为药食同源产品的药用价值和食用方法，以及适用人群。",
        "premiumAgriProductsInfo": "请介绍{product_name}这款优质农产品的生长环境、品质特点和营养价值。"
      },
      "integrationPoints": [
        {
          "endpoint": "/api/products/medicinal-food/:id/details",
          "template": "medicinalFoodAdvice",
          "parameters": {
            "product_name": "$.name"
          },
          "cacheEnabled": true,
          "cacheTTL": 86400
        },
        {
          "endpoint": "/api/products/premium-agri/:id/details",
          "template": "premiumAgriProductsInfo",
          "parameters": {
            "product_name": "$.name"
          },
          "cacheEnabled": true,
          "cacheTTL": 86400
        },
        {
          "endpoint": "/api/products/:id/details",
          "template": "productUsage",
          "parameters": {
            "product_name": "$.name"
          },
          "cacheEnabled": true,
          "cacheTTL": 86400
        },
        {
          "endpoint": "/api/recommendations/constitution",
          "template": "constitutionAdvice",
          "parameters": {
            "constitution_type": "$.constitutionType"
          },
          "cacheEnabled": true,
          "cacheTTL": 3600
        },
        {
          "endpoint": "/api/recommendations/seasonal",
          "template": "seasonalHealth",
          "parameters": {
            "solar_term": "$.currentSolarTerm"
          },
          "cacheEnabled": true,
          "cacheTTL": 86400
        }
      ],
      "contextEnhancement": {
        "enabled": true,
        "productAttributes": ["tcm_properties", "origin", "harvest_time", "certification"],
        "userContext": ["constitutionType", "healthConditions", "preferences"]
      },
      "metrics": {
        "trackLatency": true,
        "trackUsage": true,
        "trackSuccessRate": true
      }
    }
---
