apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: suoke
  labels:
    app: rag-service
    tier: backend
    version: v1
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3005"
    prometheus.io/path: "/metrics"
    seccomp.security.alpha.kubernetes.io/pod: "runtime/default"
    container.apparmor.security.beta.kubernetes.io/rag-service: "runtime/default"
    backup.velero.io/backup-volumes: "rag-data,rag-models,rag-logs"
    backup.velero.io/schedule: "daily"
    backup.velero.io/ttl: "720h"
    sidecar.istio.io/statsInclusionPrefixes: "rag_,tcm_"
    trivy.security.scanning/enabled: "true"
    alertmanager.rules/rag-service: |
      groups:
      - name: rag-service-alerts
        rules:
        - alert: RagServiceHighError
          expr: rate(rag_error_total[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "高错误率警告"
            description: "RAG服务错误率超过阈值"
        - alert: RagServiceDown
          expr: up{job="rag-service"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "服务不可用"
            description: "RAG服务实例不可用"
        - alert: RagServiceHighLatency
          expr: histogram_quantile(0.95, sum(rate(rag_request_duration_seconds_bucket[5m])) by (le)) > 2
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "响应延迟过高"
            description: "RAG服务95%请求响应时间超过2秒"
    grafana.dashboards/config: |
      {
        "rag-service-dashboard": {
          "url": "/grafana/dashboards/rag-service",
          "title": "RAG服务监控面板",
          "refresh": "30s"
        }
      }
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rag-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: rag-service
        tier: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3005"
        prometheus.io/path: "/metrics"
        checksum/config: "${CHECKSUM}"  # 配置变更时触发Pod更新
    spec:
      priorityClassName: high-priority
      terminationGracePeriodSeconds: 60
      initContainers:
      - name: model-downloader
        image: registry.suoke.life/rag-model-tools:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          if [ ! -f /app/models/embedding/complete ] || [ ! -f /app/models/reranker/complete ] || [ ! -f /app/models/text-generation/complete ]; then
            echo "开始下载RAG服务模型..."
            mkdir -p /app/models/embedding /app/models/reranker /app/models/text-generation
            
            # 下载嵌入模型
            echo "下载嵌入模型..."
            curl -L -o /tmp/embedding-model.tar.gz ${MODEL_REGISTRY}/embedding/bge-large-zh-v1.5.tar.gz
            tar -xzf /tmp/embedding-model.tar.gz -C /app/models/embedding
            touch /app/models/embedding/complete
            
            # 下载重排序模型
            echo "下载重排序模型..."
            curl -L -o /tmp/reranker-model.tar.gz ${MODEL_REGISTRY}/reranker/bge-reranker-v1.3.tar.gz
            tar -xzf /tmp/reranker-model.tar.gz -C /app/models/reranker
            touch /app/models/reranker/complete
            
            # 下载文本生成模型
            echo "下载文本生成模型..."
            curl -L -o /tmp/text-generation-model.tar.gz ${MODEL_REGISTRY}/text-generation/tcm-llm-base-v2.0.tar.gz
            tar -xzf /tmp/text-generation-model.tar.gz -C /app/models/text-generation
            touch /app/models/text-generation/complete
            
            echo "RAG模型下载完成"
          else
            echo "模型已存在，跳过下载"
          fi
        env:
        - name: MODEL_REGISTRY
          value: "https://models.suoke.life/rag-service"
        volumeMounts:
        - name: rag-models
          mountPath: /app/models
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi
      - name: model-warmup
        image: registry.suoke.life/rag-service:prod
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "预热RAG模型..."
          # 预热嵌入模型
          python /app/scripts/warmup.py --model-type embedding --config /app/config/rag-config.json
          
          # 预热重排序模型
          python /app/scripts/warmup.py --model-type reranker --config /app/config/rag-config.json
          
          # 预热文本生成模型
          python /app/scripts/warmup.py --model-type generation --config /app/config/rag-config.json
          
          echo "RAG模型预热完成"
        volumeMounts:
        - name: rag-config-volume
          mountPath: /app/config
          readOnly: true
        - name: rag-models
          mountPath: /app/models
          readOnly: true
        resources:
          limits:
            cpu: 2000m
            memory: 4Gi
            nvidia.com/gpu: "0.3"
          requests:
            cpu: 1000m
            memory: 2Gi
            nvidia.com/gpu: "0.2"
      containers:
      - name: rag-service
        image: registry.suoke.life/rag-service:prod
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3005
          name: http
        env:
        - name: LOG_LEVEL
          value: "info"
        - name: NODE_ENV
          value: "production"
        - name: MAX_CONCURRENCY
          value: "20"
        - name: ENABLE_LOCAL_MODELS
          value: "true"
        - name: ENABLE_HYBRID_SEARCH
          value: "true"
        - name: ENABLE_MODEL_CACHING
          value: "true"
        - name: VECTOR_DB_URL
          valueFrom:
            configMapKeyRef:
              name: rag-config
              key: vector_db_url
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: rag-config
              key: redis_url
        - name: TCM_KNOWLEDGE_BASE_PATH
          value: "/app/data/knowledge-base"
        - name: CONTEXT_WINDOW_SIZE
          value: "4096"
        - name: MODEL_BATCH_SIZE
          value: "4"
        - name: MODEL_MAX_INPUT_LENGTH
          value: "4096"
        - name: MODEL_MAX_TOTAL_TOKENS
          value: "8192"
        - name: ENABLE_OPENAI_COMPATIBILITY
          value: "true"
        - name: OPENAI_API_VERSION
          value: "2023-07-01"
        - name: OPENAI_API_KEY_HEADER
          value: "X-OpenAI-Api-Key"
        - name: OPENAI_TOOLS_ENABLED
          value: "true"
        - name: OPENAI_RESPONSE_FORMAT
          value: "openai_compatible"
        - name: OPENAI_ENDPOINTS_PREFIX
          value: "/api/v1/openai"
        - name: OPENAI_TOOLS_CONFIG_PATH
          value: "/app/config/openai/openai-tools.json"
        - name: OPENAI_COMPATIBLE_MODELS_CONFIG_PATH
          value: "/app/config/model/config.json"
        - name: AUTH_JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: auth-jwt-secret
              key: secret-key
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: rag-config
              key: database_host
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: rag-config
              key: database_port
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: rag-config
              key: database_name
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: database_user
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: database_password
        - name: DATABASE_POOL_MIN
          valueFrom:
            configMapKeyRef:
              name: rag-config
              key: database_pool_min
        - name: DATABASE_POOL_MAX
          valueFrom:
            configMapKeyRef:
              name: rag-config
              key: database_pool_max
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: rag-config
              key: redis_host
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: rag-config
              key: redis_port
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: redis_password
        - name: VECTOR_DB_HOST
          valueFrom:
            configMapKeyRef:
              name: rag-config
              key: vector_db_host
        - name: VECTOR_DB_PORT
          valueFrom:
            configMapKeyRef:
              name: rag-config
              key: vector_db_port
        - name: VECTOR_DB_USER
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: vector_db_user
        - name: VECTOR_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: vector_db_password
        - name: LLM_API_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: rag-config
              key: llm_api_endpoint
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: llm_api_key
        - name: EMBEDDING_API_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: rag-config
              key: embedding_api_endpoint
        - name: EMBEDDING_API_KEY
          valueFrom:
            secretKeyRef:
              name: rag-secrets
              key: embedding_api_key
        - name: KNOWLEDGE_GRAPH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: rag-config
              key: knowledge_graph_service_url
        - name: MAX_REQUEST_SIZE_MB
          value: "5"
        - name: ENABLE_QUERY_REWRITING
          value: "true"
        - name: FLARE_ENABLED
          value: "true"
        - name: FLARE_UNCERTAINTY_DETECTION
          value: "true"
        - name: FLARE_MAX_RETRIEVAL_ROUNDS
          value: "3"
        - name: FLARE_CONFIDENCE_THRESHOLD
          value: "0.85"
        - name: FLARE_FACT_VERIFICATION
          value: "true"
        - name: FLARE_ADAPTIVE_RETRIEVAL
          value: "true"
        - name: FLARE_UNCERTAINTY_EXPRESSIONS
          value: "可能,或许,推测,大概,似乎,不确定,不清楚,不明确"
        - name: FLARE_CROSS_CHECKING_ENABLED
          value: "true"
        - name: FLARE_PROGRESSIVE_REFINEMENT_ENABLED
          value: "true"
        - name: FLARE_MAX_REFINEMENT_STEPS
          value: "2"
        - name: RETRIEVAL_RELATION_AWARE
          value: "true"
        - name: RETRIEVAL_RELATION_TYPES
          value: "因果关系,方证关系,药证关系,相反关系"
        - name: RETRIEVAL_GRAPH_STRATEGY
          value: "pathRanking"
        - name: RETRIEVAL_RELATION_WEIGHTS
          value: "causal=1.2,contraindication=1.5,treatment=1.3,syndrome=1.4"
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 3005
            httpHeaders:
            - name: X-Probe-Type
              value: "liveness"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3005
            httpHeaders:
            - name: X-Probe-Type
              value: "readiness"
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        startupProbe:
          httpGet:
            path: /health/startup
            port: 3005
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12
          timeoutSeconds: 3
        lifecycle:
          postStart:
            exec:
              command: ["/bin/sh", "-c", "echo 'RAG服务启动于 '$(date)' 进程ID '$$' 环境 '${NODE_ENV} >> /app/logs/lifecycle.log && mkdir -p /app/cache/vector_index /app/data/query_logs /app/data/results"]
          preStop:
            exec:
              command: ["/bin/sh", "-c", "echo '准备优雅关闭RAG服务' >> /app/logs/lifecycle.log && sleep 10 && pkill -SIGTERM -f 'node /app/server.js'"]
        volumeMounts:
        - name: rag-service-config
          mountPath: /app/config
          readOnly: true
        - name: rag-service-data
          mountPath: /app/data
        - name: rag-service-logs
          mountPath: /app/logs
        - name: model-config
          mountPath: /app/config/model
          readOnly: true
        - name: openai-config
          mountPath: /app/config/openai
          readOnly: true
        - name: knowledge-base
          mountPath: /app/knowledge_base
          readOnly: true
        - name: rag-cache
          mountPath: /app/cache
        - name: rag-data
          mountPath: /app/data
        - name: rag-models
          mountPath: /app/models
          readOnly: true
        - name: rag-tmp
          mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
      volumes:
      - name: rag-service-config
        configMap:
          name: rag-service-config
      - name: rag-service-data
        persistentVolumeClaim:
          claimName: rag-service-data-pvc
      - name: rag-service-logs
        persistentVolumeClaim:
          claimName: rag-service-logs-pvc
      - name: model-config
        configMap:
          name: rag-service-model-config
      - name: openai-config
        configMap:
          name: rag-openai-config
      - name: knowledge-base
        persistentVolumeClaim:
          claimName: tcm-knowledge-base-pvc
      - name: rag-cache
        emptyDir: {}
      - name: rag-data
        persistentVolumeClaim:
          claimName: rag-data-pvc
      - name: rag-models
        persistentVolumeClaim:
          claimName: rag-models-pvc
      - name: rag-tmp
        emptyDir: {}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - ai-node-1
                - ai-node-2
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - rag-service
              topologyKey: kubernetes.io/hostname
          - weight: 70
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - rag-service
              topologyKey: topology.kubernetes.io/zone
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: rag-service
      nodeSelector:
        kubernetes.io/hostname: suoke-ai-np
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service
  namespace: suoke
  labels:
    app: rag-service
    tier: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3005"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: rag-service
  ports:
  - port: 80
    targetPort: 3005
    name: http
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600  # 会话保持1小时
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-service-ingress
  namespace: suoke
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "5m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";
      more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self'; img-src 'self' data:; style-src 'self'; connect-src 'self'";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/limit-rps: "15"
    nginx.ingress.kubernetes.io/limit-connections: "10"
spec:
  tls:
  - hosts:
    - rag.suoke.life
    secretName: rag-tls
  rules:
  - host: rag.suoke.life
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rag-service
            port:
              number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-service-hpa
  namespace: suoke
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-service
  minReplicas: 3
  maxReplicas: 12
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: rag_response_time_seconds
      target:
        type: AverageValue
        averageValue: 2  # 2秒平均响应时间
  - type: Pods
    pods:
      metric:
        name: rag_queue_length
      target:
        type: AverageValue
        averageValue: 5  # 平均队列长度5
  - type: Pods
    pods:
      metric:
        name: rag_strategy_usage
      target:
        type: AverageValue
        averageValue: 0.5
  - type: Pods
    pods:
      metric:
        name: cross_strategy_improvement
      target:
        type: AverageValue
        averageValue: 0.3
  - type: Pods
    pods:
      metric:
        name: retrieval_depth_distribution
      target:
        type: AverageValue
        averageValue: 0.7
  - type: Pods
    pods:
      metric:
        name: memory_hit_ratio
      target:
        type: AverageValue
        averageValue: 0.8
  - type: Pods
    pods:
      metric:
        name: pike_retrieval_rate
      target:
        type: AverageValue
        averageValue: 0.8
  - type: Pods
    pods:
      metric:
        name: self_assessment_correction_rate
      target:
        type: AverageValue
        averageValue: 0.8
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: rag-service-pdb
  namespace: suoke
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: rag-service
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rag-service-network-policy
  namespace: suoke
spec:
  podSelector:
    matchLabels:
      app: rag-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: suoke
      podSelector:
        matchLabels:
          tier: frontend
    - podSelector:
        matchLabels:
          app: ingress-nginx
          tier: gateway
    - podSelector:
        matchLabels:
          app: health-service
    - podSelector:
        matchLabels:
          app: tongue-diagnosis-service
    - podSelector:
        matchLabels:
          app: face-diagnosis-service
    - podSelector:
        matchLabels:
          app: pulse-diagnosis-service
    - podSelector:
        matchLabels:
          app: constitution-service
    ports:
    - protocol: TCP
      port: 3005
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: mysql-service
    ports:
    - protocol: TCP
      port: 3306
  - to:
    - podSelector:
        matchLabels:
          app: redis-service
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - podSelector:
        matchLabels:
          app: vector-db-service
    ports:
    - protocol: TCP
      port: 6333
  - to:
    - podSelector:
        matchLabels:
          app: llm-service
    ports:
    - protocol: TCP
      port: 80
  - to:
    - podSelector:
        matchLabels:
          app: knowledge-graph-service
    ports:
    - protocol: TCP
      port: 80
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config
  namespace: suoke
data:
  database_host: "mysql-service"
  database_port: "3306"
  database_name: "rag_db"
  database_pool_min: "5"
  database_pool_max: "20"
  redis_host: "redis-service"
  redis_port: "6379"
  vector_db_host: "vector-db-service"
  vector_db_port: "6333"
  llm_api_endpoint: "http://llm-service/v1/completions"
  embedding_api_endpoint: "http://embedding-service/v1/embeddings"
  knowledge_graph_service_url: "http://knowledge-graph-service"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config-files
  namespace: suoke
data:
  rag-config.json: |
    {
      "retrieval": {
        "vectorSearch": {
          "enabled": true,
          "dimensions": 768,
          "distanceMetric": "cosine",
          "indexType": "HNSW",
          "topK": 10,
          "minScore": 0.75,
          "reranking": {
            "enabled": true,
            "model": "cross-encoder",
            "topK": 5
          },
          "hypothesisDriven": {
            "enabled": true,
            "maxIterations": 3,
            "initialHypothesisTemplate": "针对'{query}'，中医角度可能的解释是...",
            "refinementStrategy": "iterative"
          },
          "relationAware": {
            "enabled": true,
            "relationTypes": ["因果关系", "方证关系", "药证关系", "相反关系"],
            "graphStrategy": "pathRanking",
            "relationWeights": {
              "causal": 1.2,
              "contraindication": 1.5,
              "treatment": 1.3,
              "syndrome": 1.4
            }
          }
        },
        "hybridSearch": {
          "enabled": true,
          "keywordWeight": 0.3,
          "semanticWeight": 0.7,
          "keywordModel": "bm25",
          "filters": {
            "enabled": true,
            "metadata": ["source", "domain", "date", "author", "type", "language"]
          }
        },
        "knowledgeGraph": {
          "enabled": true,
          "expansionDepth": 2,
          "relationTypes": ["synonym", "hyponym", "hypernym", "related", "causes", "treats"],
          "weightedRelations": true,
          "subgraphRetrieval": true
        },
        "contextWindow": {
          "maxTokens": 4000,
          "documentChunkSize": 800,
          "documentChunkOverlap": 100,
          "dynamicChunking": true
        },
        "caching": {
          "enabled": true,
          "queryCache": {
            "ttl": 3600,
            "maxSize": 1000
          },
          "retrievalCache": {
            "ttl": 86400,
            "maxSize": 5000
          }
        },
        "recursiveRetrieval": {
          "enabled": true,
          "maxDepth": 3,
          "maxDocsPerLevel": 5,
          "strategy": "tree",
          "referenceTypes": ["引用", "参考", "相关", "依据", "出处"],
          "citationTracking": true,
          "authorityScoring": {
            "enabled": true,
            "classicWorksBoost": 1.5,
            "peerReviewedBoost": 1.3,
            "recentnessDecay": 0.9
          },
          "documentRelatedness": {
            "minSimilarity": 0.65,
            "filterOutCycles": true
          },
          "parallelProcessing": true
        },
        "pikeRetrieval": {
          "enabled": true,
          "priorKnowledgeModel": "tcm-domain-knowledge",
          "confidenceThreshold": 0.82,
          "retrievalDecisionStrategy": "hybrid",
          "adaptiveBehavior": {
            "enabled": true,
            "userFeedbackInfluence": 0.3,
            "historyAwareness": true
          },
          "complexityAnalysis": {
            "enabled": true,
            "metrics": ["token_count", "entity_density", "domain_specificity"]
          },
          "specializations": {
            "tcmTheory": {
              "noRetrieval": ["基础问候", "简单解释", "常识性知识"],
              "alwaysRetrieve": ["药方组成", "经典引用", "具体诊断"]
            }
          }
        }
      },
      "generation": {
        "llmConfig": {
          "provider": "suoke",
          "model": "suoke-tcm-large",
          "temperature": 0.7,
          "topP": 0.95,
          "maxOutputTokens": 1024,
          "promptTemplates": {
            "standard": "你是索克生活平台的AI助手，专注于中医健康领域。请基于以下信息回答用户问题：\n\n上下文信息：\n{context}\n\n用户问题：{query}\n\n请给出专业、准确且易于理解的回答，引用相关的中医理论和健康建议。",
            "medical": "你是专业的中医AI助手，在回答中请务必遵循中医理论体系，不要混入现代医学概念。请基于以下信息回答用户问题：\n\n上下文信息：\n{context}\n\n用户问题：{query}\n\n请给出专业、准确且符合中医理论的回答，必要时引用相关经典著作。",
            "lifestyle": "你是健康生活方式AI顾问，专注于从中医角度提供生活建议。请基于以下信息回答用户问题：\n\n上下文信息：\n{context}\n\n用户问题：{query}\n\n请给出实用、有益且易于实施的生活建议，结合中医养生理念和现代健康研究。"
          }
        },
        "reasoning": {
          "chainOfThought": true,
          "selfConsistency": true,
          "fewShotExamples": 3
        },
        "responseFormatting": {
          "html": false,
          "markdown": true,
          "structuredData": false
        },
        "responseTailoring": {
          "userLevel": ["beginner", "intermediate", "professional"],
          "defaultLevel": "intermediate",
          "languageStyle": ["formal", "conversational", "technical"],
          "defaultStyle": "conversational"
        },
        "retrievalDecision": {
          "enabled": true,
          "thresholds": {
            "confidence": 0.85,
            "complexity": 0.7
          }
        },
        "selfAssessment": {
          "enabled": true,
          "criteriaWeights": {
            "relevance": 0.4,
            "factuality": 0.4,
            "completeness": 0.2
          },
          "thresholds": {
            "minAcceptableScore": 0.7
          },
          "feedbackLoop": true,
          "autonomousRegeneration": true,
          "evidenceWeighting": {
            "enabled": true,
            "sourceCredibility": true,
            "consistencyBoost": 1.2
          },
          "trackingMetrics": [
            "hallucination_rate",
            "citation_accuracy",
            "answer_completeness"
          ],
          "errorReductionStrategy": "focused_retrieval"
        },
        "flare": {
          "enabled": true,
          "uncertaintyDetection": true,
          "maxRetrievalRounds": 3,
          "confidenceThreshold": 0.85,
          "factVerification": true,
          "adaptiveRetrieval": true,
          "uncertaintyExpressions": [
            "可能", "或许", "推测", "大概", "似乎",
            "不确定", "不清楚", "不明确"
          ],
          "crossCheckingEnabled": true,
          "progressiveRefinement": {
            "enabled": true,
            "maxRefinementSteps": 2
          }
        }
      },
      "memory": {
        "enabled": true,
        "userMemory": {
          "enabled": true,
          "storage": "redis",
          "ttl": 2592000,
          "maxEntries": 100,
          "vectorization": true,
          "indexing": "hybrid"
        },
        "conversationMemory": {
          "enabled": true,
          "maxTurns": 10,
          "summarization": {
            "enabled": true,
            "threshold": 5,
            "strategy": "key_points"
          }
        },
        "documentMemory": {
          "enabled": true,
          "recentDocumentsTTL": 86400,
          "frequentDocumentsTracking": true
        },
        "semanticSearching": {
          "enabled": true,
          "defaultTopK": 5,
          "recencyBoost": 1.2
        },
        "personalization": {
          "enabled": true,
          "userModels": {
            "enabled": true,
            "updateFrequency": "per_session",
            "constitutionAwareness": true
          },
          "dynamicTailoring": {
            "enabled": true,
            "responseLength": true,
            "technicalDepth": true,
            "explanationStyle": true
          }
        },
        "contextualRetrieval": {
          "enabled": true,
          "useConversationHistory": true,
          "includeUserProfile": true,
          "interactionPatterns": {
            "tracking": true,
            "adaptation": true
          }
        },
        "forgetting": {
          "enabled": true,
          "strategy": "importance_based",
          "importanceMetrics": ["recency", "relevance", "interaction_count"]
        }
      },
      "knowledgeBase": {
        "sources": [
          {
            "id": "tcm_classics",
            "name": "中医经典著作",
            "type": "text",
            "contentType": "book",
            "language": "zh-CN",
            "priority": 1
          },
          {
            "id": "modern_tcm_research",
            "name": "现代中医研究",
            "type": "text",
            "contentType": "article",
            "language": "zh-CN",
            "priority": 2
          },
          {
            "id": "health_lifestyle",
            "name": "健康生活方式",
            "type": "text",
            "contentType": "guide",
            "language": "zh-CN",
            "priority": 3
          },
          {
            "id": "food_therapy",
            "name": "食疗资料库",
            "type": "text",
            "contentType": "recipe",
            "language": "zh-CN",
            "priority": 3
          },
          {
            "id": "medical_encyclopedia",
            "name": "医学百科",
            "type": "text",
            "contentType": "encyclopedia",
            "language": "zh-CN",
            "priority": 4
          }
        ],
        "refreshSchedule": {
          "full": "weekly",
          "incremental": "daily"
        },
        "embedding": {
          "batchSize": 50,
          "concurrency": 5,
          "errorHandling": "retry",
          "maxRetries": 3
        }
      },
      "database": {
        "connectionPool": {
          "min": 5,
          "max": 20,
          "acquireTimeoutMillis": 30000,
          "createTimeoutMillis": 30000,
          "destroyTimeoutMillis": 5000,
          "idleTimeoutMillis": 30000,
          "reapIntervalMillis": 1000,
          "createRetryIntervalMillis": 200
        },
        "queryLogging": {
          "enabled": true,
          "slowQueryThresholdMs": 1000
        }
      },
      "redis": {
        "connectionPool": {
          "maxClients": 50,
          "minFree": 5,
          "connectTimeout": 10000,
          "reconnectStrategy": {
            "retries": 10,
            "initialBackoff": 100,
            "maxBackoff": 10000
          }
        },
        "keyPrefix": "rag:",
        "keySeparator": ":",
        "dataTTL": 86400,
        "memoryKeyPrefix": "memory:",
        "userPrefix": "user:",
        "conversationPrefix": "conv:",
        "memoryIndices": {
          "byTimestamp": true,
          "byTopic": true,
          "byInteractionType": true
        }
      },
      "vectorDb": {
        "connectionPool": {
          "maxConnections": 20,
          "connectionTimeout": 5000,
          "idleTimeout": 60000
        },
        "collections": [
          {
            "name": "tcm_embeddings",
            "dimensions": 768,
            "metric": "cosine",
            "shards": 3,
            "replicas": 2
          },
          {
            "name": "lifestyle_embeddings",
            "dimensions": 768,
            "metric": "cosine",
            "shards": 2,
            "replicas": 2
          },
          {
            "name": "food_therapy_embeddings",
            "dimensions": 768,
            "metric": "cosine",
            "shards": 2,
            "replicas": 2
          },
          {
            "name": "user_memory_embeddings",
            "dimensions": 768,
            "metric": "cosine",
            "shards": 1,
            "replicas": 2
          }
        ]
      },
      "logging": {
        "level": "info",
        "format": "json",
        "sensitiveData": ["userId", "queryText", "ipAddress"],
        "retention": "90d",
        "queryLogging": {
          "enabled": true,
          "includeMetadata": true,
          "sampleRate": 0.1
        }
      },
      "monitoring": {
        "metrics": {
          "enabled": true,
          "endpoint": "/metrics",
          "intervalSeconds": 15,
          "customMetrics": [
            "retrieval_latency",
            "generation_latency",
            "query_count",
            "cache_hit_ratio",
            "token_usage",
            "error_rate",
            "r2r_depth_distribution",
            "memory_hit_ratio",
            "pike_retrieval_rate",
            "self_assessment_correction_rate"
          ]
        },
        "healthChecks": {
          "database": true,
          "redis": true,
          "vectorDb": true,
          "llmService": true,
          "embeddingService": true
        },
        "alerts": {
          "highLatency": true,
          "highErrorRate": true,
          "serviceDown": true
        }
      },
      "security": {
        "authentication": {
          "required": true,
          "methods": ["JWT", "API_KEY"]
        },
        "authorization": {
          "enabled": true,
          "roleBasedAccess": true,
          "scopedAccess": true
        },
        "rateLimit": {
          "enabled": true,
          "requestsPerMinute": {
            "default": 30,
            "premium": 100
          },
          "tokensPerHour": {
            "default": 10000,
            "premium": 50000
          }
        },
        "dataProtection": {
          "encryption": {
            "atRest": true,
            "inTransit": true,
            "algorithm": "AES-256-GCM"
          },
          "pii": {
            "detection": true,
            "redaction": true,
            "sensitiveTypes": ["name", "phone", "email", "id_number", "address"]
          }
        }
      },
      "api": {
        "versions": ["v1"],
        "defaultVersion": "v1",
        "documentation": {
          "enabled": true,
          "path": "/docs"
        },
        "cors": {
          "enabled": true,
          "allowedOrigins": ["https://*.suoke.life"],
          "allowedMethods": ["GET", "POST"],
          "allowedHeaders": ["Content-Type", "Authorization"],
          "maxAge": 3600
        }
      }
    }
