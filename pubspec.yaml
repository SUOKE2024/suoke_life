name: suoke_life
description: "索克生活 - 中医健康管理平台"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # 核心依赖
  equatable: ^2.0.5
  flutter_riverpod: ^2.4.9
  auto_route: ^7.8.3
  logger: ^2.0.2+1
  uuid: ^4.2.2
  dio: ^5.3.3
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  intl: ^0.19.0
  path_provider: ^2.1.1
  
  # UI组件
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.2.3
  google_fonts: ^6.1.0
  flutter_markdown: ^0.6.18
  lottie: ^2.7.0
  fl_chart: ^0.66.0
  carousel_slider: ^4.2.1
  
  # 网络和连接
  connectivity_plus: ^5.0.2
  flutter_dotenv: ^5.0.2
  
  # 功能模块
  camera: ^0.10.5+5             # 相机模块用于舌象采集
  image_picker: ^1.0.4
  image: ^4.1.3
  flutter_tts: ^3.8.3
  speech_to_text: ^6.5.1
  table_calendar: ^3.0.9
  # 临时注释掉本地通知插件，解决编译问题
  # flutter_local_notifications: ^16.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  # 暂时注释掉集成测试，解决iOS编译问题
  # integration_test:
  #   sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.1
  golden_toolkit: ^0.15.0
  auto_route_generator: ^7.3.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/avatars/
    - assets/images/products/
    - assets/images/icons/
    - assets/images/illustrations/
    - assets/icons/
    - assets/fonts/
    - assets/config/
  
