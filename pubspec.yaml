name: suoke_life
description: 索克生活APP - 新一代智能生活服务平台
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_dotenv: ^5.2.0
  flutter_svg: ^2.0.9
  intl: ^0.19.0
  dio: ^5.7.2
  riverpod: ^2.5.1
  go_router: ^14.1.4
  firebase_core: ^3.10.1
  flutter_localizations:
    sdk: flutter
  connectivity_plus: ^6.1.2
  uuid: ^4.2.1
  logger: ^2.0.2
  path_provider: ^2.0.2
  shared_preferences: ^2.3.0
  image_picker: ^1.0.4
  auto_route: ^7.8.3
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  mocktail: ^1.0.3
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/locales/
    - assets/config/
